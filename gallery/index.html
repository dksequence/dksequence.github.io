<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고객전용 프라이빗 갤러리</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="intro-overlay" id="intro-overlay">
        <div class="intro-card">
            <p class="intro-ko">⚠ 사진 용량이 크니 와이파이 환경에서 다운로드를 권장드립니다.</p>
            <p class="intro-sub">Files are large — downloading on Wi-Fi is recommended.</p>
            <p class="intro-sub">照片文件较大，建议在 Wi-Fi 环境下下载。</p>
            <button class="intro-btn" id="intro-confirm" type="button">OK</button>
        </div>
    </div>
    <div class="lang-switch">
        <button class="lang-btn active" type="button" data-lang="ko">한국어</button>
        <button class="lang-btn" type="button" data-lang="en">ENG</button>
        <button class="lang-btn" type="button" data-lang="zh">中文</button>
    </div>
    <header class="gallery-header">
        <div class="header-copy">
            <p class="eyebrow">DKsequence X 중문별장</p>
            <h1 id="gallery-title">화보 Gallery</h1>
            <p class="subtitle" id="subtitle">오늘의 소중한 순간을 천천히 감상하고 자유롭게 내려받아 주세요.</p>
        </div>
        <div class="header-actions">
            <button class="btn-primary" id="download-all-btn" type="button">
                <span id="dl-all-text">전체 사진 다운로드</span>
            </button>
            <p class="dl-note" id="expiry-note">이 갤러리는 일정 기간 후 자동 만료되오니 미리 받아주세요 :D</p>
        </div>
    </header>

    <main class="gallery-container" id="gallery">
        <div class="loader">갤러리를 불러오는 중입니다...</div>
    </main>

    <button class="bgm-toggle" id="bgm-toggle" type="button" aria-label="배경음악">♪</button>
    <audio id="bgm" loop preload="none"></audio>

    <script src="app.js"></script>
</body>
</html>

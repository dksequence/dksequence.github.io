<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">  <!-- 인앱 브라우저(카톡 등) 자동 다크모드 강제어둡게 방지 — 크림 편지가 갈색/검정으로 뒤집히던 문제 -->
    <title>추억화보 프라이빗 갤러리</title>
    <meta property="og:title" content="추억화보 프라이빗 갤러리">
    <meta property="og:description" content="제주에서의 소중한 추억, 화보로 감상하고 받아보세요 :)">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Cormorant+Garamond:wght@500;600;700&family=Fraunces:wght@600;700&family=Gaegu:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260527p38">
</head>
<body>
    <div class="intro-overlay" id="intro-overlay">
        <div class="intro-card">
            <p class="intro-ko">⚠ 사진 용량이 크니 와이파이 환경에서 다운로드를 권장드립니다.</p>
            <p class="intro-sub">Files are large — downloading on Wi-Fi is recommended.</p>
            <p class="intro-sub">照片文件较大，建议在 Wi-Fi 环境下下载。</p>
            <button class="intro-btn" id="intro-confirm" type="button">OK</button>
        </div>
    </div>
    <div class="lang-switch">
        <button class="lang-btn active" type="button" data-lang="ko">한국어</button>
        <button class="lang-btn" type="button" data-lang="en">ENG</button>
        <button class="lang-btn" type="button" data-lang="zh">中文</button>
    </div>
    <header class="gallery-hero" id="gallery-hero">
        <div class="hero-bg" id="hero-bg"></div>
        <div class="hero-scrim"></div>
        <div class="hero-inner">
            <p class="eyebrow">DKsequence X 중문별장</p>
            <h1 id="gallery-title">화보 Gallery</h1>
            <p class="subtitle" id="subtitle">오늘의 소중한 순간을 천천히 감상하고 자유롭게 내려받아 주세요.</p>
            <p class="dl-note" id="expiry-note">이 갤러리는 일정 기간 후 자동 만료되오니 미리 받아주세요 :D</p>
        </div>
        <a class="hero-scroll" href="#gallery" aria-label="아래로"><span></span></a>
    </header>

    <main class="gallery-container" id="gallery">
        <div class="loader">갤러리를 불러오는 중입니다...</div>
    </main>

    <button class="bgm-toggle" id="bgm-toggle" type="button" aria-label="배경음악">♪</button>
    <audio id="bgm" preload="none"></audio>

    <div class="lightbox" id="lightbox" aria-hidden="true">
        <button class="lb-close" id="lb-close" type="button" aria-label="닫기">&times;</button>
        <button class="lb-nav lb-prev" id="lb-prev" type="button" aria-label="이전">&lsaquo;</button>
        <div class="lb-stage"><img class="lb-img" id="lightbox-img" alt=""></div>
        <button class="lb-nav lb-next" id="lb-next" type="button" aria-label="다음">&rsaquo;</button>
    </div>

    <div class="petals" id="petals" aria-hidden="true"></div>

    <script src="app.js?v=20260527p38"></script>
</body>
</html>

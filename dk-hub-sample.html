<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DK 운영 허브</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080808;
      --s1:      #101010;
      --s2:      #161616;
      --s3:      #1e1e1e;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text:    #f0f0f0;
      --sub:     rgba(255,255,255,0.48);
      --muted:   rgba(255,255,255,0.22);
      --accent:  #5b9cf6;
      --green:   #3ecf72;
      --danger:  #f87171;
    }

    html, body {
      width: 100%; min-height: 100%;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── PIN SCREEN ─── */
    #pinScreen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; padding: 24px;
    }
    .pin-logo {
      width: 74px; height: 74px; border-radius: 22px;
      background: linear-gradient(145deg, #1c1c1c, #0d0d0d);
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 900; letter-spacing: -1px; color: #fff;
      margin-bottom: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .pin-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; text-align: center; }
    .pin-sub   { font-size: 14px; color: var(--sub); margin-bottom: 36px; text-align: center; }
    .pin-dots  { display: flex; gap: 20px; margin-bottom: 40px; }
    .pin-dot {
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--border2); transition: background 0.15s, transform 0.15s;
    }
    .pin-dot.filled { background: #fff; transform: scale(1.1); }
    .pin-dot.error  { background: var(--danger); }
    .pin-pad { display: grid; grid-template-columns: repeat(3, 76px); gap: 12px; }
    .pin-key {
      width: 76px; height: 76px; border-radius: 50%;
      border: 1px solid var(--border2); background: var(--s1);
      color: #fff; font-size: 22px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, transform 0.08s;
      user-select: none; -webkit-user-select: none;
    }
    .pin-key:active { background: var(--s3); transform: scale(0.93); }
    .pin-key.empty  { background: transparent; border-color: transparent; cursor: default; }
    .pin-error-msg  { margin-top: 20px; font-size: 13px; color: var(--danger); height: 20px; text-align: center; }

    /* ─── MAIN APP ─── */
    #app { display: none; min-height: 100vh; }

    .accent-bar {
      height: 3px;
      background: linear-gradient(90deg, #5b9cf6 0%, #a78bfa 45%, #3ecf72 100%);
    }

    .app-header {
      padding: 14px 20px 13px;
      border-bottom: 1px solid var(--border);
      background: var(--s1);
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 860px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 13px; }
    .app-logo {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(145deg, #1d1d1d, #0d0d0d);
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; letter-spacing: -0.5px; flex-shrink: 0;
    }
    .header-text h1 { font-size: 17px; font-weight: 800; line-height: 1.2; }
    .header-text p  { font-size: 11px; color: var(--sub); margin-top: 1px; }
    .header-actions { display: flex; gap: 7px; }
    .hdr-btn {
      border: 1px solid var(--border2); background: var(--s2); color: var(--sub);
      border-radius: 10px; padding: 7px 13px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s; white-space: nowrap;
    }
    .hdr-btn:hover { background: var(--s3); color: var(--text); }
    .hdr-btn.active {
      background: rgba(255,196,0,0.1); border-color: rgba(255,196,0,0.4);
      color: #ffc400;
    }
    .hdr-btn.active:hover { background: rgba(255,196,0,0.17); }

    /* ─── CONTENT ─── */
    .content { max-width: 860px; margin: 0 auto; padding: 18px 14px 64px; }

    /* ─── SEARCH ─── */
    .search-wrap { margin-bottom: 16px; position: relative; }
    .search-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      font-size: 14px; color: var(--muted); pointer-events: none;
    }
    .search-input {
      width: 100%;
      border: 1px solid var(--border2); background: var(--s1); color: var(--text);
      border-radius: 12px; padding: 11px 14px 11px 38px; font-size: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus {
      outline: none;
      border-color: rgba(91,156,246,0.4);
      box-shadow: 0 0 0 3px rgba(91,156,246,0.07);
    }

    /* ─── GROUPS ─── */
    .groups { display: flex; flex-direction: column; gap: 7px; }

    .group-block {
      border: 1px solid var(--border); border-radius: 15px;
      background: var(--s1); overflow: hidden;
      transition: border-color 0.15s;
    }
    .group-block:hover { border-color: var(--border2); }

    .group-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px; cursor: pointer;
      user-select: none; -webkit-user-select: none; gap: 10px;
    }
    .group-header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .group-color-bar   { width: 4px; height: 20px; border-radius: 3px; flex-shrink: 0; }
    .group-name {
      font-size: 14px; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .group-count {
      font-size: 11px; color: var(--sub);
      background: rgba(255,255,255,0.06);
      border-radius: 20px; padding: 1px 8px; flex-shrink: 0;
    }
    .group-chevron {
      font-size: 9px; color: var(--muted);
      transition: transform 0.22s ease; flex-shrink: 0;
    }
    .group-chevron.open { transform: rotate(90deg); }

    /* Smooth accordion */
    .group-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.28s ease;
      border-top: 0px solid var(--border);
    }
    .group-body.open {
      max-height: 3000px;
      border-top-width: 1px;
    }
    .group-body-inner { display: flex; flex-direction: column; }

    /* ─── ITEMS ─── */
    .item-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; gap: 12px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s, opacity 0.15s;
      cursor: default;
    }
    .item-row:last-child { border-bottom: none; }
    .item-row:hover      { filter: brightness(1.12); }
    .item-row.dragging   { opacity: 0.35; }
    .item-row.drag-over  { outline: 2px dashed rgba(255,255,255,0.25); outline-offset: -2px; }

    /* 항목 추가 버튼 행 */
    .add-item-row {
      display: flex; align-items: center; justify-content: center;
      padding: 9px 16px;
      border-bottom: none;
    }
    .add-item-btn {
      border: 1px dashed rgba(255,255,255,0.13); background: transparent; color: var(--muted);
      border-radius: 8px; padding: 5px 16px; font-size: 12px; font-weight: 600; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-item-btn:hover { border-color: rgba(255,255,255,0.28); color: var(--sub); }

    .item-left {
      display: flex; align-items: center; gap: 11px;
      min-width: 0; flex: 1; cursor: pointer;
    }

    /* 드래그 핸들 */
    .item-icon {
      width: 34px; height: 34px; border-radius: 9px;
      background: var(--s2); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
      cursor: grab; touch-action: none;
      user-select: none; -webkit-user-select: none;
    }
    .item-icon:active { cursor: grabbing; }

    .item-info { min-width: 0; flex: 1; }

    .item-title-wrap { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .url-dot {
      width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
    }
    .url-dot.has-url { background: var(--green); }
    .url-dot.no-url  { background: var(--muted); }
    .item-title {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text); flex-shrink: 1; min-width: 0;
    }
    /* URL 토글 표시 */
    .url-reveal {
      font-size: 14px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-family: inherit; flex-shrink: 2; min-width: 0;
      max-width: 240px;
      margin-left: 2em;
      display: none;
    }
    .url-reveal.show { display: block; }

    .item-note {
      font-size: 11px; color: var(--sub); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .item-actions { display: flex; gap: 5px; flex-shrink: 0; }

    .act-btn {
      border: 1px solid var(--border2); background: rgba(0,0,0,0.25); color: var(--sub);
      border-radius: 8px; width: 34px; height: 34px; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s, border-color 0.1s; flex-shrink: 0;
    }
    .act-btn:hover   { background: var(--s3); color: var(--text); }
    .act-btn.copied  { border-color: rgba(62,207,114,0.4); color: var(--green); }
    .act-btn.gear    { font-size: 13px; }
    .act-btn.star    { font-size: 15px; color: var(--muted); border-color: transparent; background: transparent; }
    .act-btn.star:hover { color: #ffc400; border-color: rgba(255,196,0,0.3); background: rgba(255,196,0,0.07); }
    .act-btn.star.on { color: #ffc400; border-color: rgba(255,196,0,0.3); background: rgba(255,196,0,0.07); }

    .empty-group { padding: 12px 16px; font-size: 13px; color: var(--muted); }

    /* ─── TOAST ─── */
    .toast {
      position: fixed; bottom: 26px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--s2); color: var(--text);
      border: 1px solid var(--border2); border-radius: 12px;
      padding: 10px 20px; font-size: 13px; font-weight: 600;
      opacity: 0; transition: opacity 0.18s, transform 0.18s;
      pointer-events: none; z-index: 5000; white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── SETTINGS PANEL (카테고리 관리) ─── */
    .panel-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: none; z-index: 999; backdrop-filter: blur(2px);
    }
    .panel-backdrop.show { display: block; }

    .panel {
      position: fixed; top: 0; right: 0;
      width: min(96vw, 420px); height: 100%;
      background: #0b0b0b; border-left: 1px solid var(--border2);
      transform: translateX(100%); transition: transform 0.22s ease;
      z-index: 1000; overflow-y: auto; padding: 18px 16px 48px;
    }
    .panel.show { transform: translateX(0); }

    .panel-top {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;
    }
    .panel-title { font-size: 18px; font-weight: 800; }
    .close-btn {
      border: 1px solid var(--border2); background: var(--s2); color: var(--text);
      border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .close-btn:hover { background: var(--s3); }

    .section-label {
      font-size: 11px; color: var(--sub); text-transform: uppercase;
      letter-spacing: 0.1em; margin: 22px 0 10px;
    }

    .add-btn {
      width: 100%; border: 1px dashed rgba(255,255,255,0.15);
      background: transparent; color: var(--sub);
      border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700;
      cursor: pointer; margin-bottom: 10px;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

    .editor-card {
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 14px; padding: 13px; margin-bottom: 10px;
    }
    .editor-row       { margin-bottom: 10px; }
    .editor-row:last-child { margin-bottom: 0; }
    .editor-label     { display: block; font-size: 12px; color: var(--sub); margin-bottom: 5px; }

    .editor-input, .editor-select {
      width: 100%; border: 1px solid var(--border2);
      background: var(--bg); color: var(--text);
      border-radius: 9px; padding: 9px 11px; font-size: 14px;
    }
    .editor-input:focus, .editor-select:focus {
      outline: none; border-color: rgba(91,156,246,0.35);
    }
    .editor-select option { background: #141414; }

    .color-swatch-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .color-swatch {
      width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: transform 0.12s, border-color 0.12s;
    }
    .color-swatch:hover { transform: scale(1.1); }
    .color-swatch.active { border-color: #fff; transform: scale(1.15); }

    .editor-actions { display: flex; gap: 8px; margin-top: 12px; }

    .small-btn {
      flex: 1; border: 1px solid var(--border2); background: var(--s1); color: var(--text);
      border-radius: 9px; padding: 8px; font-size: 13px; font-weight: 700; cursor: pointer;
      text-align: center; transition: background 0.1s;
    }
    .small-btn:hover { background: var(--s3); }
    .small-btn.danger {
      border-color: rgba(248,113,113,0.25);
      background: rgba(248,113,113,0.06); color: var(--danger);
    }
    .small-btn.danger:hover { background: rgba(248,113,113,0.13); }

    .setting-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 13px; padding: 13px 15px; margin-bottom: 10px; gap: 12px;
    }
    .setting-row-label { font-size: 14px; font-weight: 600; }
    .setting-row-sub   { font-size: 12px; color: var(--sub); margin-top: 2px; }
    .inline-btn {
      border: 1px solid var(--border2); background: var(--s1); color: var(--text);
      border-radius: 9px; padding: 7px 13px; font-size: 13px; font-weight: 700;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .inline-btn:hover { background: var(--s3); }

    /* ─── ITEM MODAL (항목 개별 설정) ─── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      display: none; z-index: 2000; backdrop-filter: blur(3px);
      align-items: center; justify-content: center;
    }
    .modal-backdrop.show { display: flex; }

    .item-modal {
      background: #0e0e0e; border: 1px solid var(--border2);
      border-radius: 18px; padding: 20px 18px 22px;
      width: min(94vw, 420px);
      box-shadow: 0 12px 60px rgba(0,0,0,0.8);
      animation: modalIn 0.18s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-top {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .modal-title { font-size: 16px; font-weight: 800; }
    .modal-close {
      border: 1px solid var(--border2); background: var(--s2); color: var(--sub);
      border-radius: 8px; width: 32px; height: 32px; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: var(--s3); color: var(--text); }
    .modal-row   { margin-bottom: 12px; }
    .modal-label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 5px; }
    .modal-input, .modal-select {
      width: 100%; border: 1px solid var(--border2);
      background: var(--bg); color: var(--text);
      border-radius: 9px; padding: 9px 11px; font-size: 14px;
    }
    .modal-input:focus, .modal-select:focus {
      outline: none; border-color: rgba(91,156,246,0.35);
    }
    .modal-select option { background: #141414; }
    .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
    .modal-btn {
      flex: 1; border: 1px solid var(--border2); background: var(--s2); color: var(--text);
      border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 700; cursor: pointer;
      transition: background 0.1s;
    }
    .modal-btn:hover { background: var(--s3); }
    .modal-btn.primary {
      background: #1a2a45; border-color: rgba(91,156,246,0.3); color: #7ab8ff;
    }
    .modal-btn.primary:hover { background: #1e3256; }
    .modal-btn.danger {
      background: rgba(248,113,113,0.06); border-color: rgba(248,113,113,0.25); color: var(--danger);
    }
    .modal-btn.danger:hover { background: rgba(248,113,113,0.13); }

    .empty-msg { text-align: center; color: var(--sub); font-size: 14px; padding: 48px 0; }

    @media (max-width: 600px) {
      .item-title { font-size: 13px; }
      .group-name { font-size: 13px; }
      .act-btn    { width: 32px; height: 32px; }
      .url-reveal { max-width: 100px; }
    }
  </style>
</head>
<body>

<!-- ─── PIN SCREEN ─── -->
<div id="pinScreen">
  <div class="pin-logo">DK</div>
  <div class="pin-title" id="pinTitle">잠금 해제</div>
  <div class="pin-sub"   id="pinSub">PIN을 입력하세요</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pinInput('1')">1</button>
    <button class="pin-key" onclick="pinInput('2')">2</button>
    <button class="pin-key" onclick="pinInput('3')">3</button>
    <button class="pin-key" onclick="pinInput('4')">4</button>
    <button class="pin-key" onclick="pinInput('5')">5</button>
    <button class="pin-key" onclick="pinInput('6')">6</button>
    <button class="pin-key" onclick="pinInput('7')">7</button>
    <button class="pin-key" onclick="pinInput('8')">8</button>
    <button class="pin-key" onclick="pinInput('9')">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pinInput('0')">0</button>
    <button class="pin-key" onclick="pinDelete()">⌫</button>
  </div>
  <div class="pin-error-msg" id="pinError"></div>
</div>

<!-- ─── MAIN APP ─── -->
<div id="app">
  <div class="accent-bar"></div>
  <header class="app-header">
    <div class="header-inner">
      <div class="header-left">
        <div class="app-logo">DK</div>
        <div class="header-text">
          <h1>DK 운영 허브</h1>
          <p>운영 · 관리 URL 모음</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="hdr-btn" id="btnExpand"  onclick="toggleAllGroups()">전체 펼침</button>
        <button class="hdr-btn" id="btnStarOnly" onclick="toggleStarFilter()">★ 별표만</button>
        <button class="hdr-btn" onclick="openSettings()">⚙ 관리</button>
        <button class="hdr-btn" onclick="lockApp()">🔒</button>
      </div>
    </div>
  </header>

  <div class="content">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="search" id="searchInput"
             placeholder="이름 또는 메모로 검색..."
             oninput="onSearch(this.value)">
    </div>
    <div class="groups" id="groupsContainer"></div>
    <div class="empty-msg" id="emptyMsg" style="display:none">검색 결과가 없습니다</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ─── SETTINGS PANEL (카테고리 관리) ─── -->
<div class="panel-backdrop" id="panelBackdrop" onclick="closeSettings()"></div>
<aside class="panel" id="settingsPanel">
  <div class="panel-top">
    <div class="panel-title">⚙ 카테고리 관리</div>
    <button class="close-btn" onclick="closeSettings()">닫기</button>
  </div>
  <div style="font-size:13px; color:var(--sub); line-height:1.5; margin-bottom:4px;">
    카테고리 추가, 이름 · 색상 · 순서 변경, 삭제를 관리합니다.<br>
    항목은 각 항목의 ⚙ 버튼으로 편집하세요.
  </div>

  <div class="section-label">🔒 보안</div>
  <div class="setting-row">
    <div>
      <div class="setting-row-label">PIN 변경</div>
      <div class="setting-row-sub">4자리 PIN을 새로 설정합니다</div>
    </div>

    { id: 'i15', gid: 'g5', title: 'Cloud Build 로그',       note: '배포 이력 확인',                url: 'https://console.cloud.google.com/cloud-build/builds?project=dk-booking' },
    { id: 'i16', gid: 'g6', title: 'GoatCounter 방문자',     note: 'dksequence 방문자 분석',        url: 'https://dksequence.goatcounter.com/' },
    { id: 'i21', gid: 'g6', title: '운영 통계 대시보드',     note: '일간/주간/월간 차트 대시보드',   url: 'https://dksequence.github.io/stats_dashboard.html' },
    { id: 'i17', gid: 'g7', title: 'GAS 코드 편집기',        note: 'Apps Script 편집기',            url: 'https://script.google.com/home/projects/1k1tW6IH3zDcvxUTmeYkHlv7dBUVVjwA7v3tv5c68p87ea1lPk62Fb8v3/edit' },
    { id: 'i18', gid: 'g7', title: '네이버 메일 생성기',     note: '로컬 도구 — 브라우저에서만 동작', url: 'file:///E:/%EC%A4%91%EB%AC%B8%EB%B3%84%EC%9E%A5%20work/000-Development/05-tools/0002%20naver_email_generator.html' },
    { id: 'i19', gid: 'g7', title: '에디터',                 note: '로컬 도구 — 브라우저에서만 동작', url: 'file:///E:/%EC%A4%91%EB%AC%B8%EB%B3%84%EC%9E%A5%20work/000-Development/05-tools/editer.html' }
  ],
  expandedGroups: ['g1'],
  starredItems:   []
};

// ── State ──────────────────────────────────────────────────────
let data          = loadData();
let pinBuffer     = '';
let pinMode       = 'unlock';
let pinNewTemp    = '';
let revealedUrls  = new Set();   // URL 토글 표시 상태 (in-memory only)
let starFilter    = false;       // 별표만 보기 모드

// 항목 모달 상태
let modalItemId   = null;

// ── Data ───────────────────────────────────────────────────────
function loadData() {
  try {
    if (localStorage.getItem(VERSION_KEY) !== DATA_VERSION) {
      localStorage.setItem(VERSION_KEY, DATA_VERSION);
      localStorage.removeItem(STORAGE_KEY);
      return JSON.parse(JSON.stringify(defaultData));
    }
    const s = localStorage.getItem(STORAGE_KEY);
    if (!s) return JSON.parse(JSON.stringify(defaultData));
    const parsed = JSON.parse(s);
    if (!parsed.groups || !parsed.items) return JSON.parse(JSON.stringify(defaultData));
    return parsed;
  } catch(e) { return JSON.parse(JSON.stringify(defaultData)); }
}

function saveData() {
  if (!data.starredItems) data.starredItems = [];
  data.lastModified = Date.now();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  syncToGAS();
}

// ── GAS 동기화 ──────────────────────────────────────────────────
function syncToGAS() {
  try {
    fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'setHubData', data: data })
    });
  } catch(e) {}
}

function loadFromGAS() {
  const cb  = '_gh_' + Date.now();
  const tag = document.createElement('script');
  tag.src   = GAS_URL + '?action=getHubData&callback=' + cb;
  tag.onerror = () => { tag.remove(); delete window[cb]; };
  window[cb] = (res) => {
    delete window[cb];
    tag.remove();
    if (!res || !res.ok || !res.data) return;
    const remote  = res.data;
    const localTs = data.lastModified  || 0;
    const remoteTs = remote.lastModified || 0;
    if (remoteTs > localTs) {
      data = remote;
      localStorage.setItem(VERSION_KEY, DATA_VERSION);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      render();
      showToast('☁ 다른 기기 변경사항이 동기화됐습니다');
    }
  };
  document.head.appendChild(tag);
}

function resetToDefault() {
  if (!confirm('모든 데이터를 최신 기본값으로 초기화할까요?\n직접 추가/수정한 항목은 사라집니다.')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.setItem(VERSION_KEY, DATA_VERSION);
  data = JSON.parse(JSON.stringify(defaultData));
  closeSettings();
  render();
  showToast('✓ 기본값으로 복원됐습니다');
}

function getSavedPIN() { return localStorage.getItem(PIN_KEY) || null; }
function savePIN(pin)  { localStorage.setItem(PIN_KEY, pin); }

// ── PIN ────────────────────────────────────────────────────────
function initPINScreen() {
  const saved = getSavedPIN();
  if (!saved) {
    pinMode = 'set-new';
    document.getElementById('pinTitle').textContent = 'PIN 설정';
    document.getElementById('pinSub').textContent   = '처음 사용합니다. 4자리 PIN을 설정하세요';
  } else {
    pinMode = 'unlock';
    document.getElementById('pinTitle').textContent = '잠금 해제';
    document.getElementById('pinSub').textContent   = 'PIN을 입력하세요';
  }
  pinBuffer = '';
  updatePinDots();
}

function pinInput(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updatePinDots();
  clearPinError();
  if (pinBuffer.length === 4) setTimeout(processPIN, 130);
}

function pinDelete() {
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDots();
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('d' + i);
    dot.classList.toggle('filled', i < pinBuffer.length);
    dot.classList.remove('error');
  }
}

function shakePinDots() {
  for (let i = 0; i < 4; i++) document.getElementById('d' + i).classList.add('error');
}

function clearPinError() { document.getElementById('pinError').textContent = ''; }

function processPIN() {
  if (pinMode === 'unlock') {
    if (pinBuffer === getSavedPIN()) {
      unlockApp();
    } else {
      shakePinDots();
      document.getElementById('pinError').textContent = '잘못된 PIN입니다';
      pinBuffer = '';
      setTimeout(updatePinDots, 700);
    }
  } else if (pinMode === 'set-new') {
    pinNewTemp = pinBuffer;
    pinMode    = 'confirm-new';
    document.getElementById('pinTitle').textContent = 'PIN 확인';
    document.getElementById('pinSub').textContent   = '한 번 더 입력하세요';
    pinBuffer = '';
    updatePinDots();
  } else if (pinMode === 'confirm-new') {
    if (pinBuffer === pinNewTemp) {
      savePIN(pinBuffer);
      unlockApp();
    } else {
      shakePinDots();
      document.getElementById('pinError').textContent = 'PIN이 일치하지 않습니다';
      pinBuffer = '';
      pinNewTemp = '';
      pinMode = 'set-new';
      setTimeout(() => {
        document.getElementById('pinTitle').textContent = 'PIN 설정';
        document.getElementById('pinSub').textContent   = '다시 입력하세요';
        updatePinDots();
      }, 800);
    }
  }
}

function unlockApp() {
  document.getElementById('pinScreen').style.display = 'none';
  document.getElementById('app').style.display       = 'block';
  render();
  loadFromGAS();   // 다른 기기 변경사항 동기화
}

function lockApp() {
  document.getElementById('app').style.display       = 'none';
  document.getElementById('pinScreen').style.display = 'flex';
  closeSettings();
  pinBuffer = '';
  pinMode   = 'unlock';
  document.getElementById('pinTitle').textContent = '잠금 해제';
  document.getElementById('pinSub').textContent   = 'PIN을 입력하세요';
  updatePinDots();
  clearPinError();
}

function startChangePIN() {
  closeSettings();
  lockApp();
  pinMode = 'set-new';
  document.getElementById('pinTitle').textContent = '새 PIN 설정';
  document.getElementById('pinSub').textContent   = '새로운 4자리 PIN을 입력하세요';
  pinBuffer = '';
  updatePinDots();
}

document.addEventListener('keydown', (e) => {
  if (document.getElementById('pinScreen').style.display !== 'none') {
    if (e.key >= '0' && e.key <= '9') pinInput(e.key);
    if (e.key === 'Backspace') pinDelete();
  }
});

// ── Helpers ────────────────────────────────────────────────────
function hexToRgb(hex) {
  const h = hex.replace('#','');
  return {
    r: parseInt(h.slice(0,2),16),
    g: parseInt(h.slice(2,4),16),
    b: parseInt(h.slice(4,6),16)
  };
}

function itemBg(hex) {
  const { r, g, b } = hexToRgb(hex);
  return `rgba(${r},${g},${b},0.07)`;
}

function getUrlIcon(url) {
  if (!url) return '🔗';
  if (url.includes('docs.google.com/spreadsheets')) return '📊';
  if (url.includes('script.google.com'))            return '⚡';
  if (url.includes('drive.google.com'))             return '📁';
  if (url.includes('calendar.google.com'))          return '📅';
  if (url.includes('console.cloud.google.com'))     return '☁️';
  if (url.includes('github.com'))                   return '🐙';
  if (url.includes('github.io'))                    return '🌐';
  if (url.includes('goatcounter.com'))              return '📈';
  if (url.startsWith('file:///'))                   return '💻';
  return '🔗';
}

function truncateUrl(url) {
  if (!url) return '';
  try {
    const u = new URL(url);
    const base = u.hostname + (u.pathname.length > 1 ? u.pathname.slice(0,28) : '');
    return base.length < url.length ? base + '…' : base;
  } catch(e) {
    return url.length > 40 ? url.slice(0, 40) + '…' : url;
  }
}

// ── Render ─────────────────────────────────────────────────────
function render(searchQuery = '') {
  const container = document.getElementById('groupsContainer');
  container.innerHTML = '';
  const q       = searchQuery.trim().toLowerCase();
  const starred = new Set(data.starredItems || []);
  let totalVisible = 0;

  // 헤더 버튼 상태 갱신
  const allOpen = data.groups.every(g => (data.expandedGroups||[]).includes(g.id));
  const btnExp  = document.getElementById('btnExpand');
  if (btnExp) btnExp.textContent = allOpen ? '전체 닫기' : '전체 펼침';
  const btnStar = document.getElementById('btnStarOnly');
  if (btnStar) btnStar.classList.toggle('active', starFilter);

  data.groups.forEach(group => {
    const items = data.items.filter(it => {
      if (it.gid !== group.id) return false;
      if (starFilter && !starred.has(it.id)) return false;
      if (!q) return true;
      return it.title.toLowerCase().includes(q) || (it.note || '').toLowerCase().includes(q);
    });

    if (q && items.length === 0) return;
    totalVisible += items.length;

    const isOpen = q ? true : (data.expandedGroups || []).includes(group.id);
    const block  = document.createElement('div');
    block.className = 'group-block';

    // 항목 행 생성
    let bodyHtml = '';
    if (items.length) {
      items.forEach(item => {
        const bg       = itemBg(group.color);
        const revealed = revealedUrls.has(item.id);
        const urlText  = item.url ? truncateUrl(item.url) : '(URL 없음)';
        const isStarred = starred.has(item.id);
        bodyHtml += `
          <div class="item-row" id="irow-${item.id}"
               style="background:${bg}"
               draggable="false"
               data-id="${item.id}" data-gid="${group.id}"
               ondragover="onDragOver(event)"
               ondragleave="onDragLeave(event)"
               ondrop="onDrop(event,'${group.id}')">
            <div class="item-icon"
                 data-id="${item.id}"
                 onmousedown="onIconMouseDown(event)"
                 ontouchstart="onIconMouseDown(event)">
              ${getUrlIcon(item.url)}
            </div>
            <div class="item-left" onclick="toggleUrlReveal('${item.id}')">
              <div class="item-info">
                <div class="item-title-wrap">
                  <span class="url-dot ${item.url ? 'has-url' : 'no-url'}"></span>
                  <span class="item-title">${escHtml(item.title)}</span>
                  <span class="url-reveal${revealed ? ' show' : ''}" id="urlrev-${item.id}">${escHtml(urlText)}</span>
                </div>
                ${item.note ? `<div class="item-note">${escHtml(item.note)}</div>` : ''}
              </div>
            </div>
            <div class="item-actions">
              <button class="act-btn star${isStarred ? ' on' : ''}" title="${isStarred ? '별표 해제':'별표 추가'}"
                onclick="toggleStar('${item.id}')">${isStarred ? '★' : '☆'}</button>
              <button class="act-btn" title="새 탭으로 열기"
                onclick="openUrl('${escAttr(item.url)}','${escAttr(item.title)}')">↗</button>
              <button class="act-btn gear" title="항목 설정"
                onclick="openItemModal('${item.id}')">⚙</button>
              <button class="act-btn" title="URL 복사" id="copy-${item.id}"
                onclick="copyUrl('${escAttr(item.url)}','${item.id}')">⎘</button>
            </div>
          </div>`;
      });
    } else {
      bodyHtml = `<div class="empty-group">항목 없음</div>`;
    }

    // 항목 추가 버튼
    bodyHtml += `<div class="add-item-row">
      <button class="add-item-btn" onclick="addItemToGroup('${group.id}')">+ 항목 추가</button>
    </div>`;

    block.innerHTML = `
      <div class="group-header" onclick="toggleGroup('${group.id}')">
        <div class="group-header-left">
          <span class="group-color-bar" style="background:${group.color}"></span>
          <span class="group-name">${escHtml(group.name)}</span>
          <span class="group-count">${items.length}</span>
        </div>
        <span class="group-chevron ${isOpen ? 'open' : ''}">▶</span>
      </div>
      <div class="group-body ${isOpen ? 'open' : ''}" id="body-${group.id}">
        <div class="group-body-inner">${bodyHtml}</div>
      </div>`;

    container.appendChild(block);
  });

  document.getElementById('emptyMsg').style.display = (q && totalVisible === 0) ? 'block' : 'none';
}

function toggleGroup(gid) {
  if (!data.expandedGroups) data.expandedGroups = [];
  const idx = data.expandedGroups.indexOf(gid);
  if (idx >= 0) data.expandedGroups.splice(idx, 1);
  else          data.expandedGroups.push(gid);
  saveData();

  const body    = document.getElementById('body-' + gid);
  const chevron = body.previousElementSibling.querySelector('.group-chevron');
  const isOpen  = data.expandedGroups.includes(gid);
  body.classList.toggle('open', isOpen);
  chevron.classList.toggle('open', isOpen);
}

// ── URL 토글 표시 (수정6) ──────────────────────────────────────
function toggleUrlReveal(itemId) {
  if (revealedUrls.has(itemId)) {
    revealedUrls.delete(itemId);
  } else {
    revealedUrls.add(itemId);
  }
  const el = document.getElementById('urlrev-' + itemId);
  if (el) el.classList.toggle('show', revealedUrls.has(itemId));
}

// ── URL / Copy ─────────────────────────────────────────────────
function openUrl(url) {
  if (!url || !url.trim()) { showToast('⚠ URL이 비어있습니다. ⚙ 버튼에서 입력해주세요.'); return; }
  window.open(url, '_blank', 'noopener');
}

function copyUrl(url, itemId) {
  if (!url || !url.trim()) { showToast('⚠ URL이 비어있습니다.'); return; }
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copy-' + itemId);
    if (btn) {
      btn.classList.add('copied');
      btn.textContent = '✓';
      setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '⎘'; }, 1600);
    }
    showToast('✓ URL이 복사됐습니다');
  }).catch(() => showToast('복사 실패 — 브라우저 권한을 확인하세요'));
}

function onSearch(val) { render(val); }

// ── 별표 ───────────────────────────────────────────────────────
function toggleStar(itemId) {
  if (!data.starredItems) data.starredItems = [];
  const idx = data.starredItems.indexOf(itemId);
  if (idx >= 0) data.starredItems.splice(idx, 1);
  else          data.starredItems.push(itemId);
  saveData();
  render(document.getElementById('searchInput').value);
}

function toggleStarFilter() {
  starFilter = !starFilter;
  render(document.getElementById('searchInput').value);
}

// ── 전체 펼침 / 전체 닫기 ──────────────────────────────────────
function toggleAllGroups() {
  if (!data.expandedGroups) data.expandedGroups = [];
  const allOpen = data.groups.every(g => data.expandedGroups.includes(g.id));
  if (allOpen) {
    data.expandedGroups = [];
  } else {
    data.expandedGroups = data.groups.map(g => g.id);
  }
  saveData();
  render(document.getElementById('searchInput').value);
}

// ── Drag & Drop (수정2) ────────────────────────────────────────
let dragSrcId  = null;
let dragSrcGid = null;
let dragEnabled = false;

function onIconMouseDown(e) {
  const icon = e.currentTarget;
  const row  = icon.closest('.item-row');
  if (!row) return;
  dragEnabled = true;
  row.setAttribute('draggable', 'true');
  row.addEventListener('dragstart', onDragStart, { once: true });
  // 드래그 종료 시 draggable 해제
  row.addEventListener('dragend', onDragEnd, { once: true });
}

function onDragStart(e) {
  if (!dragEnabled) { e.preventDefault(); return; }
  dragSrcId  = e.currentTarget.dataset.id;
  dragSrcGid = e.currentTarget.dataset.gid;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragSrcId);
}

function onDragEnd(e) {
  dragEnabled = false;
  e.currentTarget.setAttribute('draggable', 'false');
  e.currentTarget.classList.remove('dragging');
  // 모든 drag-over 제거
  document.querySelectorAll('.item-row.drag-over').forEach(r => r.classList.remove('drag-over'));
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const row = e.currentTarget;
  if (row.dataset.id !== dragSrcId && row.dataset.gid === dragSrcGid) {
    row.classList.add('drag-over');
  }
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e, gid) {
  e.preventDefault();
  const targetRow = e.currentTarget;
  targetRow.classList.remove('drag-over');

  const targetId = targetRow.dataset.id;
  if (!dragSrcId || dragSrcId === targetId || gid !== dragSrcGid) return;

  const srcIdx = data.items.findIndex(it => it.id === dragSrcId);
  const tgtIdx = data.items.findIndex(it => it.id === targetId);
  if (srcIdx === -1 || tgtIdx === -1) return;

  const [moved] = data.items.splice(srcIdx, 1);
  data.items.splice(tgtIdx, 0, moved);
  saveData();
  render();
  dragSrcId = null;
  dragSrcGid = null;
}

// ── Toast ───────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Settings Panel (카테고리만) ────────────────────────────────
function openSettings() {
  renderGroupEditors();
  document.getElementById('settingsPanel').classList.add('show');
  document.getElementById('panelBackdrop').classList.add('show');
}

function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('show');
  document.getElementById('panelBackdrop').classList.remove('show');
}

function renderGroupEditors() {
  const el = document.getElementById('groupEditorList');
  el.innerHTML = '';
  data.groups.forEach((g, gi) => {
    const swatches = GROUP_COLORS.map(c => `
      <div class="color-swatch ${g.color===c?'active':''}"
           style="background:${c}"
           onclick="updateGroupColor(${gi},'${c}')"></div>
    `).join('');
    const card = document.createElement('div');
    card.className = 'editor-card';
    card.innerHTML = `
      <div class="editor-row">
        <label class="editor-label">카테고리명</label>
        <input class="editor-input" value="${escAttr(g.name)}" oninput="updateGroupName(${gi},this.value)">
      </div>
      <div class="editor-row">
        <label class="editor-label">색상</label>
        <div class="color-swatch-row">${swatches}</div>
      </div>
      <div class="editor-actions">
        <button class="small-btn" onclick="moveGroupUp(${gi})">↑ 위로</button>
        <button class="small-btn" onclick="moveGroupDown(${gi})">↓ 아래로</button>
        <button class="small-btn danger" onclick="deleteGroup(${gi})">삭제</button>
      </div>`;
    el.appendChild(card);
  });
}

// Group CRUD
function addGroup() {
  const id = 'g' + Date.now();
  data.groups.push({ id, name: '새 카테고리', color: GROUP_COLORS[0] });
  saveData(); renderGroupEditors(); render();
}

function updateGroupName(i, v)  { data.groups[i].name  = v; saveData(); render(); }
function updateGroupColor(i, c) { data.groups[i].color = c; saveData(); render(); renderGroupEditors(); }

function moveGroupUp(i) {
  if (i === 0) return;
  [data.groups[i-1], data.groups[i]] = [data.groups[i], data.groups[i-1]];
  saveData(); renderGroupEditors(); render();
}

function moveGroupDown(i) {
  if (i >= data.groups.length-1) return;
  [data.groups[i+1], data.groups[i]] = [data.groups[i], data.groups[i+1]];
  saveData(); renderGroupEditors(); render();
}

function deleteGroup(i) {
  if (!confirm(`"${data.groups[i].name}" 카테고리를 삭제할까요?\n소속 항목도 함께 삭제됩니다.`)) return;
  const gid = data.groups[i].id;
  data.items  = data.items.filter(it => it.gid !== gid);
  data.groups.splice(i, 1);
  saveData(); renderGroupEditors(); render();
}

// ── Item Modal (수정3) ─────────────────────────────────────────
function openItemModal(itemId) {
  const item = data.items.find(it => it.id === itemId);
  if (!item) return;
  modalItemId = itemId;

  // 그룹 select 채우기
  const sel = document.getElementById('mItemGroup');
  sel.innerHTML = data.groups.map(g =>
    `<option value="${g.id}" ${item.gid===g.id?'selected':''}>${escHtml(g.name)}</option>`
  ).join('');

  document.getElementById('mItemTitle').value = item.title || '';
  document.getElementById('mItemUrl').value   = item.url   || '';
  document.getElementById('mItemNote').value  = item.note  || '';

  document.getElementById('itemModalBackdrop').classList.add('show');
}

function closeItemModal(e) {
  if (e && e.target !== document.getElementById('itemModalBackdrop')) return;
  document.getElementById('itemModalBackdrop').classList.remove('show');
  modalItemId = null;
}

// ESC 키로 모달 닫기
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('itemModalBackdrop').classList.remove('show');
    modalItemId = null;
  }
});

function saveItemModal() {
  if (!modalItemId) return;
  const idx = data.items.findIndex(it => it.id === modalItemId);
  if (idx === -1) return;

  data.items[idx].gid   = document.getElementById('mItemGroup').value;
  data.items[idx].title = document.getElementById('mItemTitle').value.trim() || '제목 없음';
  data.items[idx].url   = document.getElementById('mItemUrl').value.trim();
  data.items[idx].note  = document.getElementById('mItemNote').value.trim();

  saveData();
  render();
  document.getElementById('itemModalBackdrop').classList.remove('show');
  modalItemId = null;
  showToast('✓ 저장됐습니다');
}

function deleteItemFromModal() {
  if (!modalItemId) return;
  const item = data.items.find(it => it.id === modalItemId);
  if (!item) return;
  if (!confirm(`"${item.title}"을(를) 삭제할까요?`)) return;
  data.items = data.items.filter(it => it.id !== modalItemId);
  saveData();
  render();
  document.getElementById('itemModalBackdrop').classList.remove('show');
  modalItemId = null;
  showToast('✓ 삭제됐습니다');
}

function addItemToGroup(gid) {
  const id = 'i' + Date.now();
  data.items.push({ id, gid, title: '새 항목', note: '', url: '' });
  saveData();
  render();
  // 바로 모달 열기
  openItemModal(id);
}

// ── Utils ───────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function escAttr(s) { return escHtml(s); }

// ── Init ────────────────────────────────────────────────────────
initPINScreen();
</script>

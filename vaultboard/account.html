<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account - Private Vault Board</title>
  <link rel="stylesheet" href="assets/css/common.css" />
  <script src="assets/js/app-data.js"></script>
  <script src="assets/js/common.js"></script>
</head>
<body data-require-auth="true">
  <div data-include="site-header"></div>
  <main class="container" style="max-width:900px;">
    <section class="page-head">
      <div>
        <h1>내 계정</h1>
        <p>표시 이름 변경, 비밀번호 변경, 로그아웃, 탈퇴를 관리합니다.</p>
      </div>
    </section>
    <div data-trial-banner></div>
    <div class="grid cols-2" style="margin-top:16px;">
      <section class="card">
        <h2>계정 정보</h2>
        <form id="accountForm" class="form">
          <div class="field"><label>ID</label><input id="username" disabled /></div>
          <div class="field"><label>표시 이름</label><input id="displayName" /></div>
          <div class="field"><label>새 비밀번호</label><input id="newPassword" type="password" /></div>
          <div id="accountMsg" class="help"></div>
          <div class="button-row"><button class="btn primary" type="submit">저장</button></div>
        </form>
      </section>
      <section class="card">
        <h2>계정 상태</h2>
        <div id="accountState"></div>
        <div class="button-row" style="margin-top:16px;">
          <button class="btn" id="logoutBtn" type="button">로그아웃</button>
          <button class="btn danger" id="deleteBtn" type="button">회원 탈퇴</button>
        </div>
      </section>
    </div>
  </main>
  <div data-include="site-footer"></div>
  <script>
    const user = AppDB.currentUser();
    username.value = user.username; displayName.value = user.displayName || '';
    document.getElementById('accountState').innerHTML = `
      <p><strong>권한</strong>: ${user.role}</p>
      <p><strong>상태</strong>: <span class="badge ${user.status==='active'?'ok':'warn'}">${user.status}</span></p>
      <p class="notice">Trial 상태에서는 관리자 승인 전 데이터가 언제든 삭제될 수 있습니다.</p>`;
    document.getElementById('accountForm').addEventListener('submit', e=>{
      e.preventDefault();
      AppDB.updateOwnAccount(user.id, { displayName: displayName.value.trim(), password: newPassword.value ? newPassword.value : undefined });
      accountMsg.textContent = '저장되었습니다.';
      if(newPassword.value) newPassword.value='';
    });
    logoutBtn.addEventListener('click', ()=>{ AppDB.logout(); location.href='login.html'; });
    deleteBtn.addEventListener('click', ()=>{
      if(!confirm('정말 탈퇴하시겠습니까? 내 데이터도 함께 삭제됩니다.')) return;
      AppDB.deleteOwnAccount(user.id); location.href='index.html';
    });
  </script>
</body>
</html>

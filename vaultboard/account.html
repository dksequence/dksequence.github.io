<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account - Private Vault Board</title>
  <link rel="stylesheet" href="./assets/css/common.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/js/supabase-config.js"></script>
  <script src="./assets/js/supabase-client.js"></script>
  <script src="./assets/js/app-data.js"></script>
  <script src="./assets/js/common.js"></script>
</head>
<body data-require-auth="true">
  <div data-include="site-header"></div>
  <main class="container" style="max-width:900px;">
    <section class="page-head">
      <div>
        <h1>My account</h1>
        <p>Manage display name change, password change, logout, and leave</p>
      </div>
    </section>
    <div data-trial-banner></div>

    <div class="grid cols-2" style="margin-top:16px;">
      <section class="card">
        <h2>Account Information</h2>
        <form id="accountForm" class="form">
          <div class="field">
            <label>E-MAIL / ID</label>
            <input id="usernameDisplay" disabled />
          </div>
          <div class="field">
            <label for="displayName">Display Name</label>
            <input id="displayName" />
          </div>
          <div class="field">
            <label for="newPassword">New password</label>
            <input id="newPassword" type="password" placeholder="Enter only if you change" />
          </div>
          <div id="accountMsg" class="help"></div>
          <div class="button-row">
            <button class="btn primary" type="submit" id="saveBtn">Storage</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Account Status</h2>
        <div id="accountState"></div>
        <div class="button-row" style="margin-top:16px;">
          <button class="btn" id="logoutBtn" type="button">Sign out</button>
          <button class="btn danger" id="deleteBtn" type="button">Membership Withdrawal</button>
        </div>
      </section>
    </div>
  </main>
  <div data-include="site-footer"></div>

  <script>
    const user = AppDB.getCurrentUser();
    if (!user) { location.href = './login.html'; }

    document.getElementById('usernameDisplay').value = user.username || '';
    document.getElementById('displayName').value     = user.display_name || '';

    document.getElementById('accountState').innerHTML = `
      <p><strong>권한</strong>: ${AppDB.esc(user.role)}</p>
      <p><strong>상태</strong>: <span class="badge ${user.status === 'active' ? 'ok' : 'warn'}">${AppDB.esc(user.status)}</span></p>
      <p class="notice" style="margin-top:12px;">In the Trial state, data before administrator approval can be deleted at any time</p>`;

    /* ── 계정 정보 저장 ─────────────────────────────────── */
    document.getElementById('accountForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const msg     = document.getElementById('accountMsg');
      const saveBtn = document.getElementById('saveBtn');
      msg.textContent = '';
      msg.style.color = '';
      saveBtn.disabled = true;

      const displayName = document.getElementById('displayName').value.trim();
      const newPassword = document.getElementById('newPassword').value;

      const result = await AppDB.updateOwnAccount(user.id, {
        displayName: displayName || undefined,
        password:    newPassword || undefined
      });

      if (!result.ok) {
        msg.textContent = result.error || '저장에 실패했습니다.';
        msg.style.color = '#ff6b6b';
      } else {
        msg.textContent = '저장되었습니다.';
        document.getElementById('newPassword').value = '';
      }
      saveBtn.disabled = false;
    });

    /* ── 로그아웃 ──────────────────────────────────────── */
    document.getElementById('logoutBtn').addEventListener('click', async function () {
      await AppDB.logout();
      location.href = './login.html';
    });

    /* ── 회원 탈퇴 ─────────────────────────────────────── */
    document.getElementById('deleteBtn').addEventListener('click', async function () {
      if (!confirm('Are you sure you want to leave? My data will also be deleted')) return;
      const btn = document.getElementById('deleteBtn');
      btn.disabled = true;
      await AppDB.deleteOwnAccount(user.id);
      location.href = './index.html';
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Private Vault Board</title>

  <link rel="stylesheet" href="./assets/css/common.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/js/supabase-config.js"></script>
  <script src="./assets/js/supabase-client.js"></script>
  <script src="./assets/js/common.js"></script>
</head>
<body>
  <div data-include="site-header"></div>

  <main class="container">
    <section class="page-head">
      <div>
        <h1>내 대시보드</h1>
        <p>현재 단계는 읽기 전용입니다. Supabase에서 내 카테고리와 내 서비스 목록만 불러옵니다.</p>
      </div>
      <div class="button-row">
        <a class="btn" href="./account.html">내 계정</a>
      </div>
    </section>

    <div data-trial-banner></div>

    <section class="stats" id="dashStats" style="margin:16px 0;"></section>

    <div class="grid cols-2">
      <section class="card">
        <div class="section-title">
          <h2>카테고리</h2>
          <span class="small">Supabase Read Only</span>
        </div>
        <div id="categoryList" class="category-list"></div>
      </section>

      <section class="card">
        <div class="section-title">
          <h2>서비스 목록</h2>
          <span class="small">Supabase Read Only</span>
        </div>
        <div id="serviceList" class="service-list"></div>
      </section>
    </div>

    <section class="card" style="margin-top:16px;">
      <div class="section-title">
        <h2>현재 상태</h2>
      </div>
      <div id="dashboardStatus" class="notice">불러오는 중...</div>
    </section>
  </main>

  <div data-include="site-footer"></div>

  <script>
    const stats = document.getElementById('dashStats');
    const categoryList = document.getElementById('categoryList');
    const serviceList = document.getElementById('serviceList');
    const dashboardStatus = document.getElementById('dashboardStatus');

    function money(value) {
      return Number(value || 0).toLocaleString('ko-KR') + '원';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderStats(categories, services) {
      const paid = services.filter(s => s.plan === 'Paid').length;
      const cost = services.reduce((sum, s) => sum + Number(s.monthly_cost || 0), 0);

      stats.innerHTML = `
        <div class="stat">
          <div class="label">카테고리</div>
          <div class="value">${categories.length}</div>
        </div>
        <div class="stat">
          <div class="label">서비스</div>
          <div class="value">${services.length}</div>
        </div>
        <div class="stat">
          <div class="label">유료</div>
          <div class="value">${paid}</div>
        </div>
        <div class="stat">
          <div class="label">월 총 비용</div>
          <div class="value">${money(cost)}</div>
        </div>
      `;
    }

    function renderCategories(categories) {
      categoryList.innerHTML =
        categories.map(category => `
          <div class="item">
            <div class="item-head">
              <div class="item-title">${escapeHtml(category.name)}</div>
              <div class="item-meta">
                <span class="small">order: ${category.sort_order}</span>
              </div>
            </div>
          </div>
        `).join('') || '<div class="empty">카테고리가 없습니다.</div>';
    }

    function renderServices(categories, services) {
      const categoryMap = Object.fromEntries(
        categories.map(category => [category.id, category.name])
      );

      serviceList.innerHTML =
        services.map(service => `
          <div class="item">
            <div class="item-head">
              <div class="item-title">
                ${service.important ? '★' : '☆'} ${escapeHtml(service.title)}
              </div>
              <div class="item-meta">
                <span class="badge ${service.plan === 'Paid' ? 'warn' : 'info'}">${escapeHtml(service.plan)}</span>
                <span class="small">${money(service.monthly_cost || 0)}</span>
              </div>
            </div>

            <p style="margin:12px 0 0;">${escapeHtml(service.summary || '-')}</p>

            <div class="small" style="margin-top:10px;">
              Category: ${escapeHtml(categoryMap[service.category_id] || '-')}
              / ID: ${escapeHtml(service.login_id || '-')}
              / PASS: ${escapeHtml(service.login_pass || '-')}
            </div>

            <div class="small" style="margin-top:8px;">
              URL: ${service.url ? `<a href="${escapeHtml(service.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(service.url)}</a>` : '-'}
            </div>

            <div class="small" style="margin-top:8px;">
              Memo: ${escapeHtml(service.memo || '-')}
            </div>
          </div>
        `).join('') || '<div class="empty">등록된 서비스가 없습니다.</div>';
    }

    async function loadDashboard() {
      dashboardStatus.textContent = '세션 확인 중...';

      if (!window.supabaseClient) {
        dashboardStatus.textContent = 'Supabase client가 준비되지 않았습니다.';
        return;
      }

      const { data: userData, error: userError } = await window.supabaseClient.auth.getUser();

      if (userError || !userData || !userData.user) {
        localStorage.removeItem('vaultboard_supabase_user');
        location.href = './login.html';
        return;
      }

      dashboardStatus.textContent = '프로필 확인 중...';

      const { data: profile, error: profileError } = await window.supabaseClient
        .from('profiles')
        .select('id, username, display_name, role, status')
        .eq('id', userData.user.id)
        .single();

      if (profileError || !profile) {
        console.error('Profile fetch error:', profileError);
        dashboardStatus.textContent = '프로필을 불러오지 못했습니다.';
        return;
      }

      if (profile.status === 'disabled') {
        await window.supabaseClient.auth.signOut();
        localStorage.removeItem('vaultboard_supabase_user');
        location.href = './login.html';
        return;
      }

      localStorage.setItem('vaultboard_supabase_user', JSON.stringify(profile));

      dashboardStatus.textContent = '카테고리 불러오는 중...';

      const { data: categories, error: categoriesError } = await window.supabaseClient
        .from('categories')
        .select('id, name, sort_order')
        .order('sort_order', { ascending: true });

      if (categoriesError) {
        console.error('Categories fetch error:', categoriesError);
        dashboardStatus.textContent = '카테고리를 불러오지 못했습니다.';
        return;
      }

      dashboardStatus.textContent = '서비스 불러오는 중...';

      const { data: services, error: servicesError } = await window.supabaseClient
        .from('services')
        .select('id, category_id, title, url, summary, plan, monthly_cost, important, login_id, login_pass, memo, created_at')
        .order('created_at', { ascending: false });

      if (servicesError) {
        console.error('Services fetch error:', servicesError);
        dashboardStatus.textContent = '서비스를 불러오지 못했습니다.';
        return;
      }

      renderStats(categories || [], services || []);
      renderCategories(categories || []);
      renderServices(categories || [], services || []);

      dashboardStatus.innerHTML = `
        <span class="badge ${profile.status === 'active' ? 'ok' : 'warn'}">${escapeHtml(profile.status)}</span>
        <span style="margin-left:8px;">${escapeHtml(profile.display_name || profile.username || '사용자')} 님의 데이터를 읽었습니다.</span>
      `;
    }

    document.addEventListener('DOMContentLoaded', loadDashboard);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Private Vault Board</title>
  <link rel="stylesheet" href="assets/css/common.css" />
  <script src="assets/js/app-data.js"></script>
  <script src="assets/js/common.js"></script>
</head>
<body data-require-auth="true">
  <div data-include="site-header"></div>
  <main class="container">
    <section class="page-head">
      <div>
        <h1>내 대시보드</h1>
        <p>가짜 ID/PASS만 기록하는 개인용 보드입니다. 관리자만 전체 사용자를 열람할 수 있고, 일반 사용자는 자기 데이터만 관리합니다.</p>
      </div>
      <div class="button-row">
        <a class="btn" href="account.html">내 계정</a>
      </div>
    </section>

    <div data-trial-banner></div>

    <section class="stats" id="dashStats" style="margin:16px 0;"></section>

    <div class="grid cols-2">
      <section class="card">
        <div class="section-title">
          <h2>카테고리</h2>
        </div>
        <form id="categoryForm" class="inline-form" style="margin-bottom:14px;">
          <input id="categoryName" type="text" placeholder="새 카테고리 이름" required />
          <button class="btn primary" type="submit">추가</button>
        </form>
        <div id="categoryList" class="category-list"></div>
      </section>

      <section class="card">
        <div class="section-title">
          <h2>서비스 추가 / 수정</h2>
          <span class="small">Tab으로 입력 이동</span>
        </div>
        <form id="serviceForm" class="form-grid">
          <input type="hidden" id="serviceId" />
          <div class="field"><label for="title">서비스명</label><input id="title" required /></div>
          <div class="field"><label for="categoryId">카테고리</label><select id="categoryId" required></select></div>
          <div class="field"><label for="url">URL</label><input id="url" /></div>
          <div class="field"><label for="plan">요금제</label><select id="plan"><option>Free</option><option>Paid</option></select></div>
          <div class="field"><label for="monthlyCost">월 비용</label><input id="monthlyCost" type="number" min="0" value="0" /></div>
          <div class="field"><label for="important">중요</label><select id="important"><option value="false">일반</option><option value="true">중요</option></select></div>
          <div class="field"><label for="loginId">ID</label><input id="loginId" placeholder="가짜 ID만 저장" /></div>
          <div class="field"><label for="loginPass">PASS</label><input id="loginPass" placeholder="가짜 PASS만 저장" /></div>
          <div class="field full"><label for="summary">요약</label><input id="summary" /></div>
          <div class="field full"><label for="memo">메모</label><textarea id="memo"></textarea></div>
          <div class="field full"><div class="button-row"><button class="btn primary" type="submit">저장</button><button class="btn" id="resetFormBtn" type="button">폼 초기화</button></div></div>
        </form>
      </section>
    </div>

    <section class="card" style="margin-top:16px;">
      <div class="section-title">
        <h2>내 서비스 목록</h2>
      </div>
      <div id="serviceList" class="service-list"></div>
    </section>
  </main>
  <div data-include="site-footer"></div>

  <script>
    const user = AppDB.currentUser();
    const categoryList = document.getElementById('categoryList');
    const serviceList = document.getElementById('serviceList');
    const categorySelect = document.getElementById('categoryId');
    const stats = document.getElementById('dashStats');

    function renderStats(){
      const services = AppDB.userServices(user.id);
      const paid = services.filter(s=>s.plan==='Paid').length;
      const importantCount = services.filter(s=>s.important).length;
      const cost = services.reduce((sum,s)=>sum + Number(s.monthlyCost||0),0);
      stats.innerHTML = `
        <div class="stat"><div class="label">카테고리</div><div class="value">${AppDB.userCategories(user.id).length}</div></div>
        <div class="stat"><div class="label">서비스</div><div class="value">${services.length}</div></div>
        <div class="stat"><div class="label">유료</div><div class="value">${paid}</div></div>
        <div class="stat"><div class="label">월 총 비용</div><div class="value">${AppDB.formatMoney(cost)}</div></div>`;
    }

    function renderCategories(){
      const categories = AppDB.userCategories(user.id);
      categorySelect.innerHTML = categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
      categoryList.innerHTML = categories.map(c => `
        <div class="item">
          <div class="item-head">
            <div class="item-title">${c.name}</div>
            <div class="button-row">
              <button class="btn ghost" type="button" onclick="renameCategory('${c.id}','${c.name.replace(/'/g, "\\'")}')">이름 변경</button>
              <button class="btn danger" type="button" onclick="removeCategory('${c.id}')">삭제</button>
            </div>
          </div>
        </div>`).join('') || '<div class="empty">카테고리가 없습니다.</div>';
    }

    function renderServices(){
      const services = AppDB.userServices(user.id);
      const catMap = Object.fromEntries(AppDB.userCategories(user.id).map(c=>[c.id,c.name]));
      serviceList.innerHTML = services.map(s => `
        <div class="item">
          <div class="item-head">
            <div class="item-title">${s.important ? '★' : '☆'} ${s.title}</div>
            <div class="item-meta">
              <span class="badge ${s.plan==='Paid'?'warn':'info'}">${s.plan}</span>
              <span class="small">${AppDB.formatMoney(s.monthlyCost||0)}</span>
            </div>
          </div>
          <p style="margin:12px 0 0;">${s.summary || '-'}</p>
          <div class="small" style="margin-top:10px;">Category: ${catMap[s.categoryId] || '-'} / ID: ${s.loginId || '-'} / PASS: ${s.loginPass || '-'}</div>
          <div class="button-row" style="margin-top:12px;">
            <button class="btn" type="button" onclick="editService('${s.id}')">수정</button>
            <button class="btn danger" type="button" onclick="deleteServiceItem('${s.id}')">삭제</button>
          </div>
        </div>`).join('') || '<div class="empty">등록된 서비스가 없습니다.</div>';
    }

    window.renameCategory = function(catId, currentName){
      const name = prompt('새 카테고리 이름', currentName);
      if(!name) return;
      AppDB.updateCategory(catId, name);
      renderAll();
    }
    window.removeCategory = function(catId){
      if(!confirm('이 카테고리를 삭제하시겠습니까? 서비스는 ETC로 이동합니다.')) return;
      AppDB.deleteCategory(catId); renderAll();
    }
    window.editService = function(serviceId){
      const svc = AppDB.userServices(user.id).find(s=>s.id===serviceId); if(!svc) return;
      document.getElementById('serviceId').value = svc.id;
      title.value = svc.title; categoryId.value = svc.categoryId; url.value = svc.url || '';
      plan.value = svc.plan || 'Free'; monthlyCost.value = svc.monthlyCost || 0; important.value = String(!!svc.important);
      loginId.value = svc.loginId || ''; loginPass.value = svc.loginPass || ''; summary.value = svc.summary || ''; memo.value = svc.memo || '';
      title.focus();
    }
    window.deleteServiceItem = function(serviceId){
      if(!confirm('이 서비스를 삭제하시겠습니까?')) return;
      AppDB.deleteService(user.id, serviceId); renderAll();
    }

    function resetForm(){ serviceForm.reset(); serviceId.value=''; monthlyCost.value=0; important.value='false'; }
    function renderAll(){ renderStats(); renderCategories(); renderServices(); }

    document.getElementById('categoryForm').addEventListener('submit', e=>{
      e.preventDefault();
      AppDB.addCategory(user.id, categoryName.value.trim());
      categoryName.value=''; renderAll();
    });

    document.getElementById('serviceForm').addEventListener('submit', e=>{
      e.preventDefault();
      AppDB.saveService(user.id, {
        id: serviceId.value || undefined,
        title: title.value.trim(), categoryId: categoryId.value, url: url.value.trim(), summary: summary.value.trim(),
        plan: plan.value, monthlyCost: Number(monthlyCost.value||0), important: important.value === 'true',
        loginId: loginId.value.trim(), loginPass: loginPass.value.trim(), memo: memo.value.trim()
      });
      resetForm(); renderAll();
    });

    document.getElementById('resetFormBtn').addEventListener('click', resetForm);
    renderAll();
  </script>
</body>
</html>

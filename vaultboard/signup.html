<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Private Vault Board</title>
  <link rel="stylesheet" href="./assets/css/common.css" />
  <script src="./assets/js/app-data.js"></script>
  <script src="./assets/js/common.js"></script>
</head>
<body>
  <div data-include="site-header"></div>
  <main class="container" style="max-width:860px;">
    <section class="page-head">
      <div>
        <h1>회원가입</h1>
        <p>가입 즉시 Trial 계정으로 바로 사용할 수 있습니다. 단, 최종 승인 전 데이터는 언제든 삭제될 수 있습니다.</p>
      </div>
    </section>

    <div class="alert trial" style="margin-bottom:16px;">가입 직후 바로 기능을 써볼 수 있습니다. 하지만 Trial 상태에서는 관리자 판단에 따라 데이터가 삭제될 수 있습니다.</div>

    <section class="card">
      <form id="signupForm" class="form-grid">
        <div class="field">
          <label for="displayName">표시 이름</label>
          <input id="displayName" type="text" required />
        </div>
        <div class="field">
          <label for="username">사용할 ID</label>
          <input id="username" type="text" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" required />
        </div>
        <div class="field">
          <label for="password2">Password 확인</label>
          <input id="password2" type="password" required />
        </div>
        <div class="field full">
          <div id="signupMsg" class="help"></div>
        </div>
        <div class="field full">
          <div class="button-row">
            <button class="btn primary" type="submit">가입하고 바로 사용하기</button>
            <a class="btn" href="./login.html">이미 계정 있음</a>
          </div>
        </div>
      </form>
    </section>
  </main>
  <div data-include="site-footer"></div>
  <script>
    document.getElementById('signupForm').addEventListener('submit', (e)=>{
      e.preventDefault();
      const msg = document.getElementById('signupMsg');
      msg.textContent = '';
      if(password.value !== password2.value){ msg.textContent = '비밀번호 확인이 일치하지 않습니다.'; return; }
      const res = AppDB.signup({ displayName: displayName.value.trim(), username: username.value.trim(), password: password.value });
      if(!res.ok){ msg.textContent = res.error; return; }
      location.href = './dashboard.html';
    });
  </script>
</body>
</html>

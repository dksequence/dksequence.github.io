<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin User Detail - Private Vault Board</title>
  <link rel="stylesheet" href="./assets/css/common.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/js/supabase-config.js"></script>
  <script src="./assets/js/supabase-client.js"></script>
  <script src="./assets/js/app-data.js"></script>
  <script src="./assets/js/common.js"></script>
</head>
<body data-require-auth="true" data-require-admin="true">
  <div data-include="site-header"></div>
  <main class="container">
    <section class="page-head">
      <div>
        <h1>Viewing User Details</h1>
        <p>Administrators can view all user data.</p>
      </div>
      <div class="button-row">
        <a class="btn" href="./admin.html">On the Administrator page</a>
      </div>
    </section>

    <section class="card" id="userInfo">
      <div class="notice">Bringing in...</div>
    </section>

    <div class="grid cols-2" style="margin-top:16px;">
      <section class="card">
        <h2>Category</h2>
        <div id="cats"><div class="notice">Loading...</div></div>
      </section>
      <section class="card">
        <h2>service</h2>
        <div id="svcs"><div class="notice">Loading...</div></div>
      </section>
    </div>
  </main>
  <div data-include="site-footer"></div>

  <script>
    const e = AppDB.esc;

    (async function () {
      const params = new URLSearchParams(location.search);
      const userId = params.get('userId');

      if (!userId) {
        document.getElementById('userInfo').innerHTML = '<div class="empty">userId No parameters.</div>';
        return;
      }

      const [user, categories, services] = await Promise.all([
        AppDB.getUserById(userId),
        AppDB.userCategories(userId),
        AppDB.userServices(userId)
      ]);

      if (!user) {
        document.getElementById('userInfo').innerHTML = '<div class="empty">User not found.</div>';
        document.getElementById('cats').innerHTML = '';
        document.getElementById('svcs').innerHTML = '';
        return;
      }

      document.getElementById('userInfo').innerHTML = `
        <h2>${e(user.displayName || user.username)}</h2>
        <p><strong>ID</strong>: ${e(user.username)}</p>
        <p><strong>권한</strong>: ${e(user.role)}</p>
        <p><strong>상태</strong>: <span class="badge ${user.status === 'active' ? 'ok' : user.status === 'trial' ? 'warn' : 'danger'}">${e(user.status)}</span></p>`;

      document.getElementById('cats').innerHTML =
        categories.map(c => `
          <div class="item">
            <div class="item-title">${e(c.name)}</div>
          </div>`).join('') || '<div class="empty">No Category</div>';

      document.getElementById('svcs').innerHTML =
        services.map(s => `
          <div class="item">
            <div class="item-title">${e(s.title)}</div>
            <div class="small" style="margin-top:8px;">
              ID: ${e(s.loginId || '-')} / PASS: ${e(s.loginPass || '-')} / ${AppDB.formatMoney(s.monthlyCost || 0)}
            </div>
            <p style="margin-top:10px;">${e(s.summary || '-')}</p>
          </div>`).join('') || '<div class="empty">no service</div>';
    })();
  </script>
</body>
</html>

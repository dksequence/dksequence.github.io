<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Private Vault Board</title>
  <link rel="stylesheet" href="./assets/css/common.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/js/supabase-config.js"></script>
  <script src="./assets/js/supabase-client.js"></script>
  <script src="./assets/js/app-data.js"></script>
  <script src="./assets/js/common.js"></script>
</head>
<body data-require-auth="true" data-require-admin="true">
  <div data-include="site-header"></div>
  <main class="container">
    <section class="page-head">
      <div>
        <h1>관리자 페이지</h1>
        <p>전체 사용자 상태, 승인 정원, Trial/Active 전환, 삭제, 상세 데이터 열람을 관리합니다.</p>
      </div>
    </section>

    <section class="card">
      <div class="section-title"><h2>활성 사용자 정원</h2></div>
      <form id="limitForm" class="inline-form">
        <input id="maxActive" type="number" min="0" />
        <button class="btn primary" type="submit">정원 저장</button>
      </form>
      <p class="notice" style="margin-top:12px;">
        Trial 사용자는 즉시 사용 가능하지만, 정식 Active 승인은 이 정원 안에서만 가능합니다.
      </p>
    </section>

    <section class="stats" id="adminStats" style="margin:16px 0;">
      <div class="stat"><div class="label">전체 사용자</div><div class="value" id="sTotal">—</div></div>
      <div class="stat"><div class="label">Trial</div><div class="value" id="sTrial">—</div></div>
      <div class="stat"><div class="label">Active</div><div class="value" id="sActive">—</div></div>
      <div class="stat"><div class="label">남은 승인 가능 수</div><div class="value" id="sRemain">—</div></div>
    </section>

    <section class="card">
      <div class="section-title"><h2>사용자 목록</h2></div>
      <div id="loadingMsg" class="notice" style="padding:12px;">불러오는 중...</div>
      <div class="table-wrap" id="tableWrap" style="display:none;">
        <table>
          <thead>
            <tr>
              <th>ID / 이름</th>
              <th>권한</th>
              <th>상태</th>
              <th>생성일</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="userRows"></tbody>
        </table>
      </div>
    </section>
  </main>
  <div data-include="site-footer"></div>

  <script>
    const e = AppDB.esc;

    async function renderAdmin() {
      document.getElementById('loadingMsg').style.display = 'block';
      document.getElementById('tableWrap').style.display  = 'none';

      const db = await AppDB.loadDB();

      document.getElementById('maxActive').value = db.settings.maxActiveUsers;

      const nonAdmins = db.users.filter(u => u.role !== 'admin');
      const trial    = nonAdmins.filter(u => u.status === 'trial').length;
      const active   = nonAdmins.filter(u => u.status === 'active').length;
      const disabled = nonAdmins.filter(u => u.status === 'disabled').length;

      document.getElementById('sTotal').textContent  = db.users.length;
      document.getElementById('sTrial').textContent  = trial;
      document.getElementById('sActive').textContent = active;
      document.getElementById('sRemain').textContent = Math.max(0, db.settings.maxActiveUsers - active);

      document.getElementById('userRows').innerHTML = db.users.map(u => `
        <tr>
          <td>
            <div>${e(u.username)}</div>
            <div class="small">${e(u.displayName || '-')}</div>
          </td>
          <td>${e(u.role)}</td>
          <td><span class="badge ${u.status === 'active' ? 'ok' : u.status === 'trial' ? 'warn' : 'danger'}">${e(u.status)}</span></td>
          <td class="small">${(u.createdAt || '').slice(0, 10)}</td>
          <td>
            <div class="button-row">
              ${u.role !== 'admin' ? `
                <button class="btn" type="button" data-action="approve" data-uid="${e(u.id)}">Approve</button>
                <button class="btn" type="button" data-action="trial"   data-uid="${e(u.id)}">Trial</button>
                <button class="btn" type="button" data-action="disable" data-uid="${e(u.id)}">Disable</button>
                <button class="btn danger" type="button" data-action="delete" data-uid="${e(u.id)}">Delete</button>
              ` : ''}
              <a class="btn ghost" href="admin-user.html?userId=${e(u.id)}">View</a>
            </div>
          </td>
        </tr>`).join('');

      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('tableWrap').style.display  = 'block';
    }

    /* ── 이벤트 위임 ────────────────────────────────────── */
    document.getElementById('userRows')?.addEventListener('click', async function (ev) {
      const btn = ev.target.closest('button[data-action]');
      if (!btn) return;
      const uid    = btn.dataset.uid;
      const action = btn.dataset.action;

      if (action === 'approve') {
        const r = await AppDB.adminApproveUser(uid);
        if (!r.ok) { alert(r.error); return; }
      } else if (action === 'trial') {
        await AppDB.adminRestoreTrial(uid);
      } else if (action === 'disable') {
        await AppDB.adminDisableUser(uid);
      } else if (action === 'delete') {
        if (!confirm('이 사용자를 삭제하시겠습니까? 해당 데이터도 모두 삭제됩니다.')) return;
        await AppDB.adminDeleteUser(uid);
      }
      await renderAdmin();
    });

    // 이벤트 위임은 DOMContentLoaded 이후 tbody가 생성되므로 document에 붙임
    document.addEventListener('click', async function (ev) {
      const btn = ev.target.closest('#userRows button[data-action]');
      if (!btn) return;
      const uid    = btn.dataset.uid;
      const action = btn.dataset.action;

      if (action === 'approve') {
        const r = await AppDB.adminApproveUser(uid);
        if (!r.ok) { alert(r.error); return; }
      } else if (action === 'trial') {
        await AppDB.adminRestoreTrial(uid);
      } else if (action === 'disable') {
        await AppDB.adminDisableUser(uid);
      } else if (action === 'delete') {
        if (!confirm('이 사용자를 삭제하시겠습니까? 해당 데이터도 모두 삭제됩니다.')) return;
        await AppDB.adminDeleteUser(uid);
      }
      await renderAdmin();
    });

    /* ── 정원 저장 ──────────────────────────────────────── */
    document.getElementById('limitForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      await AppDB.adminSetMaxActiveUsers(document.getElementById('maxActive').value);
      await renderAdmin();
    });

    renderAdmin();
  </script>
</body>
</html>

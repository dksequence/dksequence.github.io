<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const msg = document.getElementById('loginMsg');
    msg.textContent = '';

    const emailOrId = username.value.trim();
    const passwordValue = password.value;

    if (!window.supabaseClient) {
      msg.textContent = 'Supabase 연결이 준비되지 않았습니다.';
      return;
    }

    let loginEmail = emailOrId;

    // ID만 넣은 경우, profiles에서 username으로 이메일 찾기가 아직 없으므로
    // 현재는 이메일 로그인만 우선 사용
    if (!emailOrId.includes('@')) {
      msg.textContent = '현재는 이메일 형식으로 로그인해 주세요.';
      return;
    }

    const { data, error } = await window.supabaseClient.auth.signInWithPassword({
      email: loginEmail,
      password: passwordValue
    });

    if (error) {
      msg.textContent = error.message || '로그인에 실패했습니다.';
      return;
    }

    const user = data?.user;
    if (!user) {
      msg.textContent = '사용자 정보를 찾을 수 없습니다.';
      return;
    }

    const { data: profile, error: profileError } = await window.supabaseClient
      .from('profiles')
      .select('id, username, role, status')
      .eq('id', user.id)
      .single();

    if (profileError) {
      msg.textContent = '프로필 정보를 불러오지 못했습니다.';
      return;
    }

    if (profile.status === 'disabled') {
      await window.supabaseClient.auth.signOut();
      msg.textContent = '비활성화된 계정입니다.';
      return;
    }

    // 기존 common.js / 페이지 흐름과 맞추기 위한 임시 세션 저장
    localStorage.setItem('vaultboard_supabase_user', JSON.stringify(profile));

    location.href = './dashboard.html';
  });
</script>

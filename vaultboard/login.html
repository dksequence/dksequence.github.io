<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - VaultBoard</title>
  <link rel="stylesheet" href="./assets/css/common.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/js/supabase-config.js"></script>
  <script src="./assets/js/supabase-client.js"></script>
  <script src="./assets/js/app-data.js"></script>
  <script src="./assets/js/common.js"></script>
</head>
<body>
  <div data-include="site-header"></div>

  <main class="container" style="max-width:760px;">
    <section class="page-head">
      <div>
        <h1>로그인</h1>
        <p>이메일 / 비밀번호로 로그인합니다. Trial 계정도 로그인 가능합니다.</p>
      </div>
    </section>

    <section class="card">
      <form id="loginForm" class="form">
        <div class="field">
          <label for="email">이메일</label>
          <input id="email" type="email" required autofocus />
        </div>
        <div class="field">
          <label for="password">비밀번호</label>
          <input id="password" type="password" required />
        </div>
        <div id="loginMsg" class="help" style="color:#ff6b6b;"></div>
        <div class="button-row">
          <button class="btn primary" type="submit" id="submitBtn">로그인</button>
          <a class="btn" href="./signup.html">회원가입</a>
        </div>
      </form>
    </section>
  </main>

  <div data-include="site-footer"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const form      = document.getElementById('loginForm');
      const msg       = document.getElementById('loginMsg');
      const submitBtn = document.getElementById('submitBtn');

      // 이미 로그인 상태면 대시보드로
      if (AppDB.getCurrentUser()) {
        location.href = './dashboard.html';
        return;
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        msg.textContent = '';
        submitBtn.disabled = true;
        submitBtn.textContent = '로그인 중...';

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        const result = await AppDB.login({ email, password });

        if (!result.ok) {
          msg.textContent = result.error || '로그인에 실패했습니다.';
          submitBtn.disabled = false;
          submitBtn.textContent = '로그인';
          return;
        }

        location.href = './dashboard.html';
      });
    });
  </script>
</body>
</html>

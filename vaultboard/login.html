<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Private Vault Board</title>
  <link rel="stylesheet" href="./assets/css/common.css" />
  <script src="./assets/js/app-data.js"></script>
  <script src="./assets/js/common.js"></script>
</head>
<body>
  <div data-include="site-header"></div>
  <main class="container" style="max-width:760px;">
    <section class="page-head">
      <div>
        <h1>로그인</h1>
        <p>ID / Password가 일치하면 로그인됩니다. Trial 계정도 로그인은 가능합니다.</p>
      </div>
    </section>
    <section class="card">
      <form id="loginForm" class="form">
        <div class="field">
          <label for="username">ID</label>
          <input id="username" type="text" required autofocus />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" required />
        </div>
        <div id="loginMsg" class="help"></div>
        <div class="button-row">
          <button class="btn primary" type="submit">로그인</button>
          <a class="btn" href="./signup.html">회원가입</a>
        </div>
      </form>
      <p class="notice" style="margin-top:16px;">데모 관리자 계정: <span class="kbd">admin</span> / <span class="kbd">admin123!</span></p>
    </section>
  </main>
  <div data-include="site-footer"></div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', (e)=>{
      e.preventDefault();
      const res = AppDB.login({ username: username.value.trim(), password: password.value });
      const msg = document.getElementById('loginMsg');
      if(!res.ok){ msg.textContent = res.error; return; }
      location.href = './dashboard.html';
    });
  </script>
</body>
</html>

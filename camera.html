<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#000;font-family:'Inter',sans-serif;color:#fff;}
body{display:flex;flex-direction:column;height:100vh;}

#nameboard{
  background:#0a0a18;
  padding:14px 20px 10px;
  text-align:center;
  border-bottom:1px solid rgba(171,199,255,.3);
  flex-shrink:0;
}
#nb-time{font-size:16px;color:rgba(171,199,255,.6);letter-spacing:.1em;font-family:monospace;}
#nb-resno{font-size:14px;color:rgba(171,199,255,.35);letter-spacing:.08em;font-family:monospace;margin-bottom:4px;}
#nb-name{font-size:52px;font-weight:700;color:#fff;line-height:1.0;letter-spacing:-0.02em;}
#nb-product{font-size:18px;color:rgba(171,199,255,.6);margin-top:4px;}
#nb-brand{font-size:11px;color:rgba(255,255,255,.12);margin-top:4px;letter-spacing:.1em;}

#video-wrap{
  flex:1;
  position:relative;
  background:#000;
  overflow:hidden;
  min-height:0;
}
video{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  background:#06070a;
  opacity:.01;
  transform:translateZ(0);
  -webkit-transform:translateZ(0);
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  transition:opacity .18s ease;
}
#video-wrap.camera-ready video{opacity:1;}
#video-wrap::before{
  content:'카메라 프리뷰 준비 중';
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.45);font-size:16px;letter-spacing:.08em;z-index:0;
}
#video-wrap.camera-ready::before{display:none;}
#btn-flip,#btn-refresh{
  position:absolute;top:12px;left:12px;
  padding:10px 18px;border-radius:2rem;
  background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:16px;cursor:pointer;display:none;z-index:2;
}
#btn-refresh{left:auto;right:12px;top:56px;}
#cam-status{
  position:absolute;top:12px;right:12px;
  font-size:14px;color:rgba(255,255,255,.6);
  background:rgba(0,0,0,.45);padding:6px 12px;border-radius:1rem;
  z-index:2;
}

#btn-start{
  flex-shrink:0;
  width:100%;padding:26px;
  background:linear-gradient(135deg,#abc7ff,#0071e3);
  color:#fff;border:none;cursor:pointer;display:block;
}
#btn-start span.ko{font-size:26px;font-weight:800;display:block;}
#btn-start span.en{font-size:17px;font-weight:500;opacity:.85;display:block;margin-top:2px;}

#btn-shutter{
  flex-shrink:0;
  width:100%;padding:26px;
  background:linear-gradient(135deg,#abc7ff,#0071e3);
  color:#fff;border:none;cursor:pointer;display:none;
  box-shadow:0 -4px 24px rgba(0,113,227,.4);
}
#btn-shutter span.ko{font-size:26px;font-weight:800;display:block;}
#btn-shutter span.en{font-size:17px;font-weight:500;opacity:.85;display:block;margin-top:2px;}

@keyframes sv-spin{to{transform:rotate(360deg);}}
#saving-overlay{
  display:none;position:fixed;inset:0;z-index:50;
  background:#0a0a18;
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px;
}
#sv-icon{font-size:64px;line-height:1;margin-bottom:18px;}
#sv-spinner{
  width:72px;height:72px;border:7px solid rgba(171,199,255,.18);
  border-top:7px solid #abc7ff;border-radius:50%;
  animation:sv-spin .8s linear infinite;margin-bottom:28px;
}
#sv-text{
  font-size:30px;font-weight:700;color:#fff;
  white-space:pre-line;line-height:1.4;letter-spacing:-0.01em;
}
#sv-sub{font-size:16px;color:rgba(171,199,255,.55);margin-top:14px;letter-spacing:.05em;}
#sv-actions{display:none;margin-top:34px;gap:14px;flex-direction:column;width:100%;max-width:420px;}
#sv-actions button{
  width:100%;padding:20px;border-radius:1rem;border:none;cursor:pointer;
  font-size:20px;font-weight:700;
}
#sv-retry{background:linear-gradient(135deg,#abc7ff,#0071e3);color:#fff;}
#sv-close{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.25);}
</style>
</head>
<body>

<div id="nameboard">
  <div id="nb-time"></div>
  <div id="nb-resno"></div>
  <div id="nb-name">이름</div>
  <div id="nb-product"></div>
  <div id="nb-brand">DKsequence × 중문별장</div>
</div>

<div id="video-wrap">
  <video id="videoEl" autoplay playsinline webkit-playsinline muted></video>
  <button id="btn-flip" onclick="flip()">전/후면 FLIP</button>
  <button id="btn-refresh" onclick="refreshPreview()">화면 새로고침</button>
  <div id="cam-status">대기 중 WAITING</div>
</div>

<canvas id="canvasEl" style="display:none;"></canvas>

<button id="btn-start" onclick="startCam()">
  <span class="ko">카메라 시작</span>
  <span class="en">START CAMERA</span>
</button>

<button id="btn-shutter" onclick="shoot()">
  <span class="ko">촬영하기</span>
  <span class="en">TAKE PHOTO</span>
</button>

<div id="saving-overlay">
  <div id="sv-icon"></div>
  <div id="sv-spinner"></div>
  <div id="sv-text">사진을 저장하고 있습니다…
잠시만 기다려 주세요</div>
  <div id="sv-sub">SAVING TO DRIVE · 창을 닫지 마세요</div>
  <div id="sv-actions">
    <button id="sv-retry" onclick="retryUpload()">다시 시도</button>
    <button id="sv-close" onclick="closeWithError()">닫고 다시 촬영</button>
  </div>
</div>

<script>
var STREAM = null;
var FACING = 'environment';
var DATA = {};
var LAST_BASE64 = null;
var PHOTO_RESULT = null;     // savePhotoPost 결과 (folderId/fileUrl)
var FAILED_PHASE = null;     // 'photo' | 'checkin' — 재시도 재개 지점
var PIPELINE_STARTED = false;

function setCameraReady(isReady) {
  document.getElementById('video-wrap').classList.toggle('camera-ready', !!isReady);
}

function revealVideo() {
  var v = document.getElementById('videoEl');
  var playPromise = v.play();
  if (playPromise && playPromise.catch) playPromise.catch(function(){});
  requestAnimationFrame(function() {
    v.style.display = 'none';
    v.offsetHeight;
    v.style.display = 'block';
    v.style.opacity = '1';
    setCameraReady(true);
  });
}

function attachStream(stream) {
  STREAM = stream;
  var v = document.getElementById('videoEl');
  v.setAttribute('playsinline', '');
  v.setAttribute('webkit-playsinline', '');
  v.muted = true;
  v.autoplay = true;
  v.style.opacity = '.01';
  setCameraReady(false);
  v.srcObject = stream;
  v.onloadedmetadata = revealVideo;
  v.onloadeddata = revealVideo;
  setTimeout(revealVideo, 450);
}

function stopStream() {
  if (STREAM) {
    STREAM.getTracks().forEach(function(t){ t.stop(); });
    STREAM = null;
  }
}

function refreshPreview() {
  document.getElementById('cam-status').textContent = '화면 갱신 중... REFRESH';
  revealVideo();
  setTimeout(function(){
    document.getElementById('cam-status').textContent = '준비 완료 READY';
  }, 350);
}

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'INIT_CAMERA') {
    if (PIPELINE_STARTED) return;   // 저장 진행 중 재전송된 INIT 무시
    DATA = e.data;
    document.getElementById('nb-time').textContent    = DATA.time || '';
    document.getElementById('nb-resno').textContent   = DATA.resno || '';
    document.getElementById('nb-name').textContent    = DATA.realname || '이름';
    document.getElementById('nb-product').textContent = (DATA.product||'') + ' · ' + (DATA.people||'') + '인';
  }
});

function startCam() {
  document.getElementById('btn-start').style.display   = 'none';
  document.getElementById('btn-shutter').style.display = 'block';
  document.getElementById('btn-flip').style.display    = 'block';
  document.getElementById('btn-refresh').style.display = 'block';
  document.getElementById('cam-status').textContent    = '연결 중... CONNECTING';

  stopStream();
  navigator.mediaDevices.getUserMedia({ video:{ facingMode: FACING }, audio: false })
  .then(function(stream) {
    attachStream(stream);
    document.getElementById('cam-status').textContent = '준비 완료 READY';
  })
  .catch(function(err) {
    document.getElementById('cam-status').textContent = err.name;
    document.getElementById('btn-start').style.display   = 'block';
    document.getElementById('btn-shutter').style.display = 'none';
    document.getElementById('btn-flip').style.display    = 'none';
    document.getElementById('btn-refresh').style.display = 'none';
  });
}

function flip() {
  FACING = FACING === 'environment' ? 'user' : 'environment';
  stopStream();
  document.getElementById('cam-status').textContent = '전환 중... SWITCHING';
  navigator.mediaDevices.getUserMedia({ video:{ facingMode: FACING }, audio: false })
  .then(function(stream) {
    attachStream(stream);
    document.getElementById('cam-status').textContent = '준비 완료 READY';
  });
}

function shoot() {
  var video  = document.getElementById('videoEl');
  var canvas = document.getElementById('canvasEl');
  var vw = video.videoWidth  || 1280;
  var vh = video.videoHeight || 960;
  var MAX_WIDTH = 1280;
  var MAX_HEIGHT = 960;

  if (vw > MAX_WIDTH) { vh = Math.floor(vh * (MAX_WIDTH / vw)); vw = MAX_WIDTH; }
  if (vh > MAX_HEIGHT) { vw = Math.floor(vw * (MAX_HEIGHT / vh)); vh = MAX_HEIGHT; }

  canvas.width  = vw;
  canvas.height = vh;
  canvas.getContext('2d').drawImage(video, 0, 0, vw, vh);
  var base64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];

  // 셔터음은 팝업(전면 창)에서 재생 — 부모는 정지 상태라 늦게 울림
  if (DATA.shutterSound) {
    try { var sfx = new Audio(DATA.shutterSound); sfx.play().catch(function(){}); } catch (e) {}
  }

  LAST_BASE64 = base64;
  stopStream();           // 카메라 해제
  runPipeline(base64);    // 팝업이 사진 업로드 + 시트 기록까지 한 창에서 처리
}

// 저장 상태 오버레이 표시
function showSaving(state, msg) {
  document.getElementById('nameboard').style.display    = 'none';
  document.getElementById('video-wrap').style.display   = 'none';
  document.getElementById('btn-start').style.display    = 'none';
  document.getElementById('btn-shutter').style.display  = 'none';
  var ov = document.getElementById('saving-overlay');
  ov.style.display = 'flex';
  document.getElementById('sv-text').textContent    = msg;
  document.getElementById('sv-spinner').style.display = (state === 'loading') ? 'block' : 'none';
  document.getElementById('sv-actions').style.display = (state === 'error')   ? 'flex'  : 'none';
  document.getElementById('sv-icon').textContent =
      state === 'done' ? '✅' : (state === 'error' ? '⚠️' : '');
  document.getElementById('sv-sub').textContent =
      state === 'error' ? 'UPLOAD FAILED'
    : state === 'done'  ? 'SAVED'
    : 'SAVING TO DRIVE · 창을 닫지 마세요';
}

// ── 저장 파이프라인: 사진 업로드 → 시트 기록 (모두 전면 팝업에서) ──
function runPipeline(base64) {
  PIPELINE_STARTED = true;

  if (!DATA.gasUrl) {
    // gasUrl 미전달(구버전 부모) → 폴백: base64만 부모로 전달
    showSaving('loading', '사진을 전송하고 있습니다…\n잠시만 기다려 주세요');
    if (window.opener) {
      window.opener.postMessage({
        type: 'PHOTO_TAKEN',
        base64: base64,
        filename: DATA.filename || 'photo.jpg'
      }, '*');
    }
    try { window.close(); } catch (e) {}
    return;
  }
  uploadPhase(base64);
}

// 1단계: 사진 → 드라이브 (savePhotoPost, 부모 postPhoto와 동일 포맷)
function uploadPhase(base64) {
  FAILED_PHASE = null;
  showSaving('loading', '① 사진을 저장하고 있습니다…\n잠시만 기다려 주세요');

  fetch(DATA.gasUrl, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      action  : 'savePhotoPost',
      filename: DATA.filename || 'photo.jpg',
      mimeType: 'image/jpeg',
      date    : DATA.date || '',
      time    : DATA.time || '',
      resno   : DATA.resno || '',
      realName: DATA.realname || '',
      base64  : base64
    })
  })
  .then(function(r) { return r.text(); })
  .then(function(text) {
    var res;
    try { res = JSON.parse(text); }
    catch (e) { throw new Error('사진 응답 파싱 오류'); }
    if (!res || !res.ok) throw new Error((res && res.error) || '사진 저장 실패');
    PHOTO_RESULT = { folderId: res.folderId, fileUrl: res.fileUrl };
    checkinPhase();
  })
  .catch(function(err) {
    FAILED_PHASE = 'photo';
    showSaving('error',
      '사진 저장 실패: ' + ((err && err.message) ? err.message : '네트워크 오류') +
      '\n[다시 시도] 누르거나 닫고 재촬영하세요.');
  });
}

// 2단계: 예약/체크인 정보 → 시트 (부모 callApi와 동일한 GET payload 방식)
function checkinPhase() {
  showSaving('loading', '② 예약정보를 기록하고 있습니다…\n잠시만 기다려 주세요');

  var p = DATA.checkin || {};
  var payload = {};
  for (var k in p) { if (p.hasOwnProperty(k)) payload[k] = p[k]; }
  payload.action   = 'checkin';
  payload.folderId = PHOTO_RESULT ? PHOTO_RESULT.folderId : '';
  payload.fileUrl  = PHOTO_RESULT ? PHOTO_RESULT.fileUrl  : '';

  var url = DATA.gasUrl + '?action=checkin&payload=' +
            encodeURIComponent(JSON.stringify(payload));

  fetch(url, { redirect: 'follow' })
  .then(function(r) { return r.text(); })
  .then(function(text) {
    var res;
    try { res = JSON.parse(text); }
    catch (e) { throw new Error('시트 응답 파싱 오류'); }
    if (!res || !res.ok) throw new Error((res && res.error) || '시트 기록 실패');

    showSaving('done', '저장 완료!');
    if (window.opener) {
      window.opener.postMessage({
        type    : 'PIPELINE_DONE',
        folderId: PHOTO_RESULT ? PHOTO_RESULT.folderId : '',
        fileUrl : PHOTO_RESULT ? PHOTO_RESULT.fileUrl  : '',
        filename: DATA.filename || 'photo.jpg'
      }, '*');
    }
    setTimeout(function() { try { window.close(); } catch (e) {} }, 700);
  })
  .catch(function(err) {
    FAILED_PHASE = 'checkin';
    showSaving('error',
      '예약정보 기록 실패: ' + ((err && err.message) ? err.message : '네트워크 오류') +
      '\n사진은 저장됨 · [다시 시도]를 눌러주세요.');
  });
}

function retryUpload() {
  if (FAILED_PHASE === 'checkin' && PHOTO_RESULT) {
    checkinPhase();              // 사진은 이미 업로드됨 — 시트 기록만 재시도
  } else if (LAST_BASE64) {
    uploadPhase(LAST_BASE64);    // 처음부터(사진) 재시도
  }
}

function closeWithError() {
  if (window.opener) {
    window.opener.postMessage({ type: 'PHOTO_ERROR', error: '촬영 팝업 저장 실패' }, '*');
  }
  try { window.close(); } catch (e) {}
}
</script>
</body>
</html>

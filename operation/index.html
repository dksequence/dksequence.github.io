<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DKsequence 현장 운영 v3.0 (정밀검수본)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --surface:#000000;--surface-low:#0d0d0d;--surface-high:#1a1a1a;--surface-highest:#252525;
  --outline:rgba(255,255,255,0.15);--on-surface:#ffffff;--on-surface-variant:#e0e0e0;
  --on-surface-dim:#aaaaaa;--primary:#abc7ff;--primary-container:#0071e3;
  --danger:#ff6b6b;--success:#4ecba1;--warn:#f0a500;
}
html,body{background:#000;color:#fff;height:100%;font-family:'Inter',sans-serif;overflow-x:hidden;font-size:24px;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* ── 메인 대시보드 UI ── */
.topbar { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 20px; border-bottom: 1px solid var(--outline); background: rgba(22,22,23,0.8); backdrop-filter: blur(20px); text-align: center; position: sticky; top: 0; z-index: 100; }
.topbar-brand { font-size: 14px; color: var(--on-surface-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.topbar-date-row { display: flex; align-items: center; justify-content: center; gap: 14px; }
.topbar-date { font-size: 28px; font-weight: 700; color: #fff; padding: 10px 24px; border-radius: 0.5rem; transition: background 0.3s; line-height:1; }
.date-nav-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--outline); color: var(--primary); width: 48px; height: 48px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; outline:none; }
.today-btn { background: var(--surface-highest); border: 1px solid var(--outline); color: #fff; padding: 10px 18px; border-radius: 0.5rem; font-size: 16px; font-weight: 700; cursor: pointer; outline:none; }

.mode-tabs{display:flex;padding:10px 20px;gap:8px;flex-shrink:0;}
.mode-tab{flex:1;padding:16px;text-align:center;font-size:22px;font-weight:600;color:rgba(255,255,255,0.4);border-radius:0.75rem;cursor:pointer;background:var(--surface-low);border:1px solid var(--outline);font-family:'Inter',sans-serif;}
.mode-tab.active{color:#fff; background: var(--primary-container); border-color:transparent;}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px 20px;flex-shrink:0;}
.stat-card{background:var(--surface-low);border-radius:1rem;padding:20px 18px;}
.stat-label{font-size:20px;color:rgba(255,255,255,0.6);text-transform:uppercase;margin-bottom:6px;}
.stat-val{font-size:52px;font-weight:700;letter-spacing:-0.01em;}
.stat-val.all{color:#fff;}.stat-val.done{color:var(--success);}.stat-val.wait{color:var(--warn);}

/* ── 리스트 아이템 ── */
.list{padding:0 20px 120px;display:flex;flex-direction:column;gap:10px;}
.customer-card{background:var(--surface-high);border-radius:1rem;padding:20px 22px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:background .15s;}
.customer-card.done{opacity:.3;pointer-events:none;}
.avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;flex-shrink:0;color:#fff;}
.avatar.source-n{background:#00c73c;} 
.avatar.source-a{background:#0071e3;} 
.avatar.source-v{background:#f0a500;} 
.card-info{flex:1;min-width:0;}
.card-name{font-size:26px;font-weight:700;color:#fff;}
.card-meta{font-size:20px;color:rgba(255,255,255,0.6);margin-top:4px;}
.card-resno{font-size:17px;color:rgba(255,255,255,0.3);margin-top:3px;font-family:monospace;}
.badge{font-size:18px;padding:8px 18px;border-radius:2rem;font-weight:800;flex-shrink:0;}
.badge-wait{background:rgba(240,165,0,.1);color:var(--warn);}
.badge-done{background:rgba(78,203,161,.1);color:var(--success);}

/* ── 신규/체험 버튼 ── */
.add-btn-group{padding:0 20px 20px; display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.add-btn{padding:24px;border-radius:1rem;border:1px dashed rgba(255,255,255,.3);background:transparent;color:rgba(255,255,255,0.6);font-size:24px;cursor:pointer;font-family:'Inter',sans-serif;width:100%;}

/* ── [camera.html 디자인 이식] ── */
#nameboard{ background:#0a0a18; padding:20px 20px 16px; text-align:center; border-bottom:1px solid rgba(171,199,255,.3); flex-shrink:0; }
#nb-time{font-size:18px;color:rgba(171,199,255,.6);letter-spacing:.1em;font-family:monospace;margin-bottom:4px;}
#nb-resno{font-size:16px;color:rgba(171,199,255,.3);letter-spacing:.08em;font-family:monospace;margin-bottom:8px;}
#nb-name{font-size:60px;font-weight:700;color:#fff;line-height:1.0;letter-spacing:-0.02em;}
#nb-product{font-size:22px;color:rgba(171,199,255,.6);margin-top:8px;}
#nb-brand{font-size:12px;color:rgba(255,255,255,.12);margin-top:8px;letter-spacing:0.1em;}

#video-wrap{ flex:1; position:relative; background:#000; overflow:hidden; display:flex; align-items:center; justify-content:center;}
#videoEl{ width:100%; height:100%; object-fit:cover; display:block; }
#btn-flip{ position:absolute; top:20px; left:20px; padding:12px 24px; border-radius:2.5rem; background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.3); color:#fff; font-size:18px; cursor:pointer;}
#cam-status{ position:absolute; top:20px; right:20px; font-size:16px; color:rgba(255,255,255,0.7); background:rgba(0,0,0,0.4); padding:8px 16px; border-radius:1rem;}

.cam-btn-area { flex-shrink:0; width:100%; }
.full-btn { width:100%; padding:30px; border:none; cursor:pointer; font-family:'Inter',sans-serif; color:#fff; text-align:center; transition:opacity .2s;}
.full-btn.blue { background:linear-gradient(135deg,#abc7ff,#0071e3); }
.full-btn.gray { background:#252525; }
.full-btn .ko { font-size:28px; font-weight:800; display:block; }
.full-btn .en { font-size:18px; font-weight:500; opacity:.85; display:block; margin-top:2px; }

/* ── 폼 스타일 ── */
.field-input{width:100%;padding:22px;border-radius:.75rem;border:1px solid rgba(255,255,255,0.15);background:#111;font-size:28px;color:#fff;font-family:'Inter',sans-serif;margin-top:10px;outline:none;}
.field-input:focus{border-color:var(--primary);}
.btn-footer{padding:24px;background:#000;flex-shrink:0;}

/* ── 로딩/저장 단계 ── */
.step-row{background:var(--surface-low); border-radius:1rem; padding:24px; border:2px solid transparent; display:flex; align-items:center; gap:20px; margin-bottom:12px; transition:all .3s;}
.stat-dot{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.1);}
.spinner{width:30px;height:30px;border:4px solid rgba(171,199,255,0.3);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

#toast{position:fixed;bottom:140px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:16px 32px;border-radius:2.5rem;font-weight:800;font-size:24px;z-index:10000;display:none;}
</style>
</head>
<body>

<!-- [SCREEN: LIST] -->
<div id="s-list" class="screen active">
  <div class="topbar">
    <div class="topbar-brand">DKsequence × 중문별장</div>
    <div class="topbar-date-row">
      <button class="today-btn" onclick="goToToday()">TODAY</button>
      <button class="date-nav-btn" onclick="changeDate(-1)">◀</button>
      <div id="date-label" class="topbar-date">-</div>
      <button class="date-nav-btn" onclick="changeDate(1)">▶</button>
    </div>
  </div>
  <div class="mode-tabs">
    <div id="tab-ci" class="mode-tab active" onclick="switchMode('checkin')">체크인 관리</div>
    <div id="tab-del" class="mode-tab" onclick="switchMode('delivery')">납품 관리</div>
  </div>
  <!-- LIST: CHECKIN -->
  <div id="mode-checkin" style="display:contents;">
    <div id="time-tabs" class="time-tabs" style="display:flex;gap:10px;padding:16px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;"></div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-label">전체</div><div id="stat-total" class="stat-val all">0</div></div>
      <div class="stat-card"><div class="stat-label">완료</div><div id="stat-done" class="stat-val done">0</div></div>
      <div class="stat-card"><div class="stat-label">대기</div><div id="stat-wait" class="stat-val wait">0</div></div>
    </div>
    <div id="res-list" class="list"></div>
    <div class="add-btn-group">
      <button class="add-btn" onclick="showNew('A')">+ 신규 고객<br><small>WALK-IN</small></button>
      <button class="add-btn" onclick="showNew('V')" style="color:var(--warn);border-color:var(--warn);">+ 체험 고객<br><small>TRIAL</small></button>
    </div>
  </div>
  <!-- LIST: DELIVERY -->
  <div id="mode-delivery" style="display:none;">
    <div class="stat-row">
      <div class="stat-card"><div class="stat-label">전체 촬영</div><div id="del-total" class="stat-val all">0</div></div>
      <div class="stat-card"><div class="stat-label">보정완료</div><div id="del-done" class="stat-val done">0</div></div>
      <div class="stat-card"><div class="stat-label">발송완료</div><div id="del-sent" class="stat-val" style="color:var(--primary);">0</div></div>
    </div>
    <div id="del-list" class="list"></div>
  </div>
</div>

<!-- [SCREEN: CHECKIN FORM] -->
<div id="s-form" class="screen">
  <div class="topbar"><button class="today-btn" onclick="show('s-list')">취소</button><div style="font-size:24px; font-weight:800;">데이터 입력</div><div style="width:60px;"></div></div>
  <div style="padding:24px; flex:1; overflow-y:auto;">
    <div style="background:var(--surface-low); padding:24px; border-radius:1rem; margin-bottom:24px;">
      <div id="form-name" style="font-size:36px; font-weight:800;">-</div>
      <div id="form-resno" style="font-size:22px; color:var(--primary); margin-top:8px;">-</div>
      <div id="form-product" style="font-size:20px; color:rgba(255,255,255,0.5); margin-top:4px;">-</div>
    </div>
    <div style="margin-bottom:20px;"><div style="font-size:20px; opacity:0.7;">고객 실명 *</div><input type="text" id="ci-realname" class="field-input"></div>
    <div style="margin-bottom:20px;"><div style="font-size:20px; opacity:0.7;">이메일 주소 *</div><input type="email" id="ci-email" class="field-input" placeholder="example@gmail.com"></div>
    <div style="background:var(--surface-low); padding:24px; border-radius:1rem;">
       <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;" onclick="document.getElementById('tg1').classList.toggle('on')">
          <span style="font-size:22px;">개인정보 수집 동의 (필수)</span><div id="tg1" class="toggle on"></div>
       </div>
    </div>
  </div>
  <div class="btn-footer"><button class="btn-primary" style="width:100%;" onclick="proceedToCheckin()">머그샷 촬영하기</button></div>
</div>

<!-- [SCREEN: NEW CUSTOMER] -->
<div id="s-new" class="screen">
  <div class="topbar"><button class="today-btn" onclick="show('s-list')">취소</button><div id="new-title" style="font-size:24px; font-weight:800;">신규 고객</div><div style="width:60px;"></div></div>
  <div style="padding:24px; flex:1; overflow-y:auto;">
    <div style="background:var(--surface-low); padding:24px; border-radius:1rem; margin-bottom:24px;">
      <div style="font-size:18px; opacity:0.5;">접수 코드</div><div id="new-code" style="font-size:40px; font-weight:800; color:var(--primary);">-</div>
    </div>
    <div style="margin-bottom:20px;"><div style="font-size:20px; opacity:0.7;">성함 *</div><input type="text" id="new-name" class="field-input"></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;">
      <div><div style="font-size:20px; opacity:0.7;">시간</div><select id="new-time" class="field-input"><option>13:00</option><option>14:00</option><option>15:00</option><option>16:00</option><option>17:00</option></select></div>
      <div><div style="font-size:20px; opacity:0.7;">인원</div><select id="new-people" class="field-input"><option>1</option><option>2</option><option>3</option><option>4</option></select></div>
    </div>
    <div style="margin-bottom:20px;"><div style="font-size:20px; opacity:0.7;">상품</div><select id="new-prod" class="field-input"><option>오마카세+두컷화보</option><option>심플 코스</option></select></div>
    <div style="margin-bottom:20px;"><div style="font-size:20px; opacity:0.7;">이메일 *</div><input type="email" id="new-email" class="field-input" placeholder="example@gmail.com"></div>
  </div>
  <div class="btn-footer"><button class="btn-primary" style="width:100%;" onclick="goNewCam()">등록 및 촬영 시작</button></div>
</div>

<!-- [SCREEN: CAMERA - camera.html 디자인 이식] -->
<div id="s-camera" class="screen">
  <div id="nameboard">
    <div id="nb-time">13:00</div>
    <div id="nb-resno">20260413-W1</div>
    <div id="nb-name">이름</div>
    <div id="nb-product">오마카세 · 2인</div>
    <div id="nb-brand">DKsequence × 중문별장</div>
  </div>
  <div id="video-wrap">
    <video id="videoEl" autoplay playsinline muted></video>
    <button id="btn-flip" onclick="flipCam()">전/후면 FLIP</button>
    <div id="cam-status">대기 중 WAITING</div>
  </div>
  <div class="cam-btn-area">
    <button id="cam-start-btn" class="full-btn blue" onclick="startStream()">
      <span class="ko">카메라 시작</span><span class="en">START CAMERA</span>
    </button>
    <button id="shutter-btn" class="full-btn blue" style="display:none;" onclick="takePhoto()">
      <span class="ko">촬영하기</span><span class="en">TAKE PHOTO</span>
    </button>
    <button class="full-btn gray" onclick="show('s-list'); stopStream();">
      <span class="ko">취소 및 종료</span><span class="en">CANCEL</span>
    </button>
  </div>
  <canvas id="canvasEl" style="display:none;"></canvas>
</div>

<!-- [SCREEN: SAVING] -->
<div id="s-saving" class="screen">
  <div style="padding:100px 32px; text-align:center; flex:1;">
    <div id="sav-name" style="font-size:48px; font-weight:800; margin-bottom:10px;">-</div>
    <div id="sav-info" style="font-size:26px; color:var(--primary); margin-bottom:60px;">서버 데이터 전송 중...</div>
    <div id="step1" class="step-row"><div class="stat-dot"></div><div style="flex:1; text-align:left;">아이패드 로컬 백업 (다운로드 폴더)</div></div>
    <div id="step2" class="step-row"><div class="stat-dot"></div><div style="flex:1; text-align:left;">구글 드라이브 머그샷 업로드</div></div>
    <div id="step3" class="step-row"><div class="stat-dot"></div><div style="flex:1; text-align:left;">마스터 로그 시트 기록 및 완료</div></div>
  </div>
</div>

<div id="s-done" class="screen">
  <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; padding:40px; text-align:center;">
    <div style="width:140px; height:140px; background:rgba(78,203,161,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:40px;">
       <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#4ecba1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div style="font-size:56px; font-weight:800; margin-bottom:12px;">저장 성공!</div>
    <div id="done-msg" style="font-size:28px; opacity:0.7; margin-bottom:80px;">-</div>
    <button class="btn-primary" style="width:100%;" onclick="location.reload()">처음으로 돌아가기</button>
  </div>
</div>

<div id="toast">메시지</div>

<script>
// ── Settings ─────────────────────────────────
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwoqVAZVZclcog_8hGo6W5xKCGWdK9HHRCw-CtidsA3sygtPJatZ88b82iouE0brF0G/exec';
var SOUND_BASE = 'https://dksequence.github.io/runing/dk-runs/sound/';
var TIMES = ['13:00', '14:00', '15:00', '16:00', '17:00'];
var SELECTED_TIME = '13:00';
var DATE_OFFSET = 0;
var CUR = {};
var SFX = {};
var STREAM = null;
var FACING = 'environment';

// ── Date Logic ────────────────────────────────
function changeDate(n) { playSound('EFFECT001'); DATE_OFFSET += n; updateDateUI(); loadList(); }
function goToToday() { if(DATE_OFFSET === 0) return; playSound('EFFECT001'); DATE_OFFSET = 0; updateDateUI(); loadList(); }
function getToday() {
  var d = new Date(); d.setDate(d.getDate() + DATE_OFFSET);
  return d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
}
function updateDateUI() {
  var d = new Date(); d.setDate(d.getDate() + DATE_OFFSET);
  var days = ['일','월','화','수','목','금','토'];
  var label = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' (' + days[d.getDay()] + ')';
  document.getElementById('date-label').textContent = label;
  document.getElementById('date-label').style.background = ['#FF6B6B','#FF8C00','#FFD700','#4ECBA1','#0071E3','#4B0082','#800080'][d.getDay()];
}

// ── Audio Engine ──────────────────────────────
function initSFX() {
  [1,2,3,4,5,6,7,8].forEach(n => {
    var id = 'EFFECT00' + n; SFX[id] = new Audio(SOUND_BASE + id + '.mp3');
  });
}
function unlockAudio() {
  initSFX();
  Object.keys(SFX).forEach(k => { SFX[k].play().then(()=>{SFX[k].pause();SFX[k].currentTime=0;}).catch(()=>{}); });
  window.removeEventListener('mousedown', unlockAudio); window.removeEventListener('touchstart', unlockAudio);
}
window.addEventListener('mousedown', unlockAudio, {once:true});
window.addEventListener('touchstart', unlockAudio, {once:true});
function playSound(id) { if (SFX[id]) { SFX[id].currentTime = 0; SFX[id].play().catch(() => {}); } }

// ── API Bridge ──────────────────────────────
function callApi(params, cb) {
  var url = GAS_URL + '?callback=jsonp_cb&' + Object.keys(params).map(k => k + '=' + encodeURIComponent(params[k])).join('&');
  window.jsonp_cb = res => { delete window.jsonp_cb; var s = document.getElementById('api-s'); if(s) s.parentNode.removeChild(s); cb(null, res); };
  var script = document.createElement('script'); script.id = 'api-s'; script.src = url; document.body.appendChild(script);
}

// ── Dashboard Core ────────────────────────────
function initTabs() {
  var tabs = document.getElementById('time-tabs'); tabs.innerHTML = '';
  TIMES.forEach(t => {
    var b = document.createElement('button'); b.className = 'tab' + (t === SELECTED_TIME ? ' active' : '');
    b.textContent = t; b.onclick = () => { playSound('EFFECT001'); SELECTED_TIME = t; initTabs(); loadList(); };
    tabs.appendChild(b);
  });
  updateDateUI(); loadList();
}
function loadList() {
  var list = document.getElementById('res-list');
  list.innerHTML = '<div style="text-align:center; padding:60px;"><div class="spinner" style="margin:0 auto;"></div></div>';
  callApi({ action: 'getReservations', date: getToday(), time: SELECTED_TIME }, (err, res) => {
    if(err || !res.ok) { list.innerHTML = '<div style="text-align:center; padding:60px; color:var(--danger);">데이터 로드 실패</div>'; return; }
    document.getElementById('stat-total').textContent = res.dailyStats.total;
    document.getElementById('stat-done').textContent = res.dailyStats.done;
    document.getElementById('stat-wait').textContent = res.dailyStats.wait;
    renderCards(res.reservations);
  });
}
function renderCards(res) {
  var list = document.getElementById('res-list');
  if (res.length === 0) { list.innerHTML = '<div style="text-align:center; padding:60px; opacity:0.3;">예약이 없습니다</div>'; return; }
  list.innerHTML = '';
  res.forEach(r => {
    var c = document.createElement('div'); c.className = 'customer-card' + (r.checkedIn ? ' done' : '');
    var sClass = 'source-' + (r.source||'A').toLowerCase();
    c.innerHTML = `<div class="avatar ${sClass}">${(r.source||'A').toUpperCase()}</div><div class="card-info"><div class="card-name">${r.name}</div><div class="card-meta">${r.product} · ${r.people}인</div><div class="card-resno">${r.resno}</div></div><div class="badge ${r.checkedIn?'badge-done':'badge-wait'}">${r.checkedIn?'체크인':'대기'}</div>`;
    if(!r.checkedIn) c.onclick = () => { playSound('EFFECT002'); goForm(r); };
    list.appendChild(c);
  });
}

// ── Operational Flows ─────────────────────────
function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }

function goForm(r) {
  CUR = { resno: r.resno, masked: r.name, product: r.product, people: r.people, time: r.time, source: r.source, isNew: false };
  document.getElementById('form-name').textContent = r.name;
  document.getElementById('form-resno').textContent = r.resno;
  document.getElementById('form-product').textContent = r.product + ' · ' + r.people + '인';
  document.getElementById('ci-realname').value = '';
  document.getElementById('ci-email').value = '';
  show('s-form');
}
function proceedToCheckin() {
  var real = document.getElementById('ci-realname').value.trim();
  if(!real) { showToast('실명을 입력하세요'); return; }
  if(!document.getElementById('ci-email').value.trim()) { showToast('이메일을 입력하세요'); return; }
  CUR.realName = real; CUR.email = document.getElementById('ci-email').value.trim();
  prepCam();
}
function showNew(t) {
  playSound('EFFECT004'); CUR = { isNew: true, source: t, time: SELECTED_TIME };
  document.getElementById('new-title').textContent = (t==='V'?'체험':'신규') + ' 고객';
  callApi({ action: 'getWalkInCode', date: getToday() }, (err, res) => { CUR.resno = (err || !res.ok) ? getToday()+'-W1' : res.code; document.getElementById('new-code').textContent = CUR.resno; });
  show('s-new');
}
function goNewCam() {
  var n = document.getElementById('new-name').value.trim(); if(!n) { showToast('이름 입력 필수'); return; }
  if(!document.getElementById('new-email').value.trim()) { showToast('이메일 입력 필수'); return; }
  CUR.realName = n; CUR.time = document.getElementById('new-time').value; CUR.people = document.getElementById('new-people').value; CUR.product = document.getElementById('new-prod').value; CUR.email = document.getElementById('new-email').value.trim();
  prepCam();
}

// ── Camera Pipeline (Internal) ────────────────
function prepCam() {
  var cleanT = (CUR.time||'00:00').replace(':','');
  CUR.filename = getToday() + '_' + cleanT + '_' + CUR.realName + '.jpg';
  document.getElementById('nb-name').textContent = CUR.realName;
  document.getElementById('nb-resno').textContent = CUR.resno;
  document.getElementById('nb-time').textContent = CUR.time;
  document.getElementById('nb-product').textContent = CUR.product + ' · ' + CUR.people + '인';
  document.getElementById('cam-start-btn').style.display = 'block';
  document.getElementById('shutter-btn').style.display = 'none';
  document.getElementById('cam-status').textContent = '대기 중 WAITING';
  show('s-camera');
}
function startStream() {
  playSound('EFFECT008');
  document.getElementById('cam-status').textContent = '연결 중...';
  var constraints = { video: { facingMode: FACING, width: { ideal: 1280 }, height: { ideal: 960 } } };
  navigator.mediaDevices.getUserMedia(constraints).then(s => {
    STREAM = s; var v = document.getElementById('videoEl'); v.srcObject = s; v.play();
    document.getElementById('cam-start-btn').style.display = 'none';
    document.getElementById('shutter-btn').style.display = 'block';
    document.getElementById('cam-status').textContent = '준비 완료 READY';
  }).catch(e => { showToast('카메라 에러: ' + e.name); });
}
function stopStream() { if(STREAM) { STREAM.getTracks().forEach(t => t.stop()); STREAM = null; } }
function flipCam() { FACING = (FACING==='environment'?'user':'environment'); stopStream(); startStream(); }

function takePhoto() {
  var v = document.getElementById('videoEl');
  if (v.readyState !== v.HAVE_ENOUGH_DATA) { showToast('카메라 로딩 중...'); return; }
  playSound('EFFECT003');
  var c = document.getElementById('canvasEl');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  CUR.base64 = c.toDataURL('image/jpeg', 0.8).split(',')[1];
  stopStream();
  startSaving();
}

// ── Saving Pipeline (Final) ──────────────────
function startSaving() {
  document.getElementById('sav-name').textContent = CUR.realName + ' · ' + CUR.resno;
  show('s-saving');
  // 1. Local Backup
  setProg(1, '#abc7ff');
  try {
    var l = document.createElement('a'); l.href = 'data:image/jpeg;base64,' + CUR.base64; l.download = CUR.filename;
    document.body.appendChild(l); l.click(); document.body.removeChild(l);
    setProg(1, '#4ecba1');
  } catch(e) { setProg(1, '#ff6b6b'); }

  // 2. Drive Upload (If in GAS context)
  setProg(2, '#abc7ff');
  if (typeof google === 'undefined') { setTimeout(saveSheet, 1000); return; }
  google.script.run.withSuccessHandler(res => {
    if(res.ok) { CUR.folderId = res.folderId; setProg(2, '#4ecba1'); saveSheet(); } else setProg(2, '#ff6b6b');
  }).processRequest(JSON.stringify({ action:'savePhotoPost', filename:CUR.filename, date:getToday(), time:CUR.time, resno:CUR.resno, realName:CUR.realName, base64:CUR.base64 }));
}
function saveSheet() {
  setProg(3, '#abc7ff');
  callApi({
    action:'checkin', date:getToday(), time:CUR.time, resno:CUR.resno, realName:CUR.realName, product:CUR.product, people:CUR.people, email:CUR.email, source:CUR.source, isNew:CUR.isNew, folderId:(CUR.folderId||''), privacyConsent:'Y'
  }, (err, res) => {
    if(!err && res.ok) { setProg(3, '#4ecba1'); setTimeout(() => { playSound('EFFECT005'); document.getElementById('done-msg').textContent = CUR.realName + ' 저장 완료'; show('s-done'); }, 500); }
    else setProg(3, '#ff6b6b');
  });
}
function setProg(n, c) { var el = document.getElementById('step'+n); el.style.borderColor = c; el.querySelector('.stat-dot').style.background = c; }

// ── Other ─────────────────────────────────────
function switchMode(m) {
  playSound('EFFECT002');
  document.getElementById('tab-ci').classList.toggle('active', m==='checkin');
  document.getElementById('tab-del').classList.toggle('active', m==='delivery');
  document.getElementById('mode-checkin').style.display = m==='checkin'?'contents':'none';
  document.getElementById('mode-delivery').style.display = m==='delivery'?'block':'none';
  if (m === 'delivery') loadDel();
}
function loadDel() {
  var list = document.getElementById('del-list');
  list.innerHTML = '<div class="spinner" style="margin:40px auto;"></div>';
  callApi({ action: 'getDeliveryList', date: getToday() }, (err, res) => {
    if(err || !res.ok) { list.innerHTML = '<div style="padding:40px;text-align:center;">실패</div>'; return; }
    document.getElementById('del-total').textContent = res.items.length;
    document.getElementById('del-done').textContent = res.items.filter(x => x.editStatus==='보정완료').length;
    document.getElementById('del-sent').textContent = res.items.filter(x => x.deliveryStatus.indexOf('발송완료')===0).length;
    list.innerHTML = '';
    res.items.forEach(i => {
      var d = document.createElement('div'); d.className = 'delivery-card';
      d.innerHTML = `<div><b>${i.realName||i.maskedName}</b></div><div style="font-size:18px;margin-top:4px;">${i.product} · ${i.time}</div><div class="delivery-badge">${i.editStatus} | ${i.deliveryStatus}</div>`;
      list.appendChild(d);
    });
  });
}
window.onload = initTabs;
</script>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>카메라</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    body { margin:0; background:#000; overflow:hidden; display:flex; flex-direction:column; height:100vh; font-family:sans-serif; }
    #video { width:100%; height:100%; object-fit:cover; }
    .controls { position:absolute; bottom:20px; left:0; right:0; display:flex; justify-content:center; gap:20px; }
    button { padding:15px 30px; border-radius:30px; border:none; background:#0071e3; color:#fff; font-size:16px; font-weight:bold; cursor:pointer; }
    button.cancel { background:#333; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <div class="controls">
    <button class="cancel" onclick="window.close()">취소</button>
    <button onclick="takePhoto()">촬영</button>
  </div>

  <script>
    var video = document.getElementById('video');
    
    // 후면 카메라 우선 사용
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(function(stream) {
        video.srcObject = stream;
      })
      .catch(function(err) {
        alert('카메라 에러: ' + err.message);
      });

    function takePhoto() {
      var canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);
      
      var base64 = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];
      
      if (window.opener) {
        window.opener.postMessage({ type: 'PHOTO_TAKEN', base64: base64 }, '*');
      }
      window.close();
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DKsequence RUNS</title>

  <link rel="apple-touch-icon" sizes="180x180" href="https://dksequence.github.io/operation/icons/apple-touch-icon-180.png">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    .logo {
      width: 140px;
      height: 140px;
      object-fit: contain;
      opacity: 0;
      animation: fadeIn 0.18s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>

  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        window.location.href = 'https://script.google.com/macros/s/AKfycbwoqVAZVZclcog_8hGo6W5xKCGWdK9HHRCw-CtidsA3sygtPJatZ88b82iouE0brF0G/exec';
      }, 450);
    });
  </script>
</head>
<body>
  <div class="wrap">
    <img
      class="logo"
      src="https://dksequence.github.io/operation/icons/apple-touch-icon-180.png"
      alt="DKsequence logo"
    >
  </div>
</body>
</html>

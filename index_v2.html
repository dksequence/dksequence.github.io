<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DKsequence 현장 운영 v2.1 통합본</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --surface:#000000;--surface-low:#0d0d0d;--surface-high:#1a1a1a;--surface-highest:#252525;
  --outline:rgba(255,255,255,0.15);--on-surface:#ffffff;--on-surface-variant:#e0e0e0;
  --on-surface-dim:#aaaaaa;--primary:#abc7ff;--primary-container:#0071e3;
  --danger:#ff6b6b;--success:#4ecba1;--warn:#f0a500;
}
html,body{background:#000!important;color:#fff!important;height:100%;font-family:'Inter',sans-serif;overflow-x:hidden;font-size:24px;}
.screen{display:none;min-height:100vh;}
.screen.active{display:block;}

/* ── UI Components ── */
.topbar { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 20px; border-bottom: 1px solid var(--outline); background: rgba(22,22,23,0.8); backdrop-filter: blur(20px); text-align: center; position: sticky; top: 0; z-index: 100; }
.topbar-brand { font-size: 14px; color: var(--on-surface-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.topbar-date-row { display: flex; align-items: center; justify-content: center; gap: 14px; }
.topbar-date { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.02em; padding: 10px 24px; border-radius: 0.5rem; transition: background 0.3s; line-height:1; }
.date-nav-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--outline); color: var(--primary); width: 48px; height: 48px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; outline:none; }
.date-nav-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }
.today-btn { background: var(--surface-highest); border: 1px solid var(--outline); color: #fff; padding: 10px 18px; border-radius: 0.5rem; font-size: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-family: 'Inter', sans-serif; transition: all 0.2s; outline:none; }

.mode-tabs{display:flex;padding:0 20px;margin-top:10px;gap:8px;}
.mode-tab{flex:1;padding:16px;text-align:center;font-size:22px;font-weight:600;color:rgba(255,255,255,0.4);
  border-radius:0.75rem;cursor:pointer;background:var(--surface-low);border:1px solid var(--outline);font-family:'Inter',sans-serif;}
.mode-tab.active{color:#fff; background: var(--primary-container); border-color:transparent;}

.time-tabs{display:flex;gap:10px;padding:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{font-size:26px;padding:16px 28px;border-radius:2rem;cursor:pointer;color:rgba(255,255,255,0.5);
  background:transparent;border:none;white-space:nowrap;font-family:'Inter',sans-serif;letter-spacing:.04em;}
.tab.active{background:var(--surface-highest);color:#fff;font-weight:700;}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 20px;}
.stat-card{background:var(--surface-low);border-radius:1rem;padding:20px 18px;}
.stat-label{font-size:22px;color:rgba(255,255,255,0.6);text-transform:uppercase;margin-bottom:6px;}
.stat-val{font-size:56px;font-weight:700;letter-spacing:-0.02em;}
.stat-val.all{color:#fff;}.stat-val.done{color:var(--success);}.stat-val.wait{color:var(--warn);}

.section-label{padding:10px 20px 14px;font-size:22px;color:rgba(255,255,255,0.6);text-transform:uppercase;}
.list{padding:0 20px 24px;display:flex;flex-direction:column;gap:10px;}
.customer-card{background:var(--surface-high);border-radius:1rem;padding:20px 22px;cursor:pointer;
  display:flex;align-items:center;gap:14px;transition:background .15s;}
.customer-card.done{opacity:.35;pointer-events:none;}
.avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:800;flex-shrink:0;color:#fff;}
.avatar.source-n{background:#00c73c;} /* Naver Green */
.avatar.source-a{background:#0071e3;} /* Walk-in Blue */
.avatar.source-v{background:#f0a500;} /* Trial Yellow */

.card-info{flex:1;min-width:0;}
.card-name{font-size:26px;font-weight:700;color:#fff;}
.card-meta{font-size:21px;color:rgba(255,255,255,0.7);margin-top:6px;}
.card-resno{font-size:18px;color:rgba(255,255,255,0.4);margin-top:5px;font-family:monospace;}

.badge{font-size:20px;padding:10px 22px;border-radius:2rem;font-weight:800;flex-shrink:0;}
.badge-wait{background:rgba(240,165,0,.12);color:var(--warn);}
.badge-done{background:rgba(78,203,161,.12);color:var(--success);}

.add-btn{padding:24px;border-radius:1rem;border:1px dashed rgba(255,255,255,.3);background:transparent;
  color:rgba(255,255,255,0.6);font-size:26px;cursor:pointer;font-family:'Inter',sans-serif;width:100%;}

/* ── 폼 & 버튼 ── */
.field-input{width:100%;padding:22px;border-radius:.75rem;border:1px solid rgba(255,255,255,0.15);
  background:#111;font-size:28px;color:#fff;font-family:'Inter',sans-serif;margin-top:8px;}
.btn-group{position:fixed;bottom:0;left:0;right:0;padding:24px;background:linear-gradient(to top, #000 80%, transparent);z-index:200;}
.btn-primary{width:100%;padding:26px;border-radius:1rem;background:var(--primary-container);color:#fff;
  border:none;font-size:32px;font-weight:800;cursor:pointer;box-shadow:0 8px 24px rgba(0,113,227,0.4);}

/* ── 사진 네임보드 ── */
.nameboard-area{background:#0a0a12;padding:40px 20px 28px;text-align:center;position:relative;}
.nb-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:200px;height:2px;
  background:linear-gradient(90deg,transparent,var(--primary),transparent);}
.nb-time{font-size:22px;color:rgba(171,199,255,.6);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;font-family:monospace;}
.nb-resno{font-size:20px;color:rgba(171,199,255,.4);letter-spacing:.08em;margin-bottom:14px;font-family:monospace;}
.nb-name{font-size:80px;font-weight:700;color:#fff;line-height:1.0;letter-spacing:-0.02em;}
.nb-product{font-size:26px;color:rgba(171,199,255,.6);margin-top:10px;font-weight:500;}

/* ── 카메라 & 저장 ── */
.cam-container{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:500;display:flex;flex-direction:column;}
#videoEl{width:100%;flex:1;object-fit:cover;}
.shutter-btn{width:110px;height:110px;border-radius:50%;border:8px solid #fff;background:transparent;padding:6px;cursor:pointer;}
.shutter-inner{width:100%;height:100%;border-radius:50%;background:#fff;}

.step-row{background:var(--surface-low); border-radius:1rem; padding:24px; border:2px solid transparent; display:flex; align-items:center; gap:20px; margin-bottom:12px;}
.stat-indicator{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.1);}
#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.95);
  color:#000;padding:16px 32px;border-radius:2.5rem;font-weight:800;font-size:24px;z-index:10000;display:none;white-space:nowrap;}
.spinner{width:30px;height:30px;border:4px solid rgba(171,199,255,0.2);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.toggle{width:44px;height:26px;border-radius:13px;background:var(--surface-highest);position:relative;cursor:pointer;}
.toggle.on{background:var(--primary-container);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;}
.toggle.on::after{transform:translateX(18px);}

.delivery-card{background:var(--surface-high);border-radius:1rem;padding:22px;margin-bottom:12px;}
.delivery-badge{font-size:16px;padding:8px 14px;border-radius:.5rem;font-weight:600;margin-top:10px;display:inline-block;}
</style>
</head>
<body>

<div id="s-list" class="screen active">
  <div class="topbar">
    <div class="topbar-brand">DKsequence × 중문별장</div>
    <div class="topbar-date-row">
      <button class="today-btn" onclick="goToToday()">TODAY</button>
      <button class="date-nav-btn" onclick="changeDate(-1)">◀</button>
      <div class="topbar-date" id="today-label">2026-04-13</div>
      <button class="date-nav-btn" onclick="changeDate(1)">▶</button>
    </div>
  </div>

  <div class="mode-tabs">
    <div class="mode-tab active" onclick="switchMode('checkin')">체크인 관리</div>
    <div class="mode-tab" onclick="switchMode('delivery')">납품 관리</div>
  </div>

  <div id="mode-checkin">
    <div id="time-tabs" class="time-tabs"></div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-label">전체</div><div id="stat-total" class="stat-val all">0</div></div>
      <div class="stat-card"><div class="stat-label">완료</div><div id="stat-done" class="stat-val done">0</div></div>
      <div class="stat-card"><div class="stat-label">대기</div><div id="stat-wait" class="stat-val wait">0</div></div>
    </div>
    <div id="list-time-label" class="section-label">목록</div>
    <div id="reservation-list" class="list"></div>
    <div style="padding:0 20px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <button class="add-btn" onclick="showNewScreen('A')">+ 신규 고객<br><small>WALK-IN</small></button>
      <button class="add-btn" onclick="showNewScreen('V')" style="color:var(--warn);border-color:var(--warn);">+ 체험 고객<br><small>TRIAL</small></button>
    </div>
    <div style="height:140px;"></div>
  </div>

  <div id="mode-delivery" style="display:none;">
    <div class="stat-row">
      <div class="stat-card"><div class="stat-label">전체 촬영</div><div id="del-stat-total" class="stat-val all">0</div></div>
      <div class="stat-card"><div class="stat-label">보정완료</div><div id="del-stat-edited" class="stat-val done">0</div></div>
      <div class="stat-card"><div class="stat-label">발송완료</div><div id="del-stat-sent" class="stat-val wait">0</div></div>
    </div>
    <div id="delivery-list" class="list"></div>
    <div style="height:140px;"></div>
  </div>
</div>

<!-- 촬영 화면 (내장 카메라 인터페이스) -->
<div id="s-camera" class="screen">
  <!-- 촬영 네임보드 데이터 (촬영 전 오버레이) -->
  <div class="nameboard-area">
    <div class="nb-glow"></div>
    <div id="nb-time" class="nb-time">13:00</div>
    <div id="nb-resno" class="nb-resno">20260413-W1</div>
    <div id="nb-name" class="nb-name">홍길동</div>
    <div id="nb-product" class="nb-product">오마카세 코스</div>
  </div>
  <div class="cam-container">
    <video id="videoEl" autoplay playsinline></video>
    <div style="position:absolute; bottom:60px; left:0; right:0; display:flex; justify-content:center; align-items:center; gap:60px;">
      <button class="back-btn" style="background:rgba(255,255,255,0.2); color:#fff; padding:15px 30px;" onclick="show('s-list'); stopCamera();">종료</button>
      <div class="shutter-btn" onclick="takePhoto()"><div class="shutter-inner"></div></div>
      <button class="back-btn" style="background:rgba(255,255,255,0.2); color:#fff; padding:15px 30px;" onclick="flipCamera()">전환</button>
    </div>
  </div>
  <canvas id="canvasEl" style="display:none;"></canvas>
</div>

<!-- 체크인 양식 -->
<div id="s-checkin" class="screen">
  <div class="topbar"><button class="back-btn" onclick="show('s-list')">취소</button><div style="font-size:24px; font-weight:700;">체크인</div><div style="width:50px;"></div></div>
  <div style="padding:20px 24px 120px;">
    <div style="background:var(--surface-low); padding:20px; border-radius:1rem; margin-bottom:20px;">
      <div style="font-size:28px; font-weight:700;" id="ci-name">-</div>
      <div style="font-size:20px; color:var(--primary);" id="ci-resno">-</div>
      <div style="font-size:20px; color:rgba(255,255,255,0.5);" id="ci-product">-</div>
    </div>
    <div style="margin-bottom:20px;"><div style="font-size:18px; opacity:0.7;">실명 확인 *</div><input type="text" id="ci-realname" class="field-input"></div>
    <div style="margin-bottom:20px;"><div style="font-size:18px; opacity:0.7;">이메일 *</div><input type="email" id="ci-email" class="field-input"></div>
    <div style="background:var(--surface-low); padding:20px; border-radius:1rem;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;" onclick="toggle('tg-p1')">
        <span style="font-size:22px;">개인정보 동의 (필수)</span><div id="tg-p1" class="toggle on"></div>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center;" onclick="toggle('tg-s1')">
        <span style="font-size:22px;">마케팅 활용 동의 (선택)</span><div id="tg-s1" class="toggle"></div>
      </div>
    </div>
  </div>
  <div class="btn-group"><button class="btn-primary" onclick="proceedToCheckin()">촬영 시작</button></div>
</div>

<!-- 신규 고객 추가 -->
<div id="s-new" class="screen">
  <div class="topbar"><button class="back-btn" onclick="show('s-list')">취소</button><div id="new-title" style="font-size:24px; font-weight:700;">고객 추가</div><div style="width:50px;"></div></div>
  <div style="padding:20px 24px 120px;">
    <div style="background:var(--surface-low); padding:20px; border-radius:1rem; margin-bottom:20px;">
      <div style="font-size:18px; opacity:0.5;">생성 코드</div><div id="new-code" style="font-size:32px; font-weight:800; color:var(--primary);">-</div>
    </div>
    <div style="margin-bottom:20px;"><div style="font-size:18px; opacity:0.7;">고객 성함 *</div><input type="text" id="new-name" class="field-input"></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
      <div><div style="font-size:18px; opacity:0.7;">시간</div><select id="new-time" class="field-input"><option>13:00</option><option>14:00</option><option>15:00</option><option>16:00</option><option>17:00</option></select></div>
      <div><div style="font-size:18px; opacity:0.7;">인원</div><select id="new-people" class="field-input"><option>1</option><option>2</option><option>3</option><option>4</option></select></div>
    </div>
    <div style="margin-bottom:20px;"><div style="font-size:18px; opacity:0.7;">상품</div><select id="new-prod" class="field-input"><option>오마카세+두컷화보</option><option>심플 코스</option><option>기타</option></select></div>
    <div style="margin-bottom:20px;"><div style="font-size:18px; opacity:0.7;">이메일 *</div><input type="email" id="new-email" class="field-input"></div>
  </div>
  <div class="btn-group"><button class="btn-primary" onclick="goNewCamera()">등록 및 촬영</button></div>
</div>

<!-- 저장 단계 화면 -->
<div id="s-saving" class="screen">
  <div style="padding:100px 24px; text-align:center;">
    <div id="sav-name" style="font-size:36px; font-weight:800; margin-bottom:15px;">이름 · 코드</div>
    <div id="sav-status" style="font-size:22px; color:var(--primary); margin-bottom:60px;">서버 저장 중...</div>
    <div class="step-row" id="st-1"><div class="stat-indicator"></div><div style="flex:1; text-align:left;">아이패드 사진 백업 (필수)</div></div>
    <div class="step-row" id="st-2"><div class="stat-indicator"></div><div style="flex:1; text-align:left;">구글 드라이브 업로드</div></div>
    <div class="step-row" id="st-3"><div class="stat-indicator"></div><div style="flex:1; text-align:left;">스프레드시트 원본 기록</div></div>
  </div>
</div>

<div id="s-done" class="screen">
  <div style="padding:100px 40px; text-align:center;">
    <div style="width:120px; height:120px; background:rgba(78,203,161,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 40px;">
       <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#4ecba1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div style="font-size:48px; font-weight:800; margin-bottom:15px;">저장 완료!</div>
    <div id="done-msg" style="font-size:24px; opacity:0.7; margin-bottom:60px;">-</div>
    <button class="btn-primary" onclick="location.reload()">처음으로 가기</button>
  </div>
</div>

<div id="toast">메시지</div>

<script>
// ── 설정 ─────────────────────────────────────
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwoqVAZVZclcog_8hGo6W5xKCGWdK9HHRCw-CtidsA3sygtPJatZ88b82iouE0brF0G/exec';
var SOUND_BASE = 'https://dksequence.github.io/runing/dk-runs/sound/';
var TIMES = ['13:00', '14:00', '15:00', '16:00', '17:00'];
var SELECTED_TIME = '13:00';
var DATE_OFFSET = 0;
var CUR = {};
var SFX = {};
var STREAM = null;
var FACING = 'environment';

// ── 날짜 관리 ───────────────────────────────────
function changeDate(n) { playSound('EFFECT001'); DATE_OFFSET += n; updateDateUI(); loadList(); }
function goToToday() { if(DATE_OFFSET === 0) return; playSound('EFFECT001'); DATE_OFFSET = 0; updateDateUI(); loadList(); }
function getToday() {
  var d = new Date(); d.setDate(d.getDate() + DATE_OFFSET);
  return d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
}
function updateDateUI() {
  var d = new Date(); d.setDate(d.getDate() + DATE_OFFSET);
  var days = ['일','월','화','수','목','금','토'];
  var label = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' (' + days[d.getDay()] + ')';
  var colors = ['#FF6B6B','#FF8C00','#FFD700','#4ECBA1','#0071E3','#4B0082','#800080'];
  var el = document.getElementById('today-label');
  el.textContent = label; el.style.background = colors[d.getDay()];
}

// ── 사운드 엔지 ──────────────────────────────────
function initSFX() {
  [1,2,3,4,5,6,7,8].forEach(n => {
    var id = 'EFFECT00' + n;
    SFX[id] = new Audio(SOUND_BASE + id + '.mp3');
    SFX[id].load();
  });
}
function unlockAudio() {
  initSFX();
  Object.keys(SFX).forEach(k => { SFX[k].play().then(() => { SFX[k].pause(); SFX[k].currentTime = 0; }).catch(()=>{}); });
  window.removeEventListener('mousedown', unlockAudio); window.removeEventListener('touchstart', unlockAudio);
}
window.addEventListener('mousedown', unlockAudio, {once:true});
window.addEventListener('touchstart', unlockAudio, {once:true});
function playSound(id) {
  if (SFX[id]) { SFX[id].currentTime = 0; SFX[id].play().catch(() => {}); }
}

// ── API (JSONP) ─────────────────────────────────
function callApi(params, cb) {
  var url = GAS_URL + '?callback=jsonp_cb&' + Object.keys(params).map(k => k + '=' + encodeURIComponent(params[k])).join('&');
  window.jsonp_cb = res => {
    delete window.jsonp_cb;
    var s = document.getElementById('api-script'); if(s) s.parentNode.removeChild(s);
    cb(null, res);
  };
  var script = document.createElement('script'); script.id = 'api-script'; script.src = url;
  document.body.appendChild(script);
}

// ── 메인 로직 ──────────────────────────────────
function initTabs() {
  var tabs = document.getElementById('time-tabs'); tabs.innerHTML = '';
  TIMES.forEach(t => {
    var b = document.createElement('button'); b.className = 'tab' + (t === SELECTED_TIME ? ' active' : '');
    b.textContent = t; b.onclick = () => { playSound('EFFECT001'); SELECTED_TIME = t; initTabs(); loadList(); };
    tabs.appendChild(b);
  });
  updateDateUI(); loadList();
}

function loadList() {
  var list = document.getElementById('reservation-list');
  list.innerHTML = '<div style="text-align:center; padding:40px;"><div class="spinner" style="margin:0 auto;"></div></div>';
  callApi({ action: 'getReservations', date: getToday(), time: SELECTED_TIME }, (err, res) => {
    if(err || !res.ok) { list.innerHTML = '<div style="text-align:center; padding:40px; color:var(--danger);">데이터 오류</div>'; return; }
    document.getElementById('stat-total').textContent = res.dailyStats.total;
    document.getElementById('stat-done').textContent = res.dailyStats.done;
    document.getElementById('stat-wait').textContent = res.dailyStats.wait;
    renderCards(res.reservations);
  });
}

function renderCards(res) {
  var list = document.getElementById('reservation-list');
  if (res.length === 0) { list.innerHTML = '<div style="text-align:center; padding:40px; opacity:0.3;">예약 없음</div>'; return; }
  list.innerHTML = '';
  res.forEach(r => {
    var c = document.createElement('div'); c.className = 'customer-card' + (r.checkedIn ? ' done' : '');
    var sClass = 'source-' + (r.source||'A').toLowerCase();
    c.innerHTML = `
      <div class="avatar ${sClass}">${(r.source||'A').toUpperCase()}</div>
      <div class="card-info">
        <div class="card-name">${r.name}</div>
        <div class="card-meta">${r.product} · ${r.people}인</div>
        <div class="card-resno">${r.resno}</div>
      </div>
      <div class="badge ${r.checkedIn?'badge-done':'badge-wait'}">${r.checkedIn?'체크인':'대기'}</div>
    `;
    if(!r.checkedIn) c.onclick = () => { playSound('EFFECT002'); goForm(r); };
    list.appendChild(c);
  });
}

// ── 상세 동작 ──────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function toggle(id) { document.getElementById(id).classList.toggle('on'); }
function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }

function goForm(r) {
  CUR = { resno: r.resno, masked: r.name, product: r.product, people: r.people, time: r.time, source: r.source };
  document.getElementById('ci-name').textContent = r.name;
  document.getElementById('ci-resno').textContent = r.resno;
  document.getElementById('ci-product').textContent = r.product + ' · ' + r.people + '인';
  show('s-checkin');
}

function proceedToCheckin() {
  playSound('EFFECT001');
  var real = document.getElementById('ci-realname').value.trim();
  if(!real) { showToast('실명을 입력하세요.'); return; }
  if(!document.getElementById('tg-p1').classList.contains('on')) { showToast('개인정보 동의 필수'); return; }
  CUR.realName = real;
  CUR.email = document.getElementById('ci-email').value.trim();
  CUR.isNew = false;
  openCamera();
}

function showNewScreen(type) {
  playSound('EFFECT004');
  CUR = { isNew: true, source: type, time: SELECTED_TIME };
  document.getElementById('new-title').textContent = (type==='V'?'체험':'신규')+' 고객';
  callApi({ action: 'getWalkInCode', date: getToday() }, (err, res) => {
    CUR.resno = (err || !res.ok) ? getToday()+'-W1' : res.code;
    document.getElementById('new-code').textContent = CUR.resno;
  });
  show('s-new');
}

function goNewCamera() {
  var name = document.getElementById('new-name').value.trim();
  if(!name) { showToast('이름 입력'); return; }
  if(!document.getElementById('new-email').value.trim()) { showToast('이메일 입력'); return; }
  CUR.realName = name;
  CUR.time = document.getElementById('new-time').value;
  CUR.people = document.getElementById('new-people').value;
  CUR.product = document.getElementById('new-prod').value;
  CUR.email = document.getElementById('new-email').value.trim();
  openCamera();
}

function openCamera() {
  var hhmm = (CUR.time||'00:00').replace(':','');
  CUR.filename = getToday() + '_' + hhmm + '_' + CUR.realName + '.jpg';
  document.getElementById('nb-name').textContent = CUR.realName;
  document.getElementById('nb-resno').textContent = CUR.resno;
  document.getElementById('nb-time').textContent = CUR.time;
  document.getElementById('nb-product').textContent = CUR.product;
  show('s-camera');
  startCamera();
}

function startCamera() {
  playSound('EFFECT008');
  var constraints = { video: { facingMode: FACING, width: { ideal: 1280 }, height: { ideal: 960 } } };
  navigator.mediaDevices.getUserMedia(constraints).then(s => { STREAM = s; var v = document.getElementById('videoEl'); v.srcObject = s; v.play(); });
}
function stopCamera() { if(STREAM) { STREAM.getTracks().forEach(t => t.stop()); STREAM = null; } }
function flipCamera() { FACING = (FACING==='environment'?'user':'environment'); stopCamera(); startCamera(); }

function takePhoto() {
  playSound('EFFECT003');
  var v = document.getElementById('videoEl'); var c = document.getElementById('canvasEl');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  CUR.base64 = c.toDataURL('image/jpeg', 0.85).split(',')[1];
  stopCamera();
  startSavingFlow();
}

function startSavingFlow() {
  document.getElementById('sav-name').textContent = CUR.realName + ' · ' + CUR.resno;
  show('s-saving');
  // 1. 백업
  setSt(1, '#abc7ff');
  try {
    var l = document.createElement('a'); l.href = 'data:image/jpeg;base64,' + CUR.base64; l.download = CUR.filename;
    document.body.appendChild(l); l.click(); document.body.removeChild(l);
    setSt(1, '#4ecba1');
  } catch(e) { setSt(1, '#ff6b6b'); }

  // 2. 드라이브
  setSt(2, '#abc7ff');
  if(typeof google === 'undefined') { setTimeout(step3, 1000); return; }
  google.script.run.withSuccessHandler(res => {
    if(res.ok) { CUR.folderId = res.folderId; CUR.fileUrl = res.fileUrl; setSt(2, '#4ecba1'); step3(); } else setSt(2, '#ff6b6b');
  }).processRequest(JSON.stringify({
    action: 'savePhotoPost', filename: CUR.filename, date: getToday(), time: CUR.time, resno: CUR.resno, realName: CUR.realName, base64: CUR.base64
  }));
}

function step3() {
  setSt(3, '#abc7ff');
  callApi({
    action: 'checkin', date: getToday(), time: CUR.time, resno: CUR.resno, realName: CUR.realName,
    product: CUR.product, people: CUR.people, email: CUR.email, isNew: CUR.isNew, folderId: CUR.folderId
  }, (err, res) => {
    if(!err && res.ok) { setSt(3, '#4ecba1'); setTimeout(() => { playSound('EFFECT005'); document.getElementById('done-msg').textContent = CUR.realName + ' 완료'; show('s-done'); }, 500); }
    else setSt(3, '#ff6b6b');
  });
}
function setSt(n, c) { var el = document.getElementById('st-'+n); el.style.borderColor = c; el.querySelector('.stat-indicator').style.background = c; }

// ── 납품 관리 ──
function switchMode(m) {
  playSound('EFFECT002');
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.mode-tab')[m==='checkin'?0:1].classList.add('active');
  document.getElementById('mode-checkin').style.display = m==='checkin'?'block':'none';
  document.getElementById('mode-delivery').style.display = m==='delivery'?'block':'none';
  if(m==='delivery') loadDel();
}
function loadDel() {
  var list = document.getElementById('delivery-list');
  list.innerHTML = '<div class="spinner" style="margin:40px auto;"></div>';
  callApi({ action: 'getDeliveryList', date: getToday() }, (err, res) => {
    if(err || !res.ok) { list.innerHTML = '실패'; return; }
    document.getElementById('del-stat-total').textContent = res.items.length;
    document.getElementById('del-stat-edited').textContent = res.items.filter(x => x.editStatus==='보정완료').length;
    document.getElementById('del-stat-sent').textContent = res.items.filter(x => x.deliveryStatus.indexOf('발송완료')===0).length;
    list.innerHTML = '';
    res.items.forEach(i => {
      var d = document.createElement('div'); d.className = 'delivery-card';
      d.innerHTML = `<div><b>${i.realName||i.maskedName}</b></div><div style="font-size:16px;">${i.product} · ${i.time}</div><div class="delivery-badge">${i.editStatus} | ${i.deliveryStatus}</div>`;
      list.appendChild(d);
    });
  });
}

window.onload = initTabs;
</script>
</body>
</html>

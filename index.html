<script>
  const menuBtn = document.getElementById('menuBtn');
  const mobileMenu = document.getElementById('mobileMenu');
  const heroSlider = document.getElementById('heroSlider');
  const heroTrack = document.getElementById('heroTrack');
  const heroDots = document.getElementById('heroDots');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  /*
    HERO SLIDE SETTINGS
    image: 슬라이드 이미지 경로
    sub: 작은 텍스트
    title: 큰 텍스트
    link: 클릭 시 이동할 페이지

    여기 link 값만 바꾸면 됨
  */
  const HERO_SLIDES = [
    {
      image: 'images/main-01.jpg',
      sub: 'small things become',
      title: 'wave of Sequence',
      link: '#'
    },
    {
      image: 'images/main-02.jpg',
      sub: 'Portrait',
      title: 'in Sequence',
      link: 'html/motion_index.html'
    },
    {
      image: 'images/main-03.jpg',
      sub: 'Beyond',
      title: 'the Frame',
      link: 'html/macro_index.html'
    },
    {
      image: 'images/main-04.jpg',
      sub: 'Brand Experience',
      title: 'Maxwell House',
      link: '#'
    },
    {
      image: 'images/main-05.jpg',
      sub: 'UV Experience',
      title: 'in Real Time',
      link: '#'
    },
    {
      image: 'images/main-06.jpg',
      sub: 'Seeing the World',
      title: 'from Elsewhere',
      link: '#'
    },
    {
      image: 'images/main-07.jpg',
      sub: 'Artificial',
      title: 'Playground sequence',
      link: 'html/ai_index.html'
    }
  ];

  let currentIndex = 0;
  let startX = 0;
  let startY = 0;
  let endX = 0;
  let endY = 0;
  let isPointerDown = false;
  let dots = [];

  const SWIPE_THRESHOLD = 50;
  const CLICK_THRESHOLD = 10;

  function buildHeroSlides() {
    heroTrack.innerHTML = '';
    heroDots.innerHTML = '';

    HERO_SLIDES.forEach((item, index) => {
      const slide = document.createElement('div');
      slide.className = 'hero-slide';
      slide.setAttribute('data-index', index);
      slide.setAttribute('data-link', item.link);

      slide.innerHTML = `
        <img src="${item.image}" alt="${item.title}" ${index === 0 ? 'fetchpriority="high"' : 'loading="lazy"'} />
        <div class="hero-overlay"></div>
        <div class="hero-slide-content">
          <div class="hero-text-wrap">
            <div class="hero-sub">${item.sub}</div>
            <div class="hero-title">${item.title}</div>
          </div>
        </div>
      `;

      heroTrack.appendChild(slide);

      const dot = document.createElement('button');
      dot.type = 'button';
      dot.setAttribute('aria-label', `Go to slide ${index + 1}`);

      if (index === 0) {
        dot.classList.add('active');
      }

      dot.addEventListener('click', () => {
        currentIndex = index;
        updateHero();
      });

      heroDots.appendChild(dot);
    });

    dots = Array.from(heroDots.querySelectorAll('button'));
  }

  function updateHero() {
    heroTrack.style.transform = `translateX(-${currentIndex * 100}%)`;
    dots.forEach((dot, index) => {
      dot.classList.toggle('active', index === currentIndex);
    });
  }

  function goPrev() {
    currentIndex = (currentIndex - 1 + HERO_SLIDES.length) % HERO_SLIDES.length;
    updateHero();
  }

  function goNext() {
    currentIndex = (currentIndex + 1) % HERO_SLIDES.length;
    updateHero();
  }

  function getPointX(event) {
    if (event.touches && event.touches.length) return event.touches[0].clientX;
    if (event.changedTouches && event.changedTouches.length) return event.changedTouches[0].clientX;
    return event.clientX;
  }

  function getPointY(event) {
    if (event.touches && event.touches.length) return event.touches[0].clientY;
    if (event.changedTouches && event.changedTouches.length) return event.changedTouches[0].clientY;
    return event.clientY;
  }

  function onPointerStart(event) {
    isPointerDown = true;
    startX = getPointX(event);
    startY = getPointY(event);
    endX = startX;
    endY = startY;
  }

  function onPointerMove(event) {
    if (!isPointerDown) return;

    endX = getPointX(event);
    endY = getPointY(event);
  }

  function onPointerEnd(event) {
    if (!isPointerDown) return;

    isPointerDown = false;
    endX = getPointX(event);
    endY = getPointY(event);

    const diffX = endX - startX;
    const diffY = endY - startY;
    const absDiffX = Math.abs(diffX);
    const absDiffY = Math.abs(diffY);

    if (absDiffX > SWIPE_THRESHOLD && absDiffX > absDiffY) {
      if (diffX < 0) {
        goNext();
      } else {
        goPrev();
      }
      return;
    }

    if (absDiffX < CLICK_THRESHOLD && absDiffY < CLICK_THRESHOLD) {
      const clickedSlide = event.target.closest('.hero-slide');
      if (clickedSlide) {
        const targetLink = clickedSlide.getAttribute('data-link');
        if (targetLink && targetLink !== '#') {
          window.location.href = targetLink;
        }
      }
    }
  }

  /*
    Sequence 01 / 02 thumbnail settings
    아래 숫자와 경로만 바꾸면 됨
  */
  function renderSequenceGrid(targetId, folderPath, imageNumbers) {
    const target = document.getElementById(targetId);
    if (!target) return;

    target.innerHTML = imageNumbers.map(num => {
      const fileName = String(num).padStart(4, '0') + '_small.jpg';
      return `<img src="${folderPath}${fileName}" alt="${targetId} image ${num}" loading="lazy">`;
    }).join('');
  }

  /*
    현재 기준 추천값
    - Sequence 01: gallery/small/
    - Sequence 02: portrait/photo/small/

    숫자는 원하는 썸네일 번호로 변경 가능
  */
  renderSequenceGrid('sequence01-grid', 'gallery/small/', [47, 46, 45]);
  renderSequenceGrid('sequence02-grid', 'portrait/photo/small/', [1, 2, 3]);

  if (menuBtn && mobileMenu) {
    menuBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      mobileMenu.classList.toggle('active');
    });

    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.remove('active');
      });
    });

    document.addEventListener('click', function (e) {
      if (!mobileMenu.contains(e.target) && !menuBtn.contains(e.target)) {
        mobileMenu.classList.remove('active');
      }
    });
  }

  prevBtn.addEventListener('click', goPrev);
  nextBtn.addEventListener('click', goNext);

  heroSlider.addEventListener('touchstart', onPointerStart, { passive: true });
  heroSlider.addEventListener('touchmove', onPointerMove, { passive: true });
  heroSlider.addEventListener('touchend', onPointerEnd, { passive: true });

  heroSlider.addEventListener('mousedown', onPointerStart);
  heroSlider.addEventListener('mousemove', onPointerMove);
  heroSlider.addEventListener('mouseup', onPointerEnd);
  heroSlider.addEventListener('mouseleave', function (event) {
    if (isPointerDown) {
      onPointerEnd(event);
    }
  });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') goPrev();
    if (event.key === 'ArrowRight') goNext();
  });

  buildHeroSlides();
  updateHero();
</script>

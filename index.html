<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DKsequence</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      line-height: 1.4;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; width: 100%; }

    .topbar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 32px;
      background: rgba(0,0,0,0.25);
    }

    .logo { font-size: 26px; font-weight: 700; }

    .menu-btn {
      font-size: 28px;
      cursor: pointer;
      z-index: 1002;
    }

    .mobile-menu {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      transform: translateY(-100%);
      transition: 0.3s;
      z-index: 1001;
    }

    .mobile-menu.active {
      transform: translateY(0);
    }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 120px 24px 60px;
    }

    .hero-slider {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .hero-track {
      display: flex;
      height: 100%;
      transition: transform 0.5s ease;
    }

    .hero-slide {
      min-width: 100%;
      height: 100vh;
    }

    .hero-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.45;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .hero-title {
      font-size: 80px;
      font-weight: 800;
    }

    /* ===== CONTENT ===== */
    .content {
      width: 92%;
      margin: 0 auto 140px;
    }

    .work-block {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 48px;
      margin-bottom: 120px;
    }

    .work-text h2 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .about, .contact {
      width: 92%;
      margin: 0 auto 120px;
      border-top: 1px solid rgba(255,255,255,0.15);
      padding-top: 40px;
    }
  </style>
</head>

<body>

<header class="topbar">
  <div class="logo">DKsequence</div>
  <div class="menu-btn" id="menuBtn">☰</div>
</header>

<nav class="mobile-menu" id="mobileMenu">
  <a href="#about">About</a>
  <a href="#contact">Contact</a>
</nav>

<section class="hero">
  <div class="hero-slider">
    <div class="hero-track" id="heroTrack">
      <div class="hero-slide"><img src="hero-01.jpg"></div>
      <div class="hero-slide"><img src="hero-02.jpg"></div>
      <div class="hero-slide"><img src="hero-03.jpg"></div>
    </div>
  </div>

  <div class="hero-inner">
    <div class="hero-title">DKSEQUENCE</div>
  </div>
</section>

<main class="content">
  <div class="work-block">
    <div class="work-text">
      <h2>Motion Graphics</h2>
      <p>Cinematic motion graphics</p>
    </div>
    <img src="main-01.jpg">
  </div>

  <div class="work-block">
    <div class="work-text">
      <h2>Macro Photography</h2>
      <p>Close-up images</p>
    </div>
    <img src="main-02.jpg">
  </div>
</main>

<section class="about" id="about">
  <h2>About</h2>
</section>

<section class="contact" id="contact">
  <h2>Contact</h2>
</section>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const menuBtn = document.getElementById("menuBtn");
  const mobileMenu = document.getElementById("mobileMenu");

  menuBtn.onclick = function (e) {
    e.stopPropagation();
    mobileMenu.classList.toggle("active");
  };

  mobileMenu.onclick = function () {
    mobileMenu.classList.remove("active");
  };
});
</script>

</body>
</html>

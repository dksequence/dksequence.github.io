<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DKsequence — Interesting Experiment</title>

  <link rel="stylesheet" href="../css/menu.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
      border: 0;
      background: transparent;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 32px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: #fff;
    }

    .menu-btn {
      display: block;
      font-size: 30px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      z-index: 1002;
      color: #fff;
      background: transparent;
      border: 0;
    }

    .mobile-menu {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.96);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
      z-index: 1001;
      pointer-events: none;
    }

    .mobile-menu.active {
      transform: translateY(0);
      pointer-events: auto;
    }

    .mobile-menu a {
      font-size: 28px;
      text-transform: uppercase;
      text-align: center;
    }

    .page-wrap {
      width: min(1600px, 94%);
      margin: 0 auto;
      padding: 34px 0 100px;
    }

    .intro {
      max-width: 980px;
      margin-bottom: 14px;
      scroll-margin-top: 110px;
    }

    .sequence-label {
      font-size: 14px;
      color: #9f9f9f;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .intro h1 {
      font-size: clamp(38px, 7vw, 78px);
      line-height: 0.95;
      font-weight: 700;
      margin-bottom: 0;
      letter-spacing: -0.02em;
    }

    .center-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      text-align: center;
      margin-top: 6px;
    }

    .question {
      font-size: clamp(120px, 20vw, 260px);
      font-weight: 700;
      line-height: 1;
      opacity: 0.08;
      margin-bottom: 20px;
    }

    .desc {
      font-size: 18px;
      color: #bbb;
      max-width: 600px;
      line-height: 1.6;
    }

    .desc strong {
      color: #fff;
    }

    @media (max-width: 700px) {
      .topbar {
        padding: 18px 16px;
      }

      .logo {
        font-size: 22px;
      }

      .mobile-menu a {
        font-size: 24px;
      }

      .page-wrap {
        width: 100%;
        padding: 22px 14px 80px;
      }

      .intro {
        margin-bottom: 8px;
      }

      .sequence-label {
        margin-bottom: 8px;
      }

      .question {
        font-size: 140px;
      }

      .desc {
        font-size: 15px;
      }
    }
  </style>
</head>

<body id="top">
  <header class="topbar">
    <a href="../index.html" class="logo">DKsequence</a>
    <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
  </header>

  <nav class="mobile-menu" id="mobileMenu">
    <a href="../index.html">Home</a>
    <a href="#top">Interesting Experiment</a>
  </nav>

  <main class="page-wrap">
    <section class="intro">
      <div class="sequence-label">Experimental Space</div>

      <div class="top-tabs">
        <a href="ai_index.html" class="top-tab">1. AI Music Box</a>
        <a href="ai_con.html" class="top-tab">2. AI Short Reels</a>
        <a href="time_teller.html" class="top-tab">3. Time Teller</a>
        <a href="comming_index.html" class="top-tab current">4. Coming Soon</a>
      </div>

      <h1>Interesting Experiment</h1>
    </section>

    <div class="center-area">
      <div class="question">?</div>
      <div class="desc">
        Looking for the next <strong>interesting idea</strong>.<br>
        A space where small experiments turn into new sequences.<br><br>
        Coming soon.
      </div>
    </div>
  </main>

  <script>
    const menuBtn = document.getElementById("menuBtn");
    const mobileMenu = document.getElementById("mobileMenu");

    if (menuBtn && mobileMenu) {
      menuBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        mobileMenu.classList.toggle("active");
      });

      mobileMenu.querySelectorAll("a").forEach(link => {
        link.addEventListener("click", () => {
          mobileMenu.classList.remove("active");
        });
      });

      document.addEventListener("click", function (e) {
        if (!mobileMenu.contains(e.target) && !menuBtn.contains(e.target)) {
          mobileMenu.classList.remove("active");
        }
      });
    }
  </script>
</body>
</html>

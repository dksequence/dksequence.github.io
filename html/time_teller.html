<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DKsequence | Time Teller</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:Arial,sans-serif}

/* TOP */
.topbar{
display:flex;justify-content:space-between;
padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.08)
}
.logo{font-size:24px;font-weight:700}

/* MENU */
.top-tabs{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin:20px 0;
}
.top-tab{
display:flex;justify-content:center;align-items:center;
min-height:52px;
border:1px solid rgba(255,255,255,0.2);
font-size:13px;text-transform:uppercase;
color:#cfcfcf;
}
.top-tab.current{
background:#fff;color:#000;
}

/* TITLE */
.title-row{
display:flex;justify-content:space-between;
align-items:center;margin-bottom:16px
}
h1{font-size:48px}

/* INTERVAL */
.interval-top{
border:1px solid rgba(255,255,255,0.1);
padding:16px;margin-bottom:16px
}

/* CLOCK */
.clock{
font-size:72px;
font-weight:700;
letter-spacing:-2px;
}

/* MOBILE */
@media(max-width:700px){
.top-tabs{grid-template-columns:1fr}
h1{font-size:36px}
.clock{font-size:48px}
}
</style>
</head>

<body>

<header class="topbar">
<div class="logo">DKsequence</div>
</header>

<div class="page-wrap">

<div class="top-tabs">
<a href="ai_index.html" class="top-tab">1. AI Music Box</a>
<a href="ai_con.html" class="top-tab">2. AI Short Reels</a>
<a href="time_teller.html" class="top-tab current">3. Time Teller</a>
<a href="comming_index.html" class="top-tab">4. Coming Soon</a>
</div>

<div class="title-row">
<h1>Time Teller</h1>
</div>

<div class="interval-top">
<div>
<span id="interval-num">5</span> minutes
</div>
<input type="range" min="1" max="60" value="5"
oninput="updateInterval(this.value)">
</div>

<div class="clock" id="clock">00:00</div>

</div>

<script>
var intervalMin = 5;
var nextAnnounce = null;
var lastKey = '';

function updateClock(){
var now = new Date();

var h = now.getHours()%12 || 12;
var m = String(now.getMinutes()).padStart(2,'0');

document.getElementById('clock').textContent = h+':'+m;

if(nextAnnounce){
var diff = nextAnnounce - now;

if(diff <= 1000){
var key = now.getHours()+':'+now.getMinutes();
if(lastKey!==key){
lastKey=key;
speakTime();
scheduleNext();
}
}
}
}

function scheduleNext(){
var now = new Date();
var next = new Date(now);

next.setSeconds(0);
var min = next.getMinutes();
var add = intervalMin - (min % intervalMin);
next.setMinutes(min + add);

nextAnnounce = next;
}

function speakTime(){
var now = new Date();
var h = now.getHours()%12 || 12;
var m = String(now.getMinutes()).padStart(2,'0');

var text = h+':'+m;

if(window.speechSynthesis){
speechSynthesis.cancel();
var u = new SpeechSynthesisUtterance(text);
u.lang='ko-KR';
speechSynthesis.speak(u);
}
}

function updateInterval(val){
intervalMin=parseInt(val);
document.getElementById('interval-num').textContent=val;
scheduleNext();
}

/* 🔥 자동 시작 */
window.onload = function(){
scheduleNext();
setInterval(updateClock,500);
}
</script>

</body>
</html>

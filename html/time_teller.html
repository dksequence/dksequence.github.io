<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body, html { font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
.wrap { background: var(--color-background-tertiary); min-height: 100vh; padding: 0; }
.phone { max-width: 390px; margin: 0 auto; background: var(--color-background-primary); min-height: 100vh; padding: 0 0 40px; }
.top-bar { padding: 28px 24px 8px; }
.top-bar p { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 2px; }
.top-bar h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.clock-card { margin: 16px 20px; background: #0064FF; border-radius: 20px; padding: 28px 24px 24px; }
.clock-time { font-size: 52px; font-weight: 500; color: #fff; letter-spacing: -1px; font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', monospace; line-height: 1.1; }
.clock-date { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 8px; }
.section { margin: 24px 20px 0; }
.section-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 12px; font-weight: 500; }
.interval-card { background: var(--color-background-secondary); border-radius: 16px; padding: 20px; }
.interval-display { display: flex; align-items: baseline; gap: 6px; margin-bottom: 16px; }
.interval-num { font-size: 36px; font-weight: 500; color: #0064FF; }
.interval-unit { font-size: 16px; color: var(--color-text-secondary); }
input[type=range] { width: 100%; height: 4px; border-radius: 2px; outline: none; border: none; background: var(--color-border-tertiary); accent-color: #0064FF; cursor: pointer; }
.voice-card { background: var(--color-background-secondary); border-radius: 16px; padding: 16px 20px; }
.voice-row { display: flex; align-items: center; gap: 12px; }
.voice-row select { flex: 1; background: transparent; border: none; outline: none; font-size: 15px; color: var(--color-text-primary); cursor: pointer; font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
.test-btn { background: none; border: none; font-size: 13px; color: #0064FF; cursor: pointer; font-weight: 500; padding: 4px 0; white-space: nowrap; font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
.divider { height: 0.5px; background: var(--color-border-tertiary); margin: 0 20px; }
.status-box { margin: 20px 20px 0; background: var(--color-background-secondary); border-radius: 16px; padding: 16px 20px; }
.status-inner { display: flex; align-items: flex-start; gap: 10px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; margin-top: 5px; flex-shrink: 0; }
.status-dot.on { background: #0064FF; }
.status-text { font-size: 14px; color: var(--color-text-secondary); line-height: 1.6; }
.next-text { font-size: 13px; color: #0064FF; margin-top: 6px; }
.btn-area { margin: 24px 20px 0; display: flex; gap: 10px; }
.btn-main { flex: 1; padding: 16px; border-radius: 14px; border: none; background: #0064FF; color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
.btn-main.off { background: var(--color-background-secondary); color: var(--color-text-primary); }
.btn-sub { padding: 16px 20px; border-radius: 14px; border: none; background: var(--color-background-secondary); color: var(--color-text-primary); font-size: 15px; font-weight: 500; cursor: pointer; white-space: nowrap; font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
</style>

<div class="wrap">
<div class="phone">
  <div class="top-bar">
    <p>좋은 하루 보내세요</p>
    <h1>시간 알리미</h1>
  </div>

  <div style="margin: 12px 20px 0;">
    <div class="clock-card">
      <div class="clock-time" id="clock">00:00:00</div>
      <div class="clock-date" id="clock-date">날짜 로딩 중...</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">알림 간격</div>
    <div class="interval-card">
      <div class="interval-display">
        <span class="interval-num" id="interval-num">5</span>
        <span class="interval-unit">분마다</span>
      </div>
      <input type="range" id="interval" min="1" max="60" value="5" step="1" oninput="updateInterval(this.value)">
      <div style="display:flex;justify-content:space-between;margin-top:8px;">
        <span style="font-size:12px;color:var(--color-text-secondary);">1분</span>
        <span style="font-size:12px;color:var(--color-text-secondary);">60분</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">음성</div>
    <div class="voice-card">
      <div class="voice-row">
        <select id="voice-select" onchange="onVoiceChange(this.value)">
          <option value="">기본 음성</option>
        </select>
        <button class="test-btn" onclick="testVoice()">테스트</button>
      </div>
    </div>
  </div>

  <div class="status-box">
    <div class="status-inner">
      <div class="status-dot" id="status-dot"></div>
      <div>
        <div class="status-text" id="status-text">시작 버튼을 눌러 알림을 활성화하세요.</div>
        <div class="next-text" id="next-text"></div>
      </div>
    </div>
  </div>

  <div class="btn-area">
    <button class="btn-main off" id="toggle-btn" onclick="toggleActive()">시작하기</button>
    <button class="btn-sub" onclick="speakNow()">지금 말하기</button>
  </div>
</div>
</div>

<script>
var active = false;
var intervalMin = 5;
var voices = [];
var selectedVoice = null;
var nextAnnounce = null;
var lastSpokenKey = '';

var DAYS = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  var s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m + ':' + s;

  var mo = now.getMonth() + 1;
  var d = now.getDate();
  var day = DAYS[now.getDay()];
  document.getElementById('clock-date').textContent = mo + '월 ' + d + '일 ' + day;

  if (active && nextAnnounce) {
    var diff = nextAnnounce.getTime() - now.getTime();

    if (diff <= 500) {
      var speakKey = now.getFullYear() + '-' +
        String(now.getMonth() + 1).padStart(2, '0') + '-' +
        String(now.getDate()).padStart(2, '0') + ' ' +
        String(now.getHours()).padStart(2, '0') + ':' +
        String(now.getMinutes()).padStart(2, '0');

      if (lastSpokenKey !== speakKey) {
        lastSpokenKey = speakKey;
        speakNow();
        scheduleNext();
      }
    } else {
      var totalSec = Math.ceil(diff / 1000);
      var mm = String(Math.floor(totalSec / 60)).padStart(2, '0');
      var ss = String(totalSec % 60).padStart(2, '0');
      document.getElementById('next-text').textContent = '다음 알림까지 ' + mm + ':' + ss;
    }
  }
}

function scheduleNext() {
  var now = new Date();
  var next = new Date(now);

  next.setSeconds(0);
  next.setMilliseconds(0);

  var minute = next.getMinutes();
  var remainder = minute % intervalMin;

  if (remainder === 0 && now.getSeconds() === 0) {
    // 정확히 경계 시점이면 그대로 사용
  } else {
    var addMin = remainder === 0 ? intervalMin : (intervalMin - remainder);
    next.setMinutes(minute + addMin);
  }

  nextAnnounce = next;
}

function speakNow() {
  var now = new Date();
  var hour12 = now.getHours() % 12 || 12;
  var minute = String(now.getMinutes()).padStart(2, '0');
  var text = hour12 + ':' + minute;

  speak(text);
  document.getElementById('status-text').textContent = text;
}

function speak(text) {
  if (!window.speechSynthesis) return;

  window.speechSynthesis.cancel();

  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR';
  if (selectedVoice) u.voice = selectedVoice;
  u.rate = 0.95;

  window.speechSynthesis.speak(u);
}

function testVoice() {
  speak('7:16');
}

function onVoiceChange(val) {
  selectedVoice = val !== '' ? voices[parseInt(val, 10)] : null;
}

function toggleActive() {
  active = !active;
  var btn = document.getElementById('toggle-btn');
  var dot = document.getElementById('status-dot');

  if (active) {
    lastSpokenKey = '';
    scheduleNext();
    btn.textContent = '중지하기';
    btn.classList.remove('off');
    dot.classList.add('on');
    document.getElementById('status-text').textContent = intervalMin + '분 간격으로 시간을 알려드립니다.';
  } else {
    nextAnnounce = null;
    btn.textContent = '시작하기';
    btn.classList.add('off');
    dot.classList.remove('on');
    document.getElementById('status-text').textContent = '시작 버튼을 눌러 알림을 활성화하세요.';
    document.getElementById('next-text').textContent = '';
  }
}

function updateInterval(val) {
  intervalMin = parseInt(val, 10);
  document.getElementById('interval-num').textContent = val;
  if (active) {
    lastSpokenKey = '';
    scheduleNext();
  }
}

function loadVoices() {
  voices = window.speechSynthesis.getVoices();
  var sel = document.getElementById('voice-select');
  var koVoices = voices.filter(function(v) {
    return v.lang && v.lang.startsWith('ko');
  });
  var list = koVoices.length > 0 ? koVoices : voices;

  sel.innerHTML = '';

  if (list.length === 0) {
    sel.innerHTML = '<option value="">기본 음성</option>';
    selectedVoice = null;
    return;
  }

  list.forEach(function(v) {
    var idx = voices.indexOf(v);
    var opt = document.createElement('option');
    opt.value = idx;
    opt.textContent = v.name;
    sel.appendChild(opt);
  });

  selectedVoice = list[0];
  sel.value = voices.indexOf(list[0]);
}

window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();
setInterval(updateClock, 250);
updateClock();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DKsequence — AI Short Reels</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      width: 100%;
    }

    button {
      font: inherit;
      border: 0;
      background: transparent;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 32px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: #fff;
    }

    .menu-btn {
      display: block;
      font-size: 30px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      z-index: 1002;
      color: #fff;
      background: transparent;
      border: 0;
    }

    .mobile-menu {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.96);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
      z-index: 1001;
      pointer-events: none;
    }

    .mobile-menu.active {
      transform: translateY(0);
      pointer-events: auto;
    }

    .mobile-menu a {
      font-size: 28px;
      text-transform: uppercase;
      text-align: center;
    }

    .page-wrap {
      width: min(1600px, 94%);
      margin: 0 auto;
      padding: 34px 0 100px;
    }

    .intro {
      max-width: 980px;
      margin-bottom: 14px;
      scroll-margin-top: 110px;
    }

    .sequence-label {
      font-size: 14px;
      color: #9f9f9f;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .top-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
      margin-bottom: 18px;
    }

    .top-tab {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.18);
      background: transparent;
      color: #cfcfcf;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
    }

    .top-tab:hover {
      border-color: #fff;
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .top-tab.current {
      border-color: #fff;
      background: #fff;
      color: #000;
    }

    .intro h1 {
      font-size: clamp(38px, 7vw, 78px);
      line-height: 0.95;
      font-weight: 700;
      margin-bottom: 0;
      letter-spacing: -0.02em;
    }

    .section-block {
      margin-top: 6px;
    }

    .section-title {
      font-size: 14px;
      color: #9f9f9f;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .video-card {
      position: relative;
      background: #0b0b0b;
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
      cursor: pointer;
      text-align: left;
      width: 100%;
    }

    .video-thumb-wrap {
      position: relative;
      width: 100%;
      overflow: hidden;
      background: #111;
      aspect-ratio: 9 / 16;
    }

    .video-thumb-wrap iframe,
    .video-thumb-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      object-fit: cover;
      background: #111;
    }

    .video-thumb-wrap img {
      transition: transform 0.35s ease, opacity 0.3s ease;
    }

    .video-card:hover .video-thumb-wrap img {
      transform: scale(1.03);
      opacity: 0.92;
    }

    .play-badge {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 2;
    }

    .play-badge::before {
      content: "";
      width: 56px;
      height: 56px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.55);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.12);
    }

    .play-badge::after {
      content: "";
      position: absolute;
      margin-left: 5px;
      border-left: 16px solid #fff;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
    }

    .video-meta {
      padding: 10px 10px 12px;
    }

    .video-meta h3 {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 3px;
      line-height: 1.45;
    }

    .video-meta p {
      font-size: 11px;
      color: #bdbdbd;
      line-height: 1.45;
    }

    .footer-note {
      margin-top: 54px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: #8f8f8f;
      font-size: 13px;
      line-height: 1.7;
    }

    .bottom-actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .bottom-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      padding: 14px 22px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .bottom-btn:hover {
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.32);
      transform: translateY(-1px);
    }

    @media (max-width: 1200px) {
      .video-grid {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      .video-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      .topbar {
        padding: 18px 16px;
      }

      .logo {
        font-size: 22px;
      }

      .mobile-menu a {
        font-size: 24px;
      }

      .page-wrap {
        width: 100%;
        padding: 22px 14px 80px;
      }

      .intro {
        margin-bottom: 8px;
      }

      .sequence-label {
        margin-bottom: 8px;
      }

      .top-tabs {
        gap: 8px;
        margin-top: 10px;
        margin-bottom: 14px;
      }

      .top-tab {
        min-height: 42px;
        padding: 8px 10px;
        font-size: 11px;
        letter-spacing: 0.04em;
      }

      .section-block {
        margin-top: 8px;
      }

      .video-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .video-meta {
        padding: 8px 8px 10px;
      }

      .video-meta h3 {
        font-size: 11px;
      }

      .video-meta p {
        font-size: 10px;
      }

      .play-badge::before {
        width: 44px;
        height: 44px;
      }

      .play-badge::after {
        border-left-width: 13px;
        border-top-width: 8px;
        border-bottom-width: 8px;
      }

      .bottom-btn {
        min-width: 140px;
        padding: 13px 18px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body id="top">

  <header class="topbar">
    <a href="../index.html" class="logo">DKsequence</a>
    <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
  </header>

  <nav class="mobile-menu" id="mobileMenu">
    <a href="../index.html">Home</a>
    <a href="#sequence12">Sequence 12</a>
    <a href="#video-gallery">Gallery</a>
  </nav>

  <main class="page-wrap">
    <section class="intro" id="sequence12">
      <div class="sequence-label">Sequence #12</div>

      <div class="top-tabs">
        <a href="ai_index.html" class="top-tab">1. AI Music Box</a>

    <div class="footer-note">

    <div class="bottom-actions">
      <a href="#top" class="bottom-btn">Back to Top</a>
      <a href="../index.html" class="bottom-btn">Home</a>

  </main>

      { id: "Ao81BA4Tx-k", title: "Signal Noir", category: "Video" },

      { id: "jijh20V6nTU", title: "Quick Mirage", category: "Shorts" },
      { id: "HXf5UZj_0DE", title: "Afterimage Beat", category: "Shorts" },
      { id: "6lEKDorcKdU", title: "Lumen Trace", category: "Shorts" },
      { id: "UPBDbd-8wck", title: "Night Relay", category: "Shorts" },
      { id: "qZPuTV9Ri8Q", title: "Signal Bloom", category: "Shorts" }
    ];

    const thumbnailOverrides = {
      // "8UWUJVrAOxc": "../images/custom-thumb.jpg"
    };

    const videoGrid = document.getElementById("videoGrid");
    let currentPlayingCard = null;

    function getThumbnail(videoId) {
      return thumbnailOverrides[videoId] || `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
    }

    function getEmbedUrl(videoId) {
      return `https://www.youtube.com/embed/${videoId}?rel=0&playsinline=1`;
    }

    function createCard(item) {
      const card = document.createElement("button");
      card.type = "button";
      card.className = "video-card";
      card.setAttribute("aria-label", item.title);

      card.innerHTML = `
        <div class="video-thumb-wrap">
          <img src="${getThumbnail(item.id)}" alt="${item.title}" loading="lazy">
          <div class="play-badge"></div>
        </div>
        <div class="video-meta">
          <h3>${item.title}</h3>
          <p>${item.category}</p>
        </div>
      `;

      card.addEventListener("click", () => playVideo(card, item));
      return card;
    }

    function resetCard(card, item) {
      const wrap = card.querySelector(".video-thumb-wrap");
      wrap.innerHTML = `
        <img src="${getThumbnail(item.id)}" alt="${item.title}" loading="lazy">
        <div class="play-badge"></div>
      `;
    }

    function playVideo(card, item) {
      if (currentPlayingCard && currentPlayingCard.card !== card) {
        resetCard(currentPlayingCard.card, currentPlayingCard.item);
      }

      const wrap = card.querySelector(".video-thumb-wrap");
      wrap.innerHTML = `
        <iframe
          src="${getEmbedUrl(item.id)}&autoplay=1"
          title="${item.title}"
          loading="lazy"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      `;

      currentPlayingCard = { card, item };
    }

    function renderGrid() {
      videoGrid.innerHTML = "";
      videoItems.forEach(item => {
        videoGrid.appendChild(createCard(item));
      });
    }

    const menuBtn = document.getElementById("menuBtn");
    const mobileMenu = document.getElementById("mobileMenu");

    if (menuBtn && mobileMenu) {
      menuBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        mobileMenu.classList.toggle("active");
      });

      mobileMenu.querySelectorAll("a").forEach(link => {
        link.addEventListener("click", () => {
          mobileMenu.classList.remove("active");
        });
      });

      document.addEventListener("click", function (e) {
        if (!mobileMenu.contains(e.target) && !menuBtn.contains(e.target)) {
          mobileMenu.classList.remove("active");
        }
      });
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener("click", function (e) {
        const targetId = this.getAttribute("href");
        const target = document.querySelector(targetId);
        if (!target) return;

        e.preventDefault();

        const header = document.querySelector(".topbar");
        const headerHeight = header ? header.offsetHeight : 0;
        const extraOffset = window.innerWidth <= 700 ? 16 : 22;
        const targetTop = target.getBoundingClientRect().top + window.pageYOffset - headerHeight - extraOffset;

        window.scrollTo({
          top: targetTop,
          behavior: "smooth"
        });
      });
    });

    renderGrid();
  </script>
</body>
</html>

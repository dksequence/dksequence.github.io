<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer name board v1.01</title>
  <style>
    :root {
      --bg: #0b0b0b;
      --text: #f5f5f5;
      --muted: #cfcfcf;
      --card: #111111;
      --border: #232323;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 64px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .desc {
      margin: 0 0 10px;
      font-size: clamp(16px, 2vw, 20px);
      color: var(--muted);
    }

    .note {
      margin: 0 0 28px;
      font-size: 15px;
      color: var(--muted);
    }

    .image-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      overflow: hidden;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Customer name board v1.01</h1>
    <p class="desc">Collecting customer information and matching customer names and photos.</p>
    <p class="note">* The version that actually works is only available through a specific account.</p>

    <section class="image-box">
      <img src="https://dksequence.github.io/image/nameboardv1.jpg" alt="Customer name board v1.01 preview" />
    </section>
  </main>
</body>
</html>

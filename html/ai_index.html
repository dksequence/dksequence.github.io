<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DKsequence — Sequence 12</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
      border: 0;
      background: transparent;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 32px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: #fff;
    }

    .menu-btn {
      display: block;
      font-size: 30px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      z-index: 1002;
      color: #fff;
      background: transparent;
      border: 0;
    }

    .mobile-menu {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.96);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
      z-index: 1001;
      pointer-events: none;
    }

    .mobile-menu.active {
      transform: translateY(0);
      pointer-events: auto;
    }

    .mobile-menu a {
      font-size: 28px;
      text-transform: uppercase;
      text-align: center;
    }

    .page-wrap {
      width: min(1440px, 94%);
      margin: 0 auto;
      padding: 34px 0 100px;
    }

    .intro {
      max-width: 980px;
      margin-bottom: 14px;
      scroll-margin-top: 110px;
    }

    .sequence-label {
      font-size: 14px;
      color: #9f9f9f;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .intro h1 {
      font-size: clamp(38px, 7vw, 78px);
      line-height: 0.95;
      font-weight: 700;
      margin-bottom: 0;
      letter-spacing: -0.02em;
    }

    .top-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 18px;
      margin-bottom: 18px;
    }

    .top-tab {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      color: #cfcfcf;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    .top-tab:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.28);
      color: #fff;
    }

    .top-tab.active {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.34);
      color: #fff;
    }

    .music-layout {
      display: grid;
      grid-template-columns: 420px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
      margin-top: 10px;
    }

    .music-left,
    .music-right {
      min-width: 0;
    }

    .music-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .music-item {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.02);
      color: #fff;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease, color 0.2s ease;
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .music-item:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.28);
      transform: translateY(-1px);
    }

    .music-item:focus-visible {
      outline: 2px solid rgba(255,255,255,0.7);
      outline-offset: 2px;
    }

    .music-item.active {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.32);
      color: #fff;
      animation: blinkText 1.1s steps(1, end) infinite;
    }

    @keyframes blinkText {
      0%, 50% {
        color: #fff;
      }
      51%, 100% {
        color: rgba(255,255,255,0.35);
      }
    }

    .player-box {
      position: relative;
      width: 100%;
      max-width: 760px;
      aspect-ratio: 16 / 9;
      background: #000;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .player-box iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    .player-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: #8f8f8f;
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: #000;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .player-placeholder.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .now-playing {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-top: 10px;
      color: #bdbdbd;
      font-size: 14px;
      line-height: 1.5;
      max-width: 760px;
    }

    .now-playing strong {
      color: #fff;
      font-weight: 600;
    }

    .footer-note {
      margin-top: 54px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: #8f8f8f;
      font-size: 13px;
      line-height: 1.7;
    }

    .bottom-actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .bottom-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      padding: 14px 22px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .bottom-btn:hover {
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.32);
      transform: translateY(-1px);
    }

    @media (max-width: 1100px) {
      .music-layout {
        grid-template-columns: 360px minmax(0, 1fr);
        gap: 14px;
      }

      .player-box,
      .now-playing {
        max-width: 680px;
      }
    }

    @media (max-width: 900px) {
      .music-layout {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .music-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .player-box,
      .now-playing {
        max-width: none;
      }
    }

    @media (max-width: 700px) {
      .topbar {
        padding: 18px 16px;
      }

      .logo {
        font-size: 22px;
      }

      .mobile-menu a {
        font-size: 24px;
      }

      .page-wrap {
        width: 100%;
        padding: 22px 14px 80px;
      }

      .intro {
        margin-bottom: 8px;
      }

      .sequence-label {
        margin-bottom: 8px;
      }

      .top-tabs {
        gap: 6px;
        margin-top: 12px;
        margin-bottom: 12px;
      }

      .top-tab {
        min-height: 38px;
        padding: 8px 10px;
        font-size: 11px;
        letter-spacing: 0.05em;
      }

      .music-layout {
        margin-top: 8px;
        gap: 8px;
      }

      .music-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 5px;
      }

      .music-item {
        min-height: 30px;
        padding: 4px 6px;
        font-size: 11px;
        line-height: 1;
        letter-spacing: 0.01em;
      }

      .player-placeholder {
        font-size: 12px;
        padding: 16px;
      }

      .now-playing {
        margin-top: 8px;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        font-size: 13px;
      }

      .bottom-btn {
        min-width: 140px;
        padding: 13px 18px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body id="top">

  <header class="topbar">
    <a href="../index.html" class="logo">DKsequence</a>
    <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
  </header>

  <nav class="mobile-menu" id="mobileMenu">
    <a href="../index.html">Home</a>
    <a href="#sequence12">Sequence 12</a>
    <a href="#music-list">Playlist</a>
    <a href="#music-player">Player</a>
  </nav>

  <main class="page-wrap">
    <section class="intro" id="sequence12">
      <div class="sequence-label">Sequence #12</div>
      <h1>AI Music Box</h1>
    </section>

    <div class="top-tabs">
      <a href="ai_index.html" class="top-tab active">1. AI Music Box</a>
      <a href="html/ai_con.html" class="top-tab">2. AI Short Reels</a>
    </div>

    <section class="music-layout">
      <div class="music-left">
        <div class="music-grid" id="music-list">
          <button class="music-item" data-id="x2ZZn0FjI-o" data-title="Reggae Music">Reggae music</button>
          <button class="music-item" data-id="AtrLr0KYF8I" data-title="R&amp;B">R&amp;B</button>
          <button class="music-item" data-id="xwjZeeY638o" data-title="Jazz">Jazz</button>
          <button class="music-item" data-id="ytxF-xEqcsY" data-title="French Pop">French Pop</button>

          <button class="music-item" data-id="scvshcnk64c" data-title="J-Pop">J-Pop</button>
          <button class="music-item" data-id="swPSMZD2_rQ" data-title="Ballad Pop">Ballad pop</button>
          <button class="music-item" data-id="UYRjgUAo6XE" data-title="Groove Rap">Groove Rap</button>
          <button class="music-item" data-id="z5O6jEzHCQQ" data-title="Folk Songs">Folk songs</button>

          <button class="music-item" data-id="7T4Vkz5lruI" data-title="K-Ballad">K-Ballad</button>
          <button class="music-item" data-id="jlXzkOTV6MA" data-title="Pilipino Music">Pilipino music</button>
          <button class="music-item" data-id="CZsIfV8nV4c" data-title="Disco Music">Disco music</button>
          <button class="music-item" data-id="zVhPlFFHLak" data-title="Pet Music">Pet Music</button>
        </div>
      </div>

      <div class="music-right" id="music-player">
        <div class="player-box">
          <iframe
            id="ytPlayer"
            src=""
            title="AI Music Box Player"
            loading="eager"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
          </iframe>
          <div class="player-placeholder" id="playerPlaceholder">Press a music button to play</div>
        </div>

        <div class="now-playing">
          <div><strong>Now Playing</strong> <span id="nowPlayingTitle">None</span></div>
          <div>Sound starts when you press a genre.</div>
        </div>
      </div>
    </section>

    <div class="footer-note">
      Sequence 12 AI Music Box. Select a genre and listen through the embedded player.
    </div>

    <div class="bottom-actions">
      <a href="#top" class="bottom-btn">Back to Top</a>
      <a href="../index.html" class="bottom-btn">Home</a>
    </div>
  </main>

  <script>
    const menuBtn = document.getElementById("menuBtn");
    const mobileMenu = document.getElementById("mobileMenu");
    const player = document.getElementById("ytPlayer");
    const nowPlayingTitle = document.getElementById("nowPlayingTitle");
    const playerPlaceholder = document.getElementById("playerPlaceholder");
    const musicItems = Array.from(document.querySelectorAll(".music-item"));

    function setActiveButton(videoId) {
      musicItems.forEach(btn => btn.classList.remove("active"));
      const target = musicItems.find(btn => btn.dataset.id === videoId);
      if (target) target.classList.add("active");
    }

    function buildPlayerUrl(videoId) {
      return `https://www.youtube.com/embed/${videoId}?rel=0&autoplay=1&mute=0&controls=1&modestbranding=1&playsinline=1`;
    }

    function playTrack(videoId, title) {
      player.src = buildPlayerUrl(videoId);
      nowPlayingTitle.textContent = title;
      setActiveButton(videoId);
      playerPlaceholder.classList.add("hidden");
    }

    if (menuBtn && mobileMenu) {
      menuBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        mobileMenu.classList.toggle("active");
      });

      mobileMenu.querySelectorAll("a").forEach(link => {
        link.addEventListener("click", () => {
          mobileMenu.classList.remove("active");
        });
      });

      document.addEventListener("click", function (e) {
        if (!mobileMenu.contains(e.target) && !menuBtn.contains(e.target)) {
          mobileMenu.classList.remove("active");
        }
      });
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener("click", function (e) {
        const targetId = this.getAttribute("href");
        const target = document.querySelector(targetId);
        if (!target) return;

        e.preventDefault();

        const header = document.querySelector(".topbar");
        const headerHeight = header ? header.offsetHeight : 0;
        const extraOffset = window.innerWidth <= 700 ? 16 : 22;
        const targetTop = target.getBoundingClientRect().top + window.pageYOffset - headerHeight - extraOffset;

        window.scrollTo({
          top: targetTop,
          behavior: "smooth"
        });
      });
    });

    musicItems.forEach(item => {
      item.addEventListener("click", function () {
        playTrack(this.dataset.id, this.dataset.title);
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DKsequence Entry</title>

  <!-- iPad 홈 화면 아이콘 -->
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon-180.png">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .logo {
      width: 140px;
      height: 140px;
      object-fit: contain;
      opacity: 0;
      animation: fadeIn 0.18s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.96);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>

  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        window.location.href = '#';
      }, 450);
    });
    https://script.google.com/macros/s/AKfycby35IYWtv0gZwaW7W53CD0pb-1oI_aQi6XFmwg-C8TjiakYm9Cc23HCVPvluhle1ifr/exec
  </script>
</head>
<body>
  <div class="wrap">
    <img
      class="logo"
      src="./icons/apple-touch-icon-180.png"
      alt="DKsequence logo"
    >
  </div>
</body>
</html>

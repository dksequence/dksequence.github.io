<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DK Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Raleway', 'Noto Sans KR', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
    }

    /* ?Α?Α Header ?Α?Α */
    .header {
      text-align: center;
      padding: 72px 20px 48px;
    }
    .header h1 {
      font-size: 2.4rem;
      font-weight: 200;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .header p {
      color: #666;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }
    .slideshow-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      background: none;
      border: 1px solid #333;
      color: #888;
      padding: 10px 28px;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .slideshow-btn:hover { border-color: #fff; color: #fff; }
    .slideshow-btn svg { width: 13px; height: 13px; fill: currentColor; }

    /* ?Α?Α Filter ?Α?Α */
    .filter {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 0 20px 48px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: none;
      border: 1px solid #2e2e2e;
      color: #666;
      padding: 7px 22px;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #888; color: #ccc; }
    .filter-btn.active { background: #fff; color: #0f0f0f; border-color: #fff; }

    /* ?Α?Α Masonry Grid (?┤Έ?ΉπΑ Έ╣ΕΉερ ?ιΉ?) ?Α?Α */
    .gallery {
      columns: 4 220px;
      column-gap: 6px;
      padding: 0 6px 60px;
      max-width: 1440px;
      margin: 0 auto;
    }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 6px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: #1a1a1a;
    }
    /* ?┤Έ?ΉπΑ ?ρΉιΕ???εΉΜε ???αΈο╝ ?ΗΉζΝ */
    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.4s ease, opacity 0.3s;
    }
    .gallery-item:hover img { transform: scale(1.03); opacity: 0.88; }

    .gallery-item .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .gallery-item:hover .overlay { opacity: 1; }
    .overlay-tag {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      color: #ddd;
      text-transform: uppercase;
    }

    /* ?Α?Α Empty / Loading ?Α?Α */
    .state-msg {
      text-align: center;
      padding: 100px 20px;
      color: #444;
      font-size: 0.82rem;
      letter-spacing: 0.2em;
    }

    /* ?Α?Α Lightbox ?Α?Α */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      z-index: 1000;
      flex-direction: column;
    }
    .lightbox.open { display: flex; }

    .lb-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 28px;
      flex-shrink: 0;
      border-bottom: 1px solid #1e1e1e;
    }
    .lb-tabs { display: flex; gap: 6px; }
    .lb-tab {
      background: none;
      border: 1px solid #333;
      color: #777;
      padding: 6px 20px;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lb-tab:hover { border-color: #888; color: #ccc; }
    .lb-tab.active { background: #fff; color: #0f0f0f; border-color: #fff; }

    .lb-close {
      background: none;
      border: none;
      color: #666;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 4px 8px;
      transition: color 0.2s;
    }
    .lb-close:hover { color: #fff; }

    .lb-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 24px 72px;
      min-height: 0;
    }

    /* CSS ?ΙΉζ┤???σΉΕ▒ (Canvas CORS ?ΑΉ▓? */
    .lb-img-stack {
      position: relative;
      max-width: 100%;
      max-height: calc(100vh - 160px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #lb-base {
      max-width: 100%;
      max-height: calc(100vh - 160px);
      object-fit: contain;
      display: block;
    }
    #lb-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    .lb-spinner {
      position: absolute;
      color: #444;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
    }

    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid #2a2a2a;
      color: #666;
      width: 44px;
      height: 44px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .lb-nav:hover { border-color: #888; color: #fff; }
    .lb-prev { left: 16px; }
    .lb-next { right: 16px; }

    .lb-footer {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 18px 28px;
      flex-shrink: 0;
      border-top: 1px solid #1e1e1e;
    }
    .lb-filename {
      font-size: 0.72rem;
      color: #555;
      letter-spacing: 0.1em;
    }
    .lb-download {
      background: #fff;
      color: #0f0f0f;
      border: none;
      padding: 11px 36px;
      font-size: 0.75rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .lb-download:hover { background: #e0e0e0; }

    /* ?Α?Α Slideshow ?Α?Α */
    .slideshow {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 2000;
      flex-direction: column;
    }
    .slideshow.open { display: flex; }
    .slideshow:-webkit-full-screen { display: flex; }
    .slideshow:fullscreen           { display: flex; }

    /* ?υΉπΕ ?ΒΉΩφ ??Ή║ΦΈ▓Ε???ΕΉ▓┤ ?νΈ▓Ε?ΙΉζ┤ (Ά░ΑΈκ??╕Έκε Ά│╡ΊΗ╡) */
    .ss-inner {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
    }

    .ss-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;  /* ?υΉπΕ ?ΕΉς╜ Ά╕░Ή???*/
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .ss-layer.active { opacity: 1; }

    /* ?νΉαν?νΊΒυ: coverΈκ?Ά╜?Ή▒ΕΉγ░Ά│? CSS-bottom(?ΦΈσ┤ ?╝Ής╜) Ά╕░Ή? ?╡Ή╗ν */
    .kiosk-active .ss-layer {
      object-fit: cover;
      object-position: center bottom;
    }

    /* ?Α?Α ?ΧΈ│┤ Έ░????υΉπΕ ???νΈ▓Ε?ΙΉζ┤, ?ΕΈηαΉς?Ά╕░Ή???(Ά░ΑΈκ??╕Έκε Ά│╡ΊΗ╡) ?Α?Α */
    .ss-info-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 18px 40px;
      gap: 40px;
      z-index: 2;
    }
    .ss-qr-row {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .ss-qr-row img {
      height: 100px;
      width: auto;
      display: block;
    }
    .ss-text-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ss-brand {
      font-size: 0.95rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.92);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .ss-text-line {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.55);
      min-height: 1em;
    }
    /* kiosk ?ΡΉΕε ?ρΆ▓ρΉπΑ???╝Έ░α QR */
    .ss-qr-single img {
      height: 100px;
      width: auto;
      display: block;
    }

    /* ?Α?Α Canvas (?υΈζ╝?┤ΈΥε???┤Έ? Ή╗ρΊΖΝ?┤ΈΕΙ) ?Α?Α */
    #ss-canvas {
      position: absolute;
      inset: 0;
    }

    /* ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ
       ?╕Έκε ?ΦΉΛν?ΝΈιΙ??ΈςρΈΥε (kiosk)
       ?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α
       Ή║ΦΈ▓Ε?νΆ? rotate(90deg) ?αΈ?Έκ?ΉλΝΊΣε ΈπνΊΧΣ:
         CSS ??  ???ΦΈσ┤ ?νΈξ╕Ής? (?υΉπΕ ?ΒΉΩφ)
         CSS ?ΕΈηα ???ΦΈσ┤ ?╝Ής╜    (?υΉζ┤?εΈ░Φ)
         CSS ?╝Ής╜ ???ΦΈσ┤ ??         CSS ?νΈξ╕Ής╜έΗΤ ?ΦΈσ┤ ?ΕΈηα
       ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ?ΡέΧΡ */
    .kiosk-active #ss-canvas {
      width: 100vh;
      height: 100vw;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
      flex-direction: column;          /* ?ΕέΗΤ?ΕΈηα = ?ΦΈσ┤ ?░έΗΤΉλ?*/
      display: flex;
      background: #000;
    }

    /* ?υΉπΕ ?ΒΉΩφ: Ή║ΦΈ▓Ε???ΕΉ▓┤Έξ?Ά╜?Ή▒ΕΉγ░??Έ░░Ά▓╜ ?ΙΉζ┤??*/
    .kiosk-active .ss-inner {
      position: absolute;
      inset: 0;
      min-height: unset;
      z-index: 1;
    }

    /* ?╕ΊΠυ ?ρΈΕΡ: ?υΉπΕ ???νΈ▓Ε?ΙΉζ┤, CSS ?ΕΈηαΉς?= ?ΦΈσ┤ ?╝Ής╜
       height = QR(120px) + Ήλ?0px + ??0px = 180px */
    .kiosk-active .ss-info-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 180px;
      padding: 30px 16px;
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid rgba(255,255,255,0.15);
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 30px;
      z-index: 2;
    }

    /* ?Α?Α QR ?╣ΉΖα ?Α?Α */
    .ss-qr-group { display: none; }
    /* kiosk?ΡΉΕε??ss-qr-group ?ρΆ╕░Ά│?ss-qr-single ?υΉγσ */
    .kiosk-active .ss-qr-group { display: none; }
    .kiosk-active .ss-qr-single {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .kiosk-active .ss-qr-single img {
      height: 120px;
      width: auto;
      display: block;
    }

    /* ?Α?Α Ά╡υΈ╢Ε???Α?Α */
    .ss-divider { display: none; }
    .kiosk-active .ss-divider {
      display: block;
      width: 1px;
      height: 65%;
      background: rgba(255,255,255,0.15);
      flex-shrink: 0;
    }

    /* ?Α?Α Έ╕ΝΈηε??& ?ΞΉΛν???Α?Α */
    .kiosk-active .ss-text-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .kiosk-active .ss-brand {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #fff;
      white-space: nowrap;
      margin-bottom: 14px;
    }
    .kiosk-active .ss-text-line {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* ?╝Έ░α Ά░ΑΈκ?ΈςρΈΥε: ss-qr-single ?εΉΜε */
    .ss-qr-single { display: block; }

    /* ?Α?Α ?υΈζ╝?┤ΈΥε?????νΈ╣ΕΆ▓ΝΉζ┤??(?υΈςΖ Έ▓ΕΊΛ╝) ?Α?Α */
    .ss-tap-zone {
      position: absolute;
      z-index: 50;
      cursor: pointer;
      /* ?ΦΈ▓ΕΆ╖╕Ήγσ: background: rgba(255,0,0,0.15); */
    }

    /* Ά░ΑΈκ?ΈςρΈΥε: Ήλ???ΉνΣΉΧβ 40% ?ΒΉΩφ */
    .ss-tap-prev {
      left: 0;
      top: 30%;
      width: 30%;
      height: 40%;
    }
    .ss-tap-next {
      right: 0;
      top: 30%;
      width: 30%;
      height: 40%;
    }

    /* ?νΉαν?νΊΒυ(?╕Έκε) ΈςρΈΥε: ????ΉνΣΉΧβ ?ΒΉΩφ
       kiosk-active??#slideshow??Έ╢βΉζΝ ???ΦΈσ┤ ΉλΝΊΣε Ά╕░Ή? */
    .kiosk-active .ss-tap-prev {
      left: 20%;
      top: 0;
      width: 60%;
      height: 28%;
      right: auto;
    }
    .kiosk-active .ss-tap-next {
      left: 20%;
      bottom: 0;
      top: auto;
      width: 60%;
      height: 28%;
      right: auto;
    }

    @media (max-width: 768px) {
      .header h1 { font-size: 1.6rem; letter-spacing: 0.3em; }
      .gallery { columns: 2 160px; }
      .lb-body { padding: 16px 52px; }
    }
    @media (max-width: 480px) {
      .gallery { columns: 2 130px; column-gap: 4px; padding: 0 4px 40px; }
      .gallery-item { margin-bottom: 4px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>DK Gallery</h1>
  <p>ΉνΣΈυ╕Έ│ΕΉηξ ?νΈΔΖ Ά░νΈθυΈο?/p>
  <div style="display:flex;gap:10px;justify-content:center;margin-top:28px;">
    <button class="slideshow-btn" id="ss-start-btn">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      Slideshow
    </button>
    <button class="slideshow-btn" id="ss-kiosk-btn" title="?╕Έκε ?ΦΈσ┤ ?ΕΉ▓┤ Ή▒ΕΉ?">
      <svg viewBox="0 0 24 24"><path d="M7 2h10a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm5 15a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/></svg>
      ?╕Έκε ?ΦΉΛν?ΝΈιΙ??    </button>
  </div>
</div>

<!-- Slideshow (?ΕΉ▓┤?ΦΈσ┤) -->
<div class="slideshow" id="slideshow">
  <div id="ss-canvas">
    <div class="ss-inner" id="ss-inner">
      <img class="ss-layer" id="ss-layer-a" src="" alt="">
      <img class="ss-layer" id="ss-layer-b" src="" alt="">
    </div>

    <!-- ?ΧΈ│┤ Έ░?(Ά░ΑΈκεΈςρ?? ?αΈΜρ / ?╕ΈκεΈςρΈΥε: ΉλΝΉΔΒ???ΙΈ??ΕΉ╣α) -->
    <div class="ss-info-bar" id="ss-info-bar">
      <!-- Kiosk ?ΕΉγσ QR Ά╖╕Έμ╣ -->
      <div class="ss-qr-group">
        <div class="ss-qr-row">
          <div class="ss-qr-label">DKsequence</div>
          <img src="source/QR-1.png" alt="QR1">
        </div>
        <div class="ss-qr-row">
          <div class="ss-qr-label">Reservation</div>
          <img src="source/QR-2.png" alt="QR2">
        </div>
      </div>

      <!-- ?╝Έ░α ΈςρΈΥε???ρΉζ╝ QR -->
      <div class="ss-qr-single">
        <img id="ss-qr" src="./qr2.png" alt="QR">
      </div>

      <!-- kiosk: QRΆ│??ΞΉΛν???υΉζ┤ Ά╡υΈ╢Ε??-->
      <div class="ss-divider"></div>

      <div class="ss-text-section">
        <div class="ss-brand">DKsequence X ΉνΣΈυ╕Έ│ΕΉηξ</div>
        <div class="ss-text-line" id="ss-line1"></div>
        <div class="ss-text-line" id="ss-line2"></div>
      </div>
    </div>

    <div id="ss-hint" style="position:absolute;top:16px;right:20px;font-size:0.65rem;letter-spacing:0.2em;color:rgba(255,255,255,0.2);z-index:5;pointer-events:none;">ESC ??ΉλΖΈμΝ</div>
  </div>

  <!-- ?υΈςΖ ?νΈ╣ΕΆ▓ΝΉζ┤????κ┤ (Ά░ΑΈκ? Ήλ??┤ΉιΕ/???νΉζΝ, ?╕Έκε: ???┤ΉιΕ/???νΉζΝ) -->
  <div class="ss-tap-zone ss-tap-prev" id="ss-tap-prev"></div>
  <div class="ss-tap-zone ss-tap-next" id="ss-tap-next"></div>

  <!-- Έ│┤Ήζ┤ΉπΑ ?ΛΈΛΦ ΉλΖΈμΝ Έ▓ΕΊΛ╝ (?░Ή╕κ ?ΒΈΜρ, ?ΕΉζ┤?ρΈΥε?? -->
  <div id="ss-exit-btn" style="position:absolute;top:0;right:0;width:80px;height:80px;z-index:9999;cursor:pointer;" onclick="SS.stop()"></div>
</div>


<div class="filter" id="filter">
  <button class="filter-btn active" data-cat="all">ALL</button>
</div>

<div id="gallery" class="gallery"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lb-header">
    <div class="lb-tabs" id="lb-tabs">
      <button class="lb-tab active" data-ver="watermark">?ΝΊΕ░ΈπΙΊΒυ</button>
      <button class="lb-tab" data-ver="original">?ΡΈ│╕</button>
      <button class="lb-tab" data-ver="poster">?ΦΉηΡ??/button>
    </div>
    <button class="lb-close" id="lb-close">??/button>
  </div>

  <div class="lb-body">
    <button class="lb-nav lb-prev" id="lb-prev">??/button>
    <div class="lb-img-stack">
      <img id="lb-base" src="" alt="">
      <img id="lb-overlay" src="" alt="">
    </div>
    <div class="lb-spinner" id="lb-spinner" style="display:none">Loading...</div>
    <button class="lb-nav lb-next" id="lb-next">??/button>
  </div>

  <div class="lb-footer">
    <span class="lb-filename" id="lb-filename"></span>
    <button class="lb-download" id="lb-download">Download</button>
  </div>
</div>

<script>
// ?Α?Α ?νΉιΧ ?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz29KKvjvBOHK3QszCDE4s2GOCzSz4edwChl5HnW_cpj6FGBaSmh58gkbK6M1SwmrDwOQ/exec';

function thumbUrl(fileId, size) {
  return `https://drive.google.com/thumbnail?id=${fileId}&sz=w${size || 800}&authuser=0`;
}
function downloadUrl(fileId) {
  return `https://drive.google.com/uc?export=download&id=${fileId}`;
}

// GAS ?░Ήζ┤?????┤Έ? ?υΈπ╖ Έ│Α??function toItem(d) {
  return {
    id:        d.photoId,
    name:      d.displayName,
    cat:       d.category || '',
    original:  d.fileId_original  ? thumbUrl(d.fileId_original, 1600)  : '',
    watermark: d.fileId_watermark ? thumbUrl(d.fileId_watermark, 1600) : '',
    poster:    d.fileId_poster    ? thumbUrl(d.fileId_poster, 1600)    : '',
    // ?νΉγ┤ΈκεΈΥε???ΡΈ│╕ fileId
    _origId:   d.fileId_original  || '',
    _posterId: d.fileId_poster    || '',
    _wmId:     d.fileId_watermark || '',
    ssSource:  d.ssSource         || 'original',
  };
}

// ?Α?Α State ?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α
let allItems = [];
let filtered = [...allItems];
let curIndex = 0;
let curVer = 'original';

// ?Α?Α Gallery Render ?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α
function renderGallery(cat) {
  filtered = cat === 'all' ? allItems : allItems.filter(i => i.cat === cat);
  const el = document.getElementById('gallery');
  if (!filtered.length) {
    el.innerHTML = '<div class="state-msg">?υΉπΕ???ΗΉΛ╡?ΙΈΜν.</div>';
    return;
  }
  el.innerHTML = filtered.map((item, idx) => {
    const thumbSrc = item.watermark || item.original;
    return `<div class="gallery-item" data-idx="${idx}">
      <img src="${thumbSrc}" alt="${item.name}">
      <div class="overlay"><span class="overlay-tag">${item.cat}</span></div>
    </div>`;
  }).join('');
  el.querySelectorAll('.gallery-item').forEach(el => {
    el.addEventListener('click', () => openLightbox(+el.dataset.idx));
  });
}

// ?Α?Α Filter ?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α
document.getElementById('filter').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery(btn.dataset.cat);
});

// ?Α?Α Lightbox ?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α
function openLightbox(idx) {
  curIndex = idx;
  const item = filtered[idx];
  // Ά╕░Έ│╕ ?? watermark ?ΙΉε╝Έσ?watermark, ?ΗΉε╝Έσ?original
  curVer = item.watermark ? 'watermark' : 'original';
  document.getElementById('lightbox').classList.add('open');
  renderLbTabs();
  compositeAndShow();
}

function renderLbTabs() {
  const item = filtered[curIndex];
  document.querySelectorAll('.lb-tab').forEach(btn => {
    const ver = btn.dataset.ver;
    // ?┤ΈΜ╣ Έ▓ΕΉιΕ ?ΝΉζ╝???ΗΉε╝Έσ??ρΆ?
    const hasFile = ver === 'original' ? !!item.original
                  : ver === 'watermark' ? !!item.watermark
                  : !!item.poster;
    btn.style.display = hasFile ? '' : 'none';
    btn.classList.toggle('active', ver === curVer);
  });
  document.getElementById('lb-filename').textContent = item.name;
}

function compositeAndShow() {
  const item    = filtered[curIndex];
  const base    = document.getElementById('lb-base');
  const overlay = document.getElementById('lb-overlay');

  // ?ΡΈ│╕?Α ??ΔΒ Έ▓ιΉζ┤??  base.src = item.original;

  // ??│Ε ?νΈ▓Ε?ΙΉζ┤
  if (curVer === 'watermark' && item.watermark) {
    overlay.src = item.watermark;
    overlay.style.display = 'block';
  } else if (curVer === 'poster' && item.poster) {
    overlay.src = item.poster;
    overlay.style.display = 'block';
  } else {
    overlay.style.display = 'none';
    overlay.src = '';
  }
}

// ???┤Έοφ
document.getElementById('lb-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.lb-tab');
  if (!btn) return;
  curVer = btn.dataset.ver;
  renderLbTabs();
  compositeAndShow();
});

// ?τΆ╕░
document.getElementById('lb-close').addEventListener('click', () =>
  document.getElementById('lightbox').classList.remove('open'));
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget)
    document.getElementById('lightbox').classList.remove('open');
});

// ?┤ΉιΕ/?νΉζΝ
document.getElementById('lb-prev').addEventListener('click', () => {
  curIndex = (curIndex - 1 + filtered.length) % filtered.length;
  const item = filtered[curIndex];
  curVer = item.watermark ? 'watermark' : 'original';
  renderLbTabs(); compositeAndShow();
});
document.getElementById('lb-next').addEventListener('click', () => {
  curIndex = (curIndex + 1) % filtered.length;
  const item = filtered[curIndex];
  curVer = item.watermark ? 'watermark' : 'original';
  renderLbTabs(); compositeAndShow();
});

// ?νΈ│┤??document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
  if (e.key === 'ArrowLeft') document.getElementById('lb-prev').click();
  if (e.key === 'ArrowRight') document.getElementById('lb-next').click();
});

// ?νΉγ┤ΈκεΈΥε ???ΕΉηυ Έ▓ΕΉιΕ??Drive ?ΡΈ│╕ ?ΝΉζ╝ ΉπΒΉιΣ ?νΉγ┤ΈκεΈΥε
document.getElementById('lb-download').addEventListener('click', () => {
  const item = filtered[curIndex];
  const fileId = curVer === 'watermark' ? item._wmId
               : curVer === 'poster'    ? item._posterId
               : item._origId;
  if (!fileId) return;
  window.open(downloadUrl(fileId), '_blank');
});

// ?Α?Α Slideshow ?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α
const SS = {
  timer: null,
  queue: [],
  idx: 0,
  front: 'a',   // ?ΕΉηυ Έ│┤Ήζ┤???ΙΉζ┤??
  layerA: document.getElementById('ss-layer-a'),
  layerB: document.getElementById('ss-layer-b'),
  el:     document.getElementById('slideshow'),

  shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  },

  buildQueue() {
    // Ά┤ΑΈουΉηΡ ?νΉιΧ(ssSource)???░Έζ╝ Ά░??υΉπΕ??1?ξΉΦσ ??Ά╡υΉΕ▒
    // ΈςρΈΥι ?υΉπΕ????Έ▓ΙΉΦσ ?αΉαρ ???νΉΜε ?ΦΊΦΝ
    const imgs = [];
    this.shuffle(allItems).forEach(i => {
      const src = i.ssSource || 'original';
      if (src === 'both') {
        // ?????ιΊΔζ??Ά▓╜Ήγ░: ?εΈΞν?╝Έκε ?αΈΓαΈπ?(Ά░βΉ? ?υΉζ┤????ΉνΣΈ│╡ Έ░σΉ?)
        if (i.original && i.poster) {
          imgs.push(Math.random() < 0.5 ? i.original : i.poster);
        } else {
          imgs.push(i.original || i.poster);
        }
      } else if (src === 'poster' && i.poster) {
        imgs.push(i.poster);
      } else if (i.original) {
        imgs.push(i.original);
      }
    });
    this.queue = imgs;
  },

  _kioskFillMode: false,

  _applyKioskCanvas() {
    const el = document.fullscreenElement || this.el;
    const w = el.clientWidth  || window.innerWidth;
    const h = el.clientHeight || window.innerHeight;
    const canvas = document.getElementById('ss-canvas');
    canvas.style.cssText = `width:${h}px;height:${w}px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(90deg);display:flex;flex-direction:column`;
  },

  start(fillMode = false) {
    if (!allItems.length) return; // Ά░νΈθυΈο??░Ήζ┤??ΈκεΈΥε ?ΕΉζ┤Έσ?Έυ┤ΉΜε
    this.buildQueue();
    this.idx = 0;
    this._kioskFillMode = fillMode;
    this.el.classList.add('open');

    if (fillMode) {
      this.el.classList.add('kiosk-active');
      this._applyKioskCanvas(); // ΉοΚΉΜε ?ΒΉγσ (ΈκεΉ╗υ/Έ╣?fullscreen ?αΆ▓╜??
    } else {
      this.el.classList.remove('kiosk-active');
      document.getElementById('ss-canvas').style.cssText = '';
    }

    // ?ΞΉΛν???╝Ήζ╕ ?ΖΈΞ░?┤ΊΛ╕ (admin?ΡΉΕε ?Α?????ΡΉε╝Έσ?Ά╕░Έ│╕Ά░??εΉΜε)
    document.getElementById('ss-line1').textContent = localStorage.getItem('ss_line1') || 'We live through moments';
    document.getElementById('ss-line2').textContent = localStorage.getItem('ss_line2') || 'The experience of leaving a travel moment as a pictorial';

    const req = this.el.requestFullscreen || this.el.webkitRequestFullscreen
             || this.el.mozRequestFullScreen || this.el.msRequestFullscreen;
    if (req) req.call(this.el);

    this.layerA.src = this.queue[0];
    this.layerA.classList.add('active');
    this.layerB.classList.remove('active');
    this.front = 'a';
    this.timer = true;
    this._go();
  },

  _go() {
    const interval = parseInt(localStorage.getItem('ss_interval') || '4000');
    this._timeout = setTimeout(() => this.next(), interval + 1200); // +transition
  },

  _navigate(dir) {
    if (!this.timer) return;
    clearTimeout(this._timeout);
    this._timeout = null;

    if (dir > 0) {
      this.idx = (this.idx + 1) % this.queue.length;
      if (this.idx === 0) this.buildQueue();
    } else {
      this.idx = (this.idx - 1 + this.queue.length) % this.queue.length;
    }

    const incoming = this.front === 'a' ? this.layerB : this.layerA;
    const outgoing  = this.front === 'a' ? this.layerA : this.layerB;

    incoming.onload = null;
    let done = false;
    const swap = () => {
      if (done || !this.timer) return;
      done = true;
      incoming.onload = null;
      incoming.classList.add('active');
      outgoing.classList.remove('active');
      this.front = this.front === 'a' ? 'b' : 'a';
      this._go();
    };

    incoming.onload = swap;
    incoming.src = this.queue[this.idx];
    if (incoming.complete && incoming.naturalWidth) swap();
  },

  next() { this._navigate(1); },
  prev() { this._navigate(-1); },

  stop() {
    this.timer = null;
    clearTimeout(this._timeout);
    this._timeout = null;
    this.layerA.onload = null;
    this.layerB.onload = null;
    this.layerA.classList.remove('active');
    this.layerB.classList.remove('active');
    this.el.classList.remove('open');
    this.el.classList.remove('kiosk-active');
    document.getElementById('ss-canvas').style.cssText = '';
    if (document.fullscreenElement) document.exitFullscreen();
  }
};

document.getElementById('ss-start-btn').addEventListener('click', () => SS.start(false));
document.getElementById('ss-kiosk-btn').addEventListener('click', () => SS.start(true));

document.getElementById('ss-tap-prev').addEventListener('click', () => SS.prev());
document.getElementById('ss-tap-next').addEventListener('click', () => SS.next());

// fullscreen ΉπΕΉηΖ ??kiosk Ή║ΦΈ▓Ε???υΆ│Ε?? ΉλΖΈμΝ ???υΈζ╝?┤ΈΥε???ΧΉ?
document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) {
    if (SS.timer && SS._kioskFillMode) SS._applyKioskCanvas();
  } else if (SS.timer) {
    SS.stop();
  }
});

// ESC ?νΈκε ?υΈζ╝?┤ΈΥε??ΉλΖΈμΝ
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && SS.el.classList.contains('open')) SS.stop();
});

// ?kiosk=1 ?ΝΈζ╝Έψ╕ΊΕ░ ???αΉζ┤ΉπΑ ΈκεΈΥε ???╕Έκε ?ΦΉΛν?ΝΈιΙ???ΡΈΠβ ?εΉηΣ
if (new URLSearchParams(location.search).get('kiosk') === '1') {
  // Ά░νΈθυΈο??░Ήζ┤???ΝΈΞΦ ??Έ░ΦΈκε ?εΉηΣ (?υΉγσ???εΉΛνΉ▓??ΗΉζ┤??fullscreen Έ╢ΙΆ???Έ╕ΝΈζ╝?░Ή? ?ΑΈ╣?
  window.addEventListener('click', function startKiosk() {
    SS.start(true);
    window.removeEventListener('click', startKiosk);
  }, { once: true });
  // ?ΦΈσ┤???ΙΈΓ┤ ?εΉΜε
  document.body.insertAdjacentHTML('beforeend',
    '<div id="kiosk-hint" style="position:fixed;inset:0;display:flex;align-items:center;' +
    'justify-content:center;background:#000;color:#555;font-size:0.8rem;' +
    'letter-spacing:0.2em;z-index:9999;cursor:pointer;">?ΦΈσ┤???░Ή╣α?αΈσ┤ ?εΉηΣ?σΈΜΙ??/div>'
  );
  document.getElementById('kiosk-hint').addEventListener('click', () => {
    document.getElementById('kiosk-hint').remove();
  });
}

// ?Α?Α Init ??GAS?ΡΉΕε ?░Ήζ┤??ΈκεΈΥε ?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α?Α
async function loadGallery() {
  document.getElementById('gallery').innerHTML =
    '<div class="state-msg">Loading...</div>';
  try {
    const res  = await fetch(GAS_URL + '?action=gallery');
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    allItems = json.data.map(toItem);
    renderCategories();
    renderGallery('all');
  } catch (e) {
    document.getElementById('gallery').innerHTML =
      '<div class="state-msg">Ά░νΈθυΈουΈ? Έ╢ΙΈθυ?νΉ? Ές╗ΊΨΙ?╡ΈΜΙ??<br>' + e.message + '</div>';
  }
}

function renderCategories() {
  const cats = [...new Set(allItems.map(i => i.cat).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'ko'));
  const filter = document.getElementById('filter');
  filter.innerHTML = '<button class="filter-btn active" data-cat="all">ALL</button>'
    + cats.map(c => `<button class="filter-btn" data-cat="${c}">${c}</button>`).join('');
}

loadGallery();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DK Gallery</title>
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400&family=Noto+Sans+KR:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Raleway', 'Noto Sans KR', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 72px 20px 48px;
    }
    .header h1 {
      font-size: 2.4rem;
      font-weight: 200;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .header p {
      color: #666;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }
    .slideshow-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      background: none;
      border: 1px solid #333;
      color: #888;
      padding: 10px 28px;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .slideshow-btn:hover { border-color: #fff; color: #fff; }
    .slideshow-btn svg { width: 13px; height: 13px; fill: currentColor; }

    /* ── Filter ── */
    .filter {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 0 20px 48px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: none;
      border: 1px solid #2e2e2e;
      color: #666;
      padding: 7px 22px;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #888; color: #ccc; }
    .filter-btn.active { background: #fff; color: #0f0f0f; border-color: #fff; }

    /* ── Masonry Grid (이미지 비율 유지) ── */
    .gallery {
      columns: 4 220px;
      column-gap: 6px;
      padding: 0 6px 60px;
      max-width: 1440px;
      margin: 0 auto;
    }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 6px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: #1a1a1a;
    }
    /* 이미지 온전히 표시 — 잘림 없음 */
    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.4s ease, opacity 0.3s;
    }
    .gallery-item:hover img { transform: scale(1.03); opacity: 0.88; }

    .gallery-item .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .gallery-item:hover .overlay { opacity: 1; }
    .overlay-tag {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      color: #ddd;
      text-transform: uppercase;
    }

    /* ── Empty / Loading ── */
    .state-msg {
      text-align: center;
      padding: 100px 20px;
      color: #444;
      font-size: 0.82rem;
      letter-spacing: 0.2em;
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      z-index: 1000;
      flex-direction: column;
    }
    .lightbox.open { display: flex; }

    .lb-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 28px;
      flex-shrink: 0;
      border-bottom: 1px solid #1e1e1e;
    }
    .lb-tabs { display: flex; gap: 6px; }
    .lb-tab {
      background: none;
      border: 1px solid #333;
      color: #777;
      padding: 6px 20px;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lb-tab:hover { border-color: #888; color: #ccc; }
    .lb-tab.active { background: #fff; color: #0f0f0f; border-color: #fff; }

    .lb-close {
      background: none;
      border: none;
      color: #666;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 4px 8px;
      transition: color 0.2s;
    }
    .lb-close:hover { color: #fff; }

    .lb-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 24px 72px;
      min-height: 0;
    }

    /* CSS 레이어 합성 (Canvas CORS 대체) */
    .lb-img-stack {
      position: relative;
      max-width: 100%;
      max-height: calc(100vh - 160px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #lb-base {
      max-width: 100%;
      max-height: calc(100vh - 160px);
      object-fit: contain;
      display: block;
    }
    #lb-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    .lb-spinner {
      position: absolute;
      color: #444;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
    }

    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid #2a2a2a;
      color: #666;
      width: 44px;
      height: 44px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .lb-nav:hover { border-color: #888; color: #fff; }
    .lb-prev { left: 16px; }
    .lb-next { right: 16px; }

    .lb-footer {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 18px 28px;
      flex-shrink: 0;
      border-top: 1px solid #1e1e1e;
    }
    .lb-filename {
      font-size: 0.72rem;
      color: #555;
      letter-spacing: 0.1em;
    }
    .lb-download {
      background: #fff;
      color: #0f0f0f;
      border: none;
      padding: 11px 36px;
      font-size: 0.75rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .lb-download:hover { background: #e0e0e0; }

    /* ── Slideshow ── */
    .slideshow {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 2000;
      flex-direction: column;
    }
    .slideshow.open { display: flex; }
    .slideshow:-webkit-full-screen { display: flex; }
    .slideshow:fullscreen           { display: flex; }

    /* 사진 영역 — 캔버스 전체 오버레이 (가로/세로 공통) */
    .ss-inner {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
    }

    .ss-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;  /* 사진 위쪽 기준점 */
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .ss-layer.active { opacity: 1; }

    /* 키오스크: cover로 꽉 채우고, CSS-bottom(화면 왼쪽) 기준 앵커 */
    .kiosk-active .ss-layer {
      object-fit: cover;
      object-position: center bottom;
    }

    /* ── 정보 바 — 사진 위 오버레이, 아래쪽 기준점 (가로/세로 공통) ── */
    .ss-info-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 18px 40px;
      gap: 40px;
      z-index: 2;
    }
    .ss-qr-row {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .ss-qr-row img {
      height: 100px;
      width: auto;
      display: block;
    }
    .ss-text-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ss-brand {
      font-size: 0.95rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.92);
      margin-bottom: 6px;
    }
    .ss-text-line {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.55);
      min-height: 1em;
    }
    /* kiosk 에서 숨겨지는 일반 QR */
    .ss-qr-single img {
      height: 100px;
      width: auto;
      display: block;
    }

    /* ── Canvas (슬라이드쇼 내부 컨테이너) ── */
    #ss-canvas {
      position: absolute;
      inset: 0;
    }

    /* ══════════════════════════════════════════════════════
       세로 디스플레이 모드 (kiosk)
       ──────────────────────────────────────────────────────
       캔버스가 rotate(90deg) 되므로 좌표 매핑:
         CSS 위   → 화면 오른쪽  (사진 영역)
         CSS 아래 → 화면 왼쪽    (사이드바)
         CSS 왼쪽 → 화면 위
         CSS 오른쪽→ 화면 아래
       ══════════════════════════════════════════════════════ */
    .kiosk-active #ss-canvas {
      width: 100vh;
      height: 100vw;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
      flex-direction: column;          /* 위→아래 = 화면 우→좌 */
      display: flex;
      background: #000;
    }

    /* 사진 영역: 캔버스 전체를 꽉 채우는 배경 레이어 */
    .kiosk-active .ss-inner {
      position: absolute;
      inset: 0;
      min-height: unset;
      z-index: 1;
    }

    /* 인포 패널: 사진 위 오버레이, CSS 아래쪽 = 화면 왼쪽
       height = QR(120px) + 좌30px + 우30px = 180px */
    .kiosk-active .ss-info-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 180px;
      padding: 30px 16px;
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid rgba(255,255,255,0.15);
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 30px;
      z-index: 2;
    }

    /* ── QR 섹션 ── */
    .ss-qr-group { display: none; }
    /* kiosk에서도 ss-qr-group 숨기고 ss-qr-single 사용 */
    .kiosk-active .ss-qr-group { display: none; }
    .kiosk-active .ss-qr-single {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .kiosk-active .ss-qr-single img {
      height: 120px;
      width: auto;
      display: block;
    }

    /* ── 구분선 ── */
    .ss-divider { display: none; }
    .kiosk-active .ss-divider {
      display: block;
      width: 1px;
      height: 65%;
      background: rgba(255,255,255,0.15);
      flex-shrink: 0;
    }

    /* ── 브랜드 & 텍스트 ── */
    .kiosk-active .ss-text-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .kiosk-active .ss-brand {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: #fff;
      white-space: nowrap;
      margin-bottom: 14px;
      text-transform: none;
    }
    .kiosk-active .ss-text-line {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* 일반 가로 모드: ss-qr-single 표시 */
    .ss-qr-single { display: block; }

    /* ── Ken Burns (느린 패닝 모션) ── */
    @keyframes ss-ken-up {
      from { transform: scale(1.06) translateY(1.8%); }
      to   { transform: scale(1.11) translateY(-1.8%); }
    }
    @keyframes ss-ken-down {
      from { transform: scale(1.06) translateY(-1.8%); }
      to   { transform: scale(1.11) translateY(1.8%); }
    }
    @keyframes ss-ken-left {
      from { transform: scale(1.06) translateX(1.8%); }
      to   { transform: scale(1.11) translateX(-1.8%); }
    }
    @keyframes ss-ken-right {
      from { transform: scale(1.06) translateX(-1.8%); }
      to   { transform: scale(1.11) translateX(1.8%); }
    }

    /* ── 슬라이드쇼 탭 네비게이션 (투명 버튼) ── */
    .ss-tap-zone {
      position: absolute;
      z-index: 50;
      cursor: pointer;
      /* 디버그용: background: rgba(255,0,0,0.15); */
    }

    /* 가로 모드: 좌/우 중앙 40% 영역 */
    .ss-tap-prev {
      left: 0;
      top: 30%;
      width: 30%;
      height: 40%;
    }
    .ss-tap-next {
      right: 0;
      top: 30%;
      width: 30%;
      height: 40%;
    }

    /* 키오스크(세로) 모드: 상/하 중앙 영역
       kiosk-active는 #slideshow에 붙음 → 화면 좌표 기준 */
    .kiosk-active .ss-tap-prev {
      left: 20%;
      top: 0;
      width: 60%;
      height: 28%;
      right: auto;
    }
    .kiosk-active .ss-tap-next {
      left: 20%;
      bottom: 0;
      top: auto;
      width: 60%;
      height: 28%;
      right: auto;
    }

    /* ── Show Texts 오버레이 ── */
    .ss-show-text {
      position: absolute;
      z-index: 60;
      pointer-events: none;
      display: none;
    }
    .ss-txt-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .ss-show-line {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-style: italic;
      color: rgba(255, 218, 112, 0.92);
      letter-spacing: 0.07em;
      opacity: 0;
      will-change: transform, opacity, text-shadow, color;
      text-align: center;
    }
    .ss-first-char {
      font-size: 1.4em;
      line-height: 0.85;
      display: inline-block;
      vertical-align: baseline;
    }

    @keyframes txt-glow-pulse {
      0%, 100% {
        text-shadow:
          0 0 6px  rgba(255, 215, 80,  0.65),
          0 0 18px rgba(255, 185, 30,  0.40),
          0 0 40px rgba(210, 140,  0,  0.20),
          0 2px 8px rgba(0, 0, 0, 0.7);
      }
      50% {
        text-shadow:
          0 0 10px rgba(255, 228, 110, 1.00),
          0 0 28px rgba(255, 200, 50,  0.75),
          0 0 58px rgba(230, 160,  0,  0.50),
          0 0 90px rgba(200, 120,  0,  0.22),
          0 2px 8px rgba(0, 0, 0, 0.7);
      }
    }
    @keyframes txt-shimmer {
      0%, 100% { color: rgba(255, 218, 112, 0.92); }
      35%      { color: rgba(255, 248, 210, 0.98); }
      50%      { color: rgba(255, 255, 255, 0.96); }
      65%      { color: rgba(255, 248, 210, 0.98); }
    }

    @keyframes txt-ltr {
      0%   { transform: translateX(-2%); opacity: 0; }
      12%  { opacity: 1; }
      78%  { opacity: 1; }
      100% { transform: translateX(2%);  opacity: 0; }
    }
    @keyframes txt-rtl {
      0%   { transform: translateX(2%);  opacity: 0; }
      12%  { opacity: 1; }
      78%  { opacity: 1; }
      100% { transform: translateX(-2%); opacity: 0; }
    }
    @keyframes txt-ttb {
      0%   { transform: translateY(-2%); opacity: 0; }
      12%  { opacity: 1; }
      78%  { opacity: 1; }
      100% { transform: translateY(2%);  opacity: 0; }
    }
    @keyframes txt-btt {
      0%   { transform: translateY(2%);  opacity: 0; }
      12%  { opacity: 1; }
      78%  { opacity: 1; }
      100% { transform: translateY(-2%); opacity: 0; }
    }

    @media (max-width: 768px) {
      .header h1 { font-size: 1.6rem; letter-spacing: 0.3em; }
      .gallery { columns: 2 160px; }
      .lb-body { padding: 16px 52px; }
    }
    @media (max-width: 480px) {
      .gallery { columns: 2 130px; column-gap: 4px; padding: 0 4px 40px; }
      .gallery-item { margin-bottom: 4px; }
    }

    /* ── Reservation Popup (Inside ss-canvas) ── */
    .res-popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      opacity: 0;
      width: 380px;
      background: rgba(15, 15, 15, 0.9);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 218, 112, 0.4);
      border-radius: 16px;
      padding: 30px 24px;
      color: #fff;
      z-index: 9000;
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      pointer-events: none;
    }
    .res-popup.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* ── New Reservation Toast (Inside ss-canvas) ── */
    .new-res-toast {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      opacity: 0;
      background: linear-gradient(135deg, rgba(255, 218, 112, 0.95), rgba(255, 160, 60, 0.95));
      color: #111;
      padding: 20px 40px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: 0.05em;
      box-shadow: 0 20px 50px rgba(255, 160, 60, 0.5);
      z-index: 9500;
      transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .new-res-toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .res-title {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      color: #ffda70;
      margin-bottom: 16px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding-bottom: 10px;
      text-align: center;
    }
    .res-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .res-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .res-time {
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      color: #ddd;
    }
    .res-name {
      font-size: 1.1rem;
      font-weight: 400;
    }
    .res-check {
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      color: #999;
      letter-spacing: 0.1em;
    }
    .res-check.confirmed {
      background: rgba(76, 175, 80, 0.2);
      color: #81c784;
      border: 1px solid rgba(76, 175, 80, 0.4);
    }
  </style>
</head>
<body>

<div class="header">
  <h1>DK Gallery</h1>
  <p>DKsequence Snap Gallery</p>
  <div style="display:flex;gap:10px;justify-content:center;margin-top:28px;">
    <button class="slideshow-btn" id="ss-start-btn">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      Slideshow
    </button>
    <button class="slideshow-btn" id="ss-kiosk-btn" title="세로 화면 전체 채움">
      <svg viewBox="0 0 24 24"><path d="M7 2h10a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm5 15a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/></svg>
      Vertical
    </button>
  </div>
</div>

<!-- Slideshow (전체화면) -->
<div class="slideshow" id="slideshow">
  <div id="ss-canvas">
    <div class="ss-inner" id="ss-inner">
      <img class="ss-layer" id="ss-layer-a" src="" alt="">
      <img class="ss-layer" id="ss-layer-b" src="" alt="">
    </div>

    <!-- Top-Left Hidden Button (Schedule Popup) -->
    <div id="hidden-res-btn" style="position:absolute;top:0;left:0;width:150px;height:150px;z-index:9999;cursor:pointer;"></div>

    <!-- Top-Right Hidden Button (New Reservation Toast) -->
    <div id="hidden-toast-btn" style="position:absolute;top:0;right:0;width:150px;height:150px;z-index:9999;cursor:pointer;"></div>

    <!-- 정보 바 (가로모드: 하단 / 세로모드: 좌상단 절대위치) -->
    <div class="ss-info-bar" id="ss-info-bar">
      <!-- Kiosk 전용 QR 그룹 -->
      <div class="ss-qr-group">

      <!-- 일반 모드용 단일 QR -->

      </div>

      <span style="font-size:1.4rem;">🎉</span>

    </div>
  </div>

  <!-- Show Texts 오버레이 (ss-canvas 밖, slideshow 기준 좌표) -->
  <div id="ss-show-text" class="ss-show-text">

      <div class="ss-show-line" id="ss-txt-line1"></div>
      <div class="ss-show-line" id="ss-txt-line2"></div>
    </div>
  </div>

  <!-- 투명 네비게이션 탭존 (가로: 좌=이전/우=다음, 세로: 상=이전/하=다음) -->
  <div class="ss-tap-zone ss-tap-prev" id="ss-tap-prev"></div>
  <div class="ss-tap-zone ss-tap-next" id="ss-tap-next"></div>

  <!-- 보이지 않는 종료 버튼 (우측 상단, 아이패드용) -->
  <div id="ss-exit-btn" style="position:absolute;top:0;right:0;width:80px;height:80px;z-index:9999;cursor:pointer;" onclick="SS.stop()"></div>
</div>


<div class="filter" id="filter">
  <button class="filter-btn active" data-cat="all">ALL</button>
</div>

<div id="gallery" class="gallery"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lb-header">
    <div class="lb-tabs" id="lb-tabs">
      <button class="lb-tab active" data-ver="watermark">워터마크</button>
      <button class="lb-tab" data-ver="original">원본</button>
      <button class="lb-tab" data-ver="poster">디자인</button>
    </div>
    <button class="lb-close" id="lb-close">✕</button>
  </div>

  <div class="lb-body">
    <button class="lb-nav lb-prev" id="lb-prev">‹</button>
    <div class="lb-img-stack">
      <img id="lb-base" src="" alt="">
      <img id="lb-overlay" src="" alt="">
    </div>
    <div class="lb-spinner" id="lb-spinner" style="display:none">Loading...</div>
    <button class="lb-nav lb-next" id="lb-next">›</button>
  </div>

  <div class="lb-footer">
    <span class="lb-filename" id="lb-filename"></span>
    <button class="lb-download" id="lb-download">Download</button>
  </div>
</div>

<script>
// ── 설정 ────────────────────────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbziLckrxH4NqUCJ5RJdxaIO1Arf4_SgjHuAyiupKlQsgmPSu68ex68XZobwxfwWRsAtpw/exec';

function thumbUrl(fileId, size) {
  return `https://drive.google.com/thumbnail?id=${fileId}&sz=w${size || 800}&authuser=0`;
}
function downloadUrl(fileId) {
  return `https://drive.google.com/uc?export=download&id=${fileId}`;
}

// GAS 데이터 → 내부 포맷 변환
function toItem(d) {
  return {
    id:        d.photoId,
    name:      d.displayName,
    cat:       d.category || '',
    original:  d.fileId_original  ? thumbUrl(d.fileId_original, 1600)  : '',
    watermark: d.fileId_watermark ? thumbUrl(d.fileId_watermark, 1600) : '',
    poster:    d.fileId_poster    ? thumbUrl(d.fileId_poster, 1600)    : '',
    // 다운로드용 원본 fileId
    _origId:   d.fileId_original  || '',
    _posterId: d.fileId_poster    || '',
    _wmId:     d.fileId_watermark || '',
    ssSource:  d.ssSource         || 'original',
  };
}

// ── State ────────────────────────────────────────────────────────────
let allItems = [];
let filtered = [...allItems];
let curIndex = 0;
let curVer = 'original';

// ── Gallery Render ───────────────────────────────────────────────────
function splitCats(cat) {
  return (cat || '').split(',').map(c => c.trim()).filter(Boolean);
}

function renderGallery(cat) {
  filtered = cat === 'all' ? allItems : allItems.filter(i => splitCats(i.cat).includes(cat));
  const el = document.getElementById('gallery');
  if (!filtered.length) {
    el.innerHTML = '<div class="state-msg">사진이 없습니다.</div>';
    return;
  }
  el.innerHTML = filtered.map((item, idx) => {
    const thumbSrc = item.watermark || item.original;
    const catLabel = splitCats(item.cat).join(' · ');
    return `<div class="gallery-item" data-idx="${idx}">
      <img src="${thumbSrc}" alt="${item.name}">
      <div class="overlay"><span class="overlay-tag">${catLabel}</span></div>
    </div>`;
  }).join('');
  el.querySelectorAll('.gallery-item').forEach(el => {
    el.addEventListener('click', () => openLightbox(+el.dataset.idx));
  });
}

// ── Filter ───────────────────────────────────────────────────────────
document.getElementById('filter').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery(btn.dataset.cat);
});

// ── Lightbox ─────────────────────────────────────────────────────────
function openLightbox(idx) {
  curIndex = idx;
  const item = filtered[idx];
  // 기본 탭: watermark 있으면 watermark, 없으면 original
  curVer = item.watermark ? 'watermark' : 'original';
  document.getElementById('lightbox').classList.add('open');
  renderLbTabs();
  compositeAndShow();
}

function renderLbTabs() {
  const item = filtered[curIndex];
  document.querySelectorAll('.lb-tab').forEach(btn => {
    const ver = btn.dataset.ver;
    // 해당 버전 파일이 없으면 숨김
    const hasFile = ver === 'original' ? !!item.original
                  : ver === 'watermark' ? !!item.watermark
                  : !!item.poster;
    btn.style.display = hasFile ? '' : 'none';
    btn.classList.toggle('active', ver === curVer);
  });
  document.getElementById('lb-filename').textContent = item.name;
}

function compositeAndShow() {
  const item    = filtered[curIndex];
  const base    = document.getElementById('lb-base');
  const overlay = document.getElementById('lb-overlay');

  // 원본은 항상 베이스
  base.src = item.original;

  // 탭별 오버레이
  if (curVer === 'watermark' && item.watermark) {
    overlay.src = item.watermark;
    overlay.style.display = 'block';
  } else if (curVer === 'poster' && item.poster) {
    overlay.src = item.poster;
    overlay.style.display = 'block';
  } else {
    overlay.style.display = 'none';
    overlay.src = '';
  }
}

// 탭 클릭
document.getElementById('lb-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.lb-tab');
  if (!btn) return;
  curVer = btn.dataset.ver;
  renderLbTabs();
  compositeAndShow();
});

// 닫기
document.getElementById('lb-close').addEventListener('click', () =>
  document.getElementById('lightbox').classList.remove('open'));
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget)
    document.getElementById('lightbox').classList.remove('open');
});

// 이전/다음
document.getElementById('lb-prev').addEventListener('click', () => {
  curIndex = (curIndex - 1 + filtered.length) % filtered.length;
  const item = filtered[curIndex];
  curVer = item.watermark ? 'watermark' : 'original';
  renderLbTabs(); compositeAndShow();
});
document.getElementById('lb-next').addEventListener('click', () => {
  curIndex = (curIndex + 1) % filtered.length;
  const item = filtered[curIndex];
  curVer = item.watermark ? 'watermark' : 'original';
  renderLbTabs(); compositeAndShow();
});

// 키보드
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
  if (e.key === 'ArrowLeft') document.getElementById('lb-prev').click();
  if (e.key === 'ArrowRight') document.getElementById('lb-next').click();
});

// 다운로드 — 현재 버전의 Drive 원본 파일 직접 다운로드
document.getElementById('lb-download').addEventListener('click', () => {
  const item = filtered[curIndex];
  const fileId = curVer === 'watermark' ? item._wmId
               : curVer === 'poster'    ? item._posterId
               : item._origId;
  if (!fileId) return;
  window.open(downloadUrl(fileId), '_blank');
});

// ── Slideshow ────────────────────────────────────────────────────────
const SS = {
  timer: null,
  queue: [],
  idx: 0,
  front: 'a',   // 현재 보이는 레이어

  layerA: document.getElementById('ss-layer-a'),
  layerB: document.getElementById('ss-layer-b'),
  el:     document.getElementById('slideshow'),

  shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  },

  buildQueue() {
    // 관리자 설정(ssSource)에 따라 각 사진당 1장씩 큐 구성
    // 모든 사진이 한 번씩 나온 뒤 다시 셔플
    const imgs = [];
    this.shuffle(allItems).forEach(i => {
      const src = i.ssSource || 'original';
      if (src === 'both') {
        // 둘 다 선택된 경우: 랜덤으로 하나만 (같은 사이클 내 중복 방지)
        if (i.original && i.poster) {
          imgs.push(Math.random() < 0.5 ? i.original : i.poster);
        } else {
          imgs.push(i.original || i.poster);
        }
      } else if (src === 'poster' && i.poster) {
        imgs.push(i.poster);
      } else if (i.original) {
        imgs.push(i.original);
      }
    });
    this.queue = imgs;
  },

  _kioskFillMode: false,

  _applyKioskCanvas() {
    const el = document.fullscreenElement || this.el;
    const w = el.clientWidth  || window.innerWidth;
    const h = el.clientHeight || window.innerHeight;
    const canvas = document.getElementById('ss-canvas');
    canvas.style.cssText = `width:${h}px;height:${w}px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(90deg);display:flex;flex-direction:column`;
  },

  start(fillMode = false) {
    if (!allItems.length) return; // 갤러리 데이터 로드 전이면 무시
    this.buildQueue();
    this.idx = 0;
    this._kioskFillMode = fillMode;
    this.el.classList.add('open');

    if (fillMode) {
      this.el.classList.add('kiosk-active');
      this._applyKioskCanvas(); // 즉시 적용 (로컬/비-fullscreen 환경용)
    } else {
      this.el.classList.remove('kiosk-active');
      document.getElementById('ss-canvas').style.cssText = '';
    }

    // 텍스트 라인 업데이트 (admin에서 저장 안 됐으면 기본값 표시)
    document.getElementById('ss-line1').textContent = localStorage.getItem('ss_line1') || 'We live through moments';
    document.getElementById('ss-line2').textContent = localStorage.getItem('ss_line2') || 'The experience of leaving a travel moment as a pictorial';

    const req = this.el.requestFullscreen || this.el.webkitRequestFullscreen
             || this.el.mozRequestFullScreen || this.el.msRequestFullscreen;
    if (req) req.call(this.el);

    this.layerA.src = this.queue[0];
    this.layerB.style.animation = 'none';
    this.layerA.classList.add('active');
    this.layerB.classList.remove('active');
    this.front = 'a';
    this.timer = true;
    this._kenBurns(this.layerA);
    this._go();
    ShowText.load().then(() => ShowText.start());
    ResPopup.startPolling();
  },

  _go() {
    const interval = parseInt(localStorage.getItem('ss_interval') || '4000');
    this._timeout = setTimeout(() => this.next(), interval + 1200); // +transition
  },

  _kenBurns(layer) {
    const anims = ['ss-ken-up', 'ss-ken-down', 'ss-ken-left', 'ss-ken-right'];
    const name  = anims[Math.floor(Math.random() * anims.length)];
    const dur   = Math.max(9, parseInt(localStorage.getItem('ss_interval') || '4000') / 1000 + 4);
    // 애니메이션 재시작 강제 (동일 키프레임 재선택 시에도)
    layer.style.animation = 'none';
    layer.offsetHeight;   // reflow
    layer.style.animation = `${name} ${dur}s ease-in-out forwards`;
  },

  _navigate(dir) {
    if (!this.timer) return;
    clearTimeout(this._timeout);
    this._timeout = null;

    if (dir > 0) {
      this.idx = (this.idx + 1) % this.queue.length;
      if (this.idx === 0) this.buildQueue();
    } else {
      this.idx = (this.idx - 1 + this.queue.length) % this.queue.length;
    }

    const incoming = this.front === 'a' ? this.layerB : this.layerA;
    const outgoing  = this.front === 'a' ? this.layerA : this.layerB;

    incoming.onload = null;
    let done = false;
    const swap = () => {
      if (done || !this.timer) return;
      done = true;
      incoming.onload = null;
      this._kenBurns(incoming);
      incoming.classList.add('active');
      outgoing.classList.remove('active');
      this.front = this.front === 'a' ? 'b' : 'a';
      this._go();
    };

    incoming.onload = swap;
    incoming.src = this.queue[this.idx];
    if (incoming.complete && incoming.naturalWidth) swap();
  },

  next() { this._navigate(1); },
  prev() { this._navigate(-1); },

  stop() {
    this.timer = null;
    clearTimeout(this._timeout);
    this._timeout = null;
    this.layerA.onload = null;
    this.layerB.onload = null;
    this.layerA.classList.remove('active');
    this.layerB.classList.remove('active');
    this.layerA.style.animation = '';
    this.layerB.style.animation = '';
    this.el.classList.remove('open');
    this.el.classList.remove('kiosk-active');
    document.getElementById('ss-canvas').style.cssText = '';
    if (document.fullscreenElement) document.exitFullscreen();
    ShowText.stop();
    ResPopup.stop();
    MarketingToast.stop();
  }
};

// ── ShowText 모듈 ────────────────────────────────────────────────────
const ShowText = {
  texts: [],
  _timer: null,
  _counter: 0,

  async load() {
    try {
      const res  = await fetch(GAS_URL + '?action=texts');
      const json = await res.json();
      if (json.ok && Array.isArray(json.data)) {
        this.texts = json.data
          .filter(t => t.active === true || t.active === 'TRUE')
          .sort((a, b) => Number(a.order) - Number(b.order));
      }
    } catch (e) { /* 데이터 없으면 표시 안 함 */ }
  },

  start() {
    this.stop();
    if (!this.texts.length) return;
    this._counter = 0;
    this._tick();
  },

  stop() {
    clearTimeout(this._timer);
    this._timer = null;
    const wrap  = document.getElementById('ss-show-text');
    const block = document.getElementById('ss-txt-block');
    wrap.style.display = 'none';
    if (block) block.style.cssText = '';
    ['ss-txt-line1', 'ss-txt-line2'].forEach(id => {
      const el = document.getElementById(id);
      el.style.animation = 'none';
      el.style.opacity   = '0';
    });
  },

  _tick() {
    if (!SS.timer) return;
    const t     = this.texts[Math.floor(Math.random() * this.texts.length)];
    const l1    = document.getElementById('ss-txt-line1');
    const l2    = document.getElementById('ss-txt-line2');
    const wrap  = document.getElementById('ss-show-text');
    const block = document.getElementById('ss-txt-block');
    const isKiosk = SS.el.classList.contains('kiosk-active');
    const dur   = parseInt(localStorage.getItem('ss_text_interval') || '15000') / 1000;
    const even  = this._counter % 2 === 0;

    function setLineHTML(el, text) {
      if (!text) { el.innerHTML = ''; return; }
      el.innerHTML = `<span class="ss-first-char">${text[0]}</span>${text.slice(1)}`;
    }
    setLineHTML(l1, t.line1 || '');
    setLineHTML(l2, t.line2 || '');

    // 애니메이션 리셋 (reflow 강제)
    l1.style.animation = 'none';
    l2.style.animation = 'none';
    l1.offsetHeight;

    if (isKiosk) {
      // ── 키오스크 ──────────────────────────────────────────────────────
      // 텍스트 영역: 물리 X 215~575px (정보바 바로 우측 띠 = 빨간 박스)
      // rotate(90deg) → 뷰어가 좌→우로 정상 독해
      // Y축 상/중/하 랜덤 → 뷰어 portrait 내 위치 다양화

      const xCenter = 390; // 빨간박스 중심 (215~575 사이)
      const yZones  = [
        Math.round(window.innerHeight * 0.30),
        Math.round(window.innerHeight * 0.50),
        Math.round(window.innerHeight * 0.70),
      ];
      const yPx = yZones[Math.floor(Math.random() * 3)];

      // 화면 밖 넘침 방지: yPx에서 위아래 여백 계산 → lineMax 결정
      const margin  = 24;
      const halfH   = Math.min(yPx, window.innerHeight - yPx) - margin;
      const lineMax = Math.max(Math.round(halfH * 1.88), 260);

      // 동적 폰트 사이즈: 기본 +30%, 긴 줄은 자동 축소 (nowrap 보장)
      const baseFontPx = Math.min(3.9 / 100 * window.innerHeight, 3.575 * 16);
      const maxLen     = Math.max(l1.textContent.length, l2.textContent.length, 1);
      const fitPx      = Math.min(baseFontPx, lineMax / (maxLen * 0.60));
      const fsPx       = `${Math.max(Math.round(fitPx), 12)}px`;
      [l1, l2].forEach(l => {
        l.style.fontSize   = fsPx;
        l.style.whiteSpace = 'nowrap';
        l.style.maxWidth   = '';
        l.style.textAlign  = 'center';
      });

      wrap.style.cssText = `
        position:absolute;
        left:${xCenter}px; top:${yPx}px;
        transform:translate(-50%,-50%);
        display:flex;
        z-index:60; pointer-events:none;
      `;
      block.style.cssText = `
        display:flex; flex-direction:column;
        align-items:center; gap:6px;
        transform:rotate(90deg);
        transform-origin:center center;
      `;

    } else {
      // ── 가로 모드: 정보바 위, 좌/중/우 랜덤 ──
      const infoBarH = 90;
      const hZones   = ['flex-start', 'center', 'flex-end'];
      const justify  = hZones[Math.floor(Math.random() * 3)];

      // 동적 폰트 사이즈: 기본 +30%, 긴 줄은 자동 축소 (nowrap 보장)
      const lsBasePx = Math.min(4.55 / 100 * window.innerWidth, 5.2 * 16);
      const lsMaxLen = Math.max(l1.textContent.length, l2.textContent.length, 1);
      const lsFitPx  = Math.min(lsBasePx, (0.80 * window.innerWidth) / (lsMaxLen * 0.60));
      const lsFsPx   = `${Math.max(Math.round(lsFitPx), 12)}px`;
      [l1, l2].forEach(l => {
        l.style.fontSize   = lsFsPx;
        l.style.whiteSpace = 'nowrap';
        l.style.maxWidth   = '';
        l.style.textAlign  = justify === 'flex-start' ? 'left'
                           : justify === 'flex-end'   ? 'right' : 'center';
      });

      // 세로 랜덤: 인포바 위(하한)에서 위로 화면 높이의 10% 범위 내 랜덤
      // → 화면 하단 기준 약 75~90% 구간(하단에서 134px ~ 134+10%px)
      const bottomMin  = infoBarH + 44;
      const randomBand = Math.round(window.innerHeight * 0.10);
      const bottomPx   = bottomMin + Math.round(Math.random() * randomBand);

      wrap.style.cssText = `
        position:absolute;
        left:0; right:0;
        bottom:${bottomPx}px;
        display:flex;
        justify-content:${justify};
        padding:0 6%;
        z-index:60; pointer-events:none;
      `;
      block.style.cssText = `
        display:flex; flex-direction:column;
        align-items:${justify};
        gap:6px; transform:none;
      `;
    }

    // 방향 교차 drift + glow pulse + shimmer 동시 적용
    const glow    = 'txt-glow-pulse 4.5s ease-in-out infinite';
    const shimmer = 'txt-shimmer 7s ease-in-out infinite';
    l1.style.animation = `${even ? 'txt-ltr' : 'txt-rtl'} ${dur}s ease-in-out forwards, ${glow}, ${shimmer}`;
    l2.style.animation = `${even ? 'txt-rtl' : 'txt-ltr'} ${dur}s ease-in-out forwards, ${glow}, ${shimmer} 1.8s`;

    wrap.style.display = 'flex';
    this._counter++;

    const interval = parseInt(localStorage.getItem('ss_text_interval') || '15000');
    this._timer = setTimeout(() => this._tick(), interval);
  },
};

// ── Reservation Popup Module ──────────────────────────────────────────
const ResPopup = {
  data: [],
  pollTimer: null,
  showTimer: null,
  
  // 이름 마스킹 (홍길동 -> 홍*동)
  maskName(name) {
    if(!name) return "";
    if(name.length <= 1) return name;
    if(name.length === 2) return name[0] + '*';
    return name[0] + '*'.repeat(name.length - 2) + name[name.length - 1];
  },

  async fetchReservations() {
    try {
      const res = await fetch(GAS_URL + '?action=getScheduleStatus');
      const json = await res.json();
      if(json.ok && Array.isArray(json.items)) {
        let flatData = [];
        json.items.forEach(slot => {
          slot.customers.forEach(c => {
            flatData.push({
              time: slot.time,
              name: c.name,
              photographerCheck: slot.confirmedAt ? 'O' : 'X'
            });
          });
        });
        this.data = flatData;
      }
    } catch(e) { console.error('Res fetch error', e); }
  },

  render() {
    const listEl = document.getElementById('res-list');
    if(!this.data || this.data.length === 0) {
      listEl.innerHTML = '<div style="text-align:center;color:#888;font-size:0.9rem;">지금 예약해 주세요</div>';
      return;
    }

    listEl.innerHTML = this.data.map(item => {
      // 확정 조건: '확인', 'O', '완료' 등
      const isConfirmed = item.photographerCheck === 'O' || item.photographerCheck === '확인' || item.photographerCheck === '완료';
      const checkClass = isConfirmed ? 'confirmed' : '';
      const checkText = isConfirmed ? '작가확인완료' : '대기중';
      
      return `
        <div class="res-item">
          <span class="res-time">${item.time || ''}</span>
          <span class="res-name">${this.maskName(item.name)}</span>
          <span class="res-check ${checkClass}">${checkText}</span>
        </div>
      `;
    }).join('');
  },

  startPolling() {
    this.stop();
    this.fetchReservations();
    // 5분마다 데이터 갱신
    this.pollTimer = setInterval(() => this.fetchReservations(), 5 * 60 * 1000);
    
    // 1분마다 10초씩 팝업 띄우기
    this.showTimer = setInterval(() => {
      if(!SS.timer) return; // 슬라이드쇼 동작 중일 때만
      this.triggerPopup();
    }, 60000); // 1분 주기
  },

  triggerPopup() {
    this.render();
    document.getElementById('res-popup').classList.add('show');
    
    if(this.hideTimer) clearTimeout(this.hideTimer);
    this.hideTimer = setTimeout(() => {
      document.getElementById('res-popup').classList.remove('show');
    }, 10000); // 10초 후 닫힘
  },

  stop() {
    clearInterval(this.pollTimer);
    clearInterval(this.showTimer);
    if(this.hideTimer) clearTimeout(this.hideTimer);
    document.getElementById('res-popup').classList.remove('show');
  }
};

// ── Marketing Toast Module ──────────────────────────────────────────
const MarketingToast = {
  timer: null,
  
  showToast() {
    if(!SS.timer) return; // 슬라이드쇼 동작 중일 때만
    const toast = document.getElementById('new-res-toast');
    toast.classList.add('show');
    
    if(this.timer) clearTimeout(this.timer);
    // 8초 후 사라짐
    this.timer = setTimeout(() => {
      toast.classList.remove('show');
    }, 8000);
  },

  stop() {
    clearTimeout(this.timer);
    document.getElementById('new-res-toast').classList.remove('show');
  }
};

document.getElementById('ss-start-btn').addEventListener('click', () => SS.start(false));
document.getElementById('ss-kiosk-btn').addEventListener('click', () => SS.start(true));

document.getElementById('hidden-res-btn').addEventListener('click', () => {
  if (SS.timer) ResPopup.triggerPopup();
});

document.getElementById('hidden-toast-btn').addEventListener('click', () => {
  if (SS.timer) MarketingToast.showToast();
});

document.getElementById('ss-tap-prev').addEventListener('click', () => SS.prev());
document.getElementById('ss-tap-next').addEventListener('click', () => SS.next());

// fullscreen 진입 시 kiosk 캔버스 재계산, 종료 시 슬라이드쇼 정지
document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) {
    if (SS.timer && SS._kioskFillMode) SS._applyKioskCanvas();
  } else if (SS.timer) {
    SS.stop();
  }
});

// ESC 키로 슬라이드쇼 종료
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && SS.el.classList.contains('open')) SS.stop();
});

// ?kiosk=1 파라미터 → 페이지 로드 시 가로 디스플레이 자동 시작
let isKioskAuto = new URLSearchParams(location.search).get('kiosk') === '1';

// ── Init — GAS에서 데이터 로드 ──────────────────────────────────────
async function loadGallery() {
  document.getElementById('gallery').innerHTML =
    '<div class="state-msg">Loading...</div>';
  try {
    const res  = await fetch(GAS_URL + '?action=gallery');
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    allItems = json.data.map(toItem);
    renderCategories();
    renderGallery('all');

    if (isKioskAuto) {
      document.body.insertAdjacentHTML('beforeend',
        '<div id="kiosk-hint" style="position:fixed;inset:0;display:flex;align-items:center;' +
        'justify-content:center;background:#000;color:#555;font-size:0.8rem;' +
        'letter-spacing:0.2em;z-index:9999;cursor:pointer;">데이터 로드 완료. 터치 시 즉시, 또는 5초 후 슬라이드쇼가 자동 시작됩니다.</div>'
      );
      function startAuto() {
        if (SS.timer) return;
        SS.start(true); // 세로(Kiosk) 모드
        const hint = document.getElementById('kiosk-hint');
        if (hint) hint.remove();
        window.removeEventListener('click', startAuto);
      }
      window.addEventListener('click', startAuto, { once: true });
      setTimeout(startAuto, 5000);
    }
  } catch (e) {
    document.getElementById('gallery').innerHTML =
      '<div class="state-msg">갤러리를 불러오지 못했습니다.<br>' + e.message + '</div>';
  }
}

function renderCategories() {
  const allCats = allItems.flatMap(i => splitCats(i.cat));
  const cats = [...new Set(allCats)].sort((a, b) => a.localeCompare(b, 'ko'));
  const filter = document.getElementById('filter');
  filter.innerHTML = '<button class="filter-btn active" data-cat="all">ALL</button>'
    + cats.map(c => `<button class="filter-btn" data-cat="${c}">${c}</button>`).join('');
}

loadGallery();
</script>

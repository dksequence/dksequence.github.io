<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DK Gallery — 관리</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #ddd; font-family: 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; }

    /* ── Login ── */
    .login-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      padding: 40px 48px; width: 320px; text-align: center;
    }
    .login-box h2 { font-size: 1rem; letter-spacing: 0.3em; font-weight: 400; margin-bottom: 28px; color: #fff; text-transform: uppercase; }
    .login-box input {
      width: 100%; background: #111; border: 1px solid #2e2e2e; color: #ddd;
      padding: 10px 14px; font-size: 0.9rem; margin-bottom: 12px; outline: none;
    }
    .login-box input:focus { border-color: #555; }
    .login-box button {
      width: 100%; background: #fff; color: #111; border: none;
      padding: 11px; font-size: 0.85rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
    }
    .login-box button:hover { background: #ddd; }
    .login-err { color: #c44; font-size: 0.8rem; margin-top: 10px; }

    /* ── App Shell ── */
    #app { display: none; }

    .topbar {
      background: #1a1a1a; border-bottom: 1px solid #222;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; position: sticky; top: 0; z-index: 100;
    }
    .topbar-title { font-size: 0.95rem; letter-spacing: 0.25em; color: #fff; text-transform: uppercase; font-weight: 600; }
    .topbar-actions { display: flex; gap: 8px; }

    .btn {
      background: none; border: 1px solid #444; color: #bbb;
      padding: 7px 18px; font-size: 0.78rem; letter-spacing: 0.15em;
      text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    }
    .btn:hover { border-color: #aaa; color: #fff; }
    .btn.primary { background: #fff; color: #111; border-color: #fff; }
    .btn.primary:hover { background: #ddd; }
    .btn.danger { border-color: #633; color: #c66; }
    .btn.danger:hover { background: #c66; color: #fff; border-color: #c66; }

    /* ── Status bar ── */
    .statusbar {
      padding: 10px 24px; font-size: 0.78rem; letter-spacing: 0.1em;
      color: #aaa; border-bottom: 1px solid #1e1e1e; min-height: 36px;
    }
    .statusbar.ok  { color: #4a4; }
    .statusbar.err { color: #c44; }

    /* ── Settings bar ── */
    .settings-bar {
      padding: 12px 24px; background: #161616; border-bottom: 1px solid #222;
      display: flex; flex-wrap: wrap; align-items: center; gap: 16px;
    }
    .settings-label {
      font-size: 0.82rem; letter-spacing: 0.15em; color: #fff;
      text-transform: uppercase; white-space: nowrap; font-weight: 500;
    }

    /* ── Photo List ── */
    .photo-list { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }

    .photo-item {
      display: grid;
      grid-template-columns: 28px 80px 1fr 150px 70px 230px 70px 50px;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: #161616;
      border: 1px solid #1e1e1e;
      margin-bottom: 6px;
      cursor: grab;
      transition: background 0.15s;
    }
    .photo-item:hover { background: #1d1d1d; }
    .photo-item.dragging { opacity: 0.4; border-color: #555; }
    .photo-item.drag-over { border-color: #888; background: #222; }

    .drag-handle { color: #444; font-size: 1rem; cursor: grab; user-select: none; text-align: center; }
    .drag-handle:hover { color: #aaa; }

    /* 썸네일: 세로 비율 유지, 잘리지 않도록 */
    .thumb-wrap {
      width: 80px; height: 108px;
      overflow: hidden; background: #0a0a0a; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: contain; display: block;
    }
    .thumb-wrap .thumb-err {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; color: #444; text-align: center; padding: 4px;
    }

    .item-name { font-size: 0.78rem; color: #bbb; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .item-cat input {
      width: 100%; background: #111; border: 1px solid #2a2a2a; color: #ccc;
      padding: 6px 10px; font-size: 0.78rem; outline: none;
    }
    .item-cat input:focus { border-color: #555; }

    .item-versions { display: flex; flex-direction: column; gap: 3px; }
    .ver-badge {
      font-size: 0.62rem; padding: 3px 7px; border: 1px solid;
      letter-spacing: 0.05em; text-transform: uppercase; border-radius: 2px;
      text-align: center;
    }
    .ver-badge.on  { border-color: #4a8cff; color: #4a8cff; }
    .ver-badge.off { border-color: #2a2a2a; color: #333; }

    /* active toggle */
    .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; margin: 0 auto; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0; background: #2a2a2a;
      border-radius: 20px; transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: #4a8; }
    .toggle-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; background: #666; border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); background: #fff; }

    .delete-btn {
      background: none; border: none; color: #444; font-size: 1rem;
      cursor: pointer; padding: 4px 8px; transition: color 0.2s; text-align: center;
    }
    .delete-btn:hover { color: #c44; }

    /* ── SS source buttons — 3개, 가로로 넓게 ── */
    .ss-src-btns { display: flex; gap: 4px; }
    .ss-src-btn {
      flex: 1;
      font-size: 0.68rem; padding: 5px 8px;
      border: 1px solid #2a2a2a; background: none; color: #666;
      letter-spacing: 0.04em; cursor: pointer; transition: all 0.15s;
      border-radius: 3px; text-align: center; white-space: nowrap;
    }
    .ss-src-btn:hover { border-color: #666; color: #bbb; }
    .ss-src-btn.on { background: #4a8; border-color: #4a8; color: #fff; }
    .ss-src-btn.disabled { opacity: 0.25; cursor: default; }
    .ss-src-btn.disabled:hover { border-color: #2a2a2a; color: #666; }

    /* ── Show Texts section ── */
    .texts-section {
      padding: 16px 24px; background: #161616; border-bottom: 1px solid #222;
    }
    .texts-section-header {
      display: flex; align-items: center; gap: 16px; margin-bottom: 14px;
    }
    .texts-grid {
      max-height: 420px; overflow-y: auto; border: 1px solid #1e1e1e;
      display: none;  /* 기본 접힘 */
    }
    .texts-grid.open { display: block; }
    .texts-toggle-btn {
      background: none; border: 1px solid #333; color: #888;
      padding: 5px 14px; font-size: 0.75rem; letter-spacing: 0.12em;
      text-transform: uppercase; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .texts-toggle-btn:hover { border-color: #888; color: #fff; }
    .texts-toggle-arrow { display: inline-block; transition: transform 0.2s; font-size: 0.6rem; }
    .texts-toggle-btn.open .texts-toggle-arrow { transform: rotate(180deg); }
    .texts-row {
      display: grid;
      grid-template-columns: 28px 1fr 1fr 36px;
      align-items: center; gap: 8px;
      padding: 5px 10px; border-bottom: 1px solid #1a1a1a;
    }
    .texts-row:last-child { border-bottom: none; }
    .texts-row:hover { background: #1a1a1a; }
    .texts-row-num { font-size: 0.68rem; color: #444; text-align: center; }
    .texts-row input {
      width: 100%; background: #111; border: 1px solid #222; color: #ccc;
      padding: 5px 8px; font-size: 0.78rem; outline: none;
      font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic;
    }
    .texts-row input:focus { border-color: #555; }
    .texts-row input::placeholder { color: #383838; font-style: italic; }

    /* ── Upload Panel ── */
    .upload-panel {
      padding: 16px 24px; background: #161616; border-bottom: 1px solid #222;
    }
    .upload-panel-header {
      display: flex; align-items: center; gap: 12px;
    }
    .upload-body { margin-top: 14px; }
    .upload-row {
      display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end;
    }
    .upload-col { display: flex; flex-direction: column; gap: 6px; }
    .upload-file-label {
      display: inline-block; background: none; border: 1px dashed #444; color: #888;
      padding: 10px 24px; font-size: 0.78rem; letter-spacing: 0.15em;
      text-transform: uppercase; cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .upload-file-label:hover { border-color: #aaa; color: #fff; }
    .upload-filename { font-size: 0.72rem; color: #555; letter-spacing: 0.06em; margin-top: 2px; }
    .upload-select-label { font-size: 0.68rem; letter-spacing: 0.15em; color: #888; text-transform: uppercase; }
    .upload-select {
      background: #111; border: 1px solid #2e2e2e; color: #ccc;
      padding: 8px 12px; font-size: 0.8rem; outline: none; min-width: 220px; cursor: pointer;
    }
    .upload-select:focus { border-color: #555; }
    .upload-previews { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    .upload-preview-box { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .upload-preview-box canvas { display: block; background: #0a0a0a; border: 1px solid #2a2a2a; }
    .upload-preview-lbl { font-size: 0.62rem; color: #555; letter-spacing: 0.12em; text-transform: uppercase; }
    .upload-progress-wrap { margin-top: 12px; display: none; }
    .upload-progress-bar { height: 2px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
    .upload-progress-fill { height: 100%; background: #4a8cff; width: 0%; transition: width 0.4s; }
    .upload-progress-msg { font-size: 0.72rem; color: #666; letter-spacing: 0.08em; margin-top: 6px; }

    /* ── Empty ── */
    .empty { text-align: center; padding: 80px; color: #444; font-size: 0.85rem; letter-spacing: 0.2em; }

    /* ── List header ── */
    .list-header {
      display: grid;
      grid-template-columns: 28px 80px 1fr 150px 70px 230px 70px 50px;
      gap: 12px;
      padding: 8px 12px;
      font-size: 0.72rem; letter-spacing: 0.15em; color: #fff; text-transform: uppercase;
      border-bottom: 1px solid #2a2a2a; margin-bottom: 8px; font-weight: 600;
    }
  </style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <h2>Gallery Admin</h2>
    <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="current-password">
    <button id="pw-btn">로그인</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <span class="topbar-title">DK Gallery 관리</span>
    <div class="topbar-actions">
      <button class="btn" id="btn-scan">Drive 스캔</button>
      <button class="btn primary" id="btn-save">저장</button>
    </div>
  </div>
  <div class="statusbar" id="statusbar">항목을 로딩 중...</div>

  <!-- 슬라이드쇼 설정 -->
  <div class="settings-bar">
    <span class="settings-label">슬라이드쇼 전환 시간</span>
    <div style="display:flex;gap:6px;" id="ss-interval-btns">
      <button class="btn ss-iv-btn" data-val="3000">3초</button>
      <button class="btn ss-iv-btn" data-val="4000">4초</button>
      <button class="btn ss-iv-btn" data-val="5000">5초</button>
      <button class="btn ss-iv-btn" data-val="6000">6초</button>
    </div>
  </div>
  <div class="settings-bar">
    <span class="settings-label">슬라이드쇼 텍스트</span>
    <div style="display:flex;gap:8px;flex:1;min-width:280px;">
      <input id="ss-line1-input" type="text" placeholder="Line 1 (영문)"
        style="flex:1;background:#111;border:1px solid #2e2e2e;color:#ccc;padding:6px 10px;font-size:0.82rem;outline:none;">
      <input id="ss-line2-input" type="text" placeholder="Line 2 (영문)"
        style="flex:1;background:#111;border:1px solid #2e2e2e;color:#ccc;padding:6px 10px;font-size:0.82rem;outline:none;">
      <button class="btn primary" id="ss-text-save-btn">저장</button>
    </div>
  </div>

  <!-- Show Texts 섹션 -->
  <div class="texts-section">
    <div class="texts-section-header">
      <span class="settings-label">Show Texts</span>
      <div style="display:flex;gap:6px;" id="ss-text-interval-btns">
        <button class="btn ss-ti-btn" data-val="8000">8초</button>
        <button class="btn ss-ti-btn" data-val="12000">12초</button>
        <button class="btn ss-ti-btn" data-val="18000">18초</button>
        <button class="btn ss-ti-btn" data-val="25000">25초</button>
        <button class="btn ss-ti-btn" data-val="30000">30초</button>
      </div>
      <button class="texts-toggle-btn" id="texts-toggle-btn">
        목록 펼치기 <span class="texts-toggle-arrow">▼</span>
      </button>
      <button class="btn primary" id="texts-save-btn" style="margin-left:auto">텍스트 저장</button>
    </div>
    <div id="texts-expandable" style="display:none;">
      <div style="display:grid;grid-template-columns:28px 1fr 1fr 36px;gap:8px;padding:4px 10px 6px;font-size:0.68rem;letter-spacing:0.12em;color:#666;text-transform:uppercase;border-bottom:1px solid #222;">
        <span></span><span>Line 1</span><span>Line 2</span><span style="text-align:center">ON</span>
      </div>
      <div class="texts-grid open" id="texts-grid"></div>
    </div>
  </div>

  <!-- 새 사진 업로드 -->
  <div class="upload-panel">
    <div class="upload-panel-header">
      <span class="settings-label">새 사진 추가</span>
      <button class="btn" id="upload-toggle-btn">펼치기 ▼</button>
    </div>
    <div class="upload-body" id="upload-body" style="display:none;">
      <div class="upload-row">
        <div class="upload-col">
          <input type="file" id="upload-file-input" accept="image/jpeg,image/jpg,image/png,image/webp" style="display:none;">
          <label class="upload-file-label" for="upload-file-input">파일 선택</label>
          <div class="upload-filename" id="upload-filename">선택된 파일 없음</div>
        </div>
        <div class="upload-col">
          <span class="upload-select-label">레터링 디자인</span>
          <select class="upload-select" id="upload-letter-select">
            <option value="">-- 선택 없음 --</option>
          </select>
        </div>
        <div class="upload-col">
          <button class="btn primary" id="upload-btn" disabled>업로드 및 등록</button>
        </div>
      </div>
      <!-- 폴더 일괄 업로드 -->
      <div class="upload-row" style="margin-top:16px;padding-top:16px;border-top:1px solid #222;">
        <div class="upload-col">
          <input type="file" id="upload-folder-input" accept="image/jpeg,image/jpg,image/png,image/webp" webkitdirectory multiple style="display:none;">
          <label class="upload-file-label" for="upload-folder-input">폴더 선택</label>
          <div class="upload-filename" id="upload-folder-info">선택된 폴더 없음</div>
        </div>
        <div class="upload-col">
          <button class="btn primary" id="upload-folder-btn" disabled>폴더 일괄 업로드</button>
        </div>
      </div>
      <div class="upload-progress-wrap" id="folder-progress-wrap" style="display:none;margin-top:12px;">
        <div class="upload-progress-bar">
          <div class="upload-progress-fill" id="folder-progress-fill"></div>
        </div>
        <div class="upload-progress-msg" id="folder-progress-msg"></div>
      </div>

      <div class="upload-previews" id="upload-previews" style="display:none;">
        <div class="upload-preview-box">
          <canvas id="preview-original" width="200" height="134"></canvas>
          <span class="upload-preview-lbl">원본</span>
        </div>
        <div class="upload-preview-box">
          <canvas id="preview-watermark" width="200" height="134"></canvas>
          <span class="upload-preview-lbl">워터마크</span>
        </div>
        <div class="upload-preview-box">
          <canvas id="preview-letter" width="200" height="134"></canvas>
          <span class="upload-preview-lbl">레터링</span>
        </div>
      </div>
      <div class="upload-progress-wrap" id="upload-progress-wrap">
        <div class="upload-progress-bar">
          <div class="upload-progress-fill" id="upload-progress-fill"></div>
        </div>
        <div class="upload-progress-msg" id="upload-progress-msg"></div>
      </div>
    </div>
  </div>

  <div class="photo-list" id="photo-list">
    <div class="list-header">
      <span></span>
      <span>썸네일</span>
      <span>파일명</span>
      <span>카테고리</span>
      <span>버전</span>
      <span>SS 소스</span>
      <span style="text-align:center">표시</span>
      <span style="text-align:center">삭제</span>
    </div>
    <div id="items-container"></div>
  </div>
</div>

function thumbUrl(fileId) {
  return `https://drive.google.com/thumbnail?id=${fileId}&sz=w200`;
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('pw-btn').click();
});

document.getElementById('pw-btn').addEventListener('click', async () => {
  const entered = document.getElementById('pw-input').value.trim();
  if (!entered) return;

  const errEl = document.getElementById('login-err');
  errEl.textContent = '';

  // 클라이언트 사이드 비밀번호 체크 (GAS POST CORS 이슈 우회)
  if (entered !== ADMIN_PW) {
    errEl.textContent = '비밀번호가 올바르지 않습니다';
    return;
  }

  pw = entered;
  setStatus('목록 로딩 중...');
  try {
    const [galleryRes, textsRes] = await Promise.all([
      gasGet('admin'),
      gasGet('texts'),
    ]);
    if (!galleryRes.ok) throw new Error(galleryRes.error);
    items = galleryRes.data;
    const loaded = Array.isArray(textsRes.data) ? textsRes.data.filter(t => t.line1 || t.line2) : [];
    if (loaded.length === 0) {
      // GAS에 데이터 없으면 기본 문장으로 초기화
      texts = DEFAULT_TEXTS.map((t, i) => ({ id: '', line1: t.line1, line2: t.line2, active: true, order: i + 1 }));
    } else {
      texts = loaded;
      while (texts.length < 50) texts.push({ id: '', line1: '', line2: '', active: true, order: texts.length + 1 });
    }
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderList();
    renderTexts();
    setStatus(`총 ${items.length}개 항목 로드됨`, 'ok');
  } catch (e) {
    pw = '';
    errEl.textContent = '데이터 로드 오류: ' + e.message;
    setStatus('');
  }
});

// ── API ──────────────────────────────────────────────────────────────
async function gasGet(action, params = {}) {
  const qs = new URLSearchParams({ action, ...params });
  const res = await fetch(`${GAS_URL}?${qs}`);
  return res.json();
}

// POST (인증 후 사용, no-cors fallback 포함)
async function gasPost(body) {
  body.password = pw;
  const init = {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body),
  };
  try {
    const res = await fetch(GAS_URL, { ...init, redirect: 'follow' });
    return res.json();
  } catch (e) {
    const res2 = await fetch(GAS_URL, { ...init, mode: 'no-cors', redirect: 'follow' });
    return { ok: true };
  }
}

// ── 렌더링 ───────────────────────────────────────────────────────────
function renderList() {
  const container = document.getElementById('items-container');
  if (!items.length) {
    container.innerHTML = '<div class="empty">항목이 없습니다. Drive 스캔을 실행하세요.</div>';
    return;
  }

  container.innerHTML = items.map((item, idx) => {
    // 썸네일: watermark → original → poster 순 우선
    const thumbId = item.fileId_watermark || item.fileId_original || item.fileId_poster;
    const thumb = thumbId
      ? `<img src="${thumbUrl(thumbId)}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex';">
         <div class="thumb-err" style="display:none;">이미지<br>없음</div>`
      : `<div class="thumb-err">파일<br>없음</div>`;

    const hasOri = !!item.fileId_original;
    const hasWm  = !!item.fileId_watermark;
    const hasPos = !!item.fileId_poster;
    const ss = item.ssSource || 'original';

    return `
    <div class="photo-item" draggable="true" data-idx="${idx}" data-id="${item.photoId}">
      <span class="drag-handle">⠇</span>
      <div class="thumb-wrap">${thumb}</div>
      <span class="item-name" title="${item.displayName}">${item.displayName}</span>
      <div class="item-cat">
        <input type="text" value="${item.category || ''}" placeholder="카테고리 입력"
          data-id="${item.photoId}" class="cat-input">
      </div>
      <div class="item-versions">
        <span class="ver-badge ${hasOri ? 'on':'off'}">Original</span>
        <span class="ver-badge ${hasWm  ? 'on':'off'}">WM</span>
        <span class="ver-badge ${hasPos ? 'on':'off'}">Design</span>
      </div>
      <div class="ss-src-btns">
        <button class="ss-src-btn ${ss==='original'?'on':''} ${!hasOri?'disabled':''}"
          data-id="${item.photoId}" data-src="original">Original</button>
        <button class="ss-src-btn ${ss==='watermark'?'on':''} ${!hasWm?'disabled':''}"
          data-id="${item.photoId}" data-src="watermark">WM</button>
        <button class="ss-src-btn ${ss==='poster'?'on':''} ${!hasPos?'disabled':''}"
          data-id="${item.photoId}" data-src="poster">Design</button>
      </div>
      <label class="toggle">
        <input type="checkbox" ${item.active === true || item.active === 'TRUE' ? 'checked' : ''}
          data-id="${item.photoId}" class="active-toggle">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
      <button class="delete-btn" data-id="${item.photoId}" title="삭제">✕</button>
    </div>`;
  }).join('');

  // 카테고리 입력
  container.querySelectorAll('.cat-input').forEach(input => {
    input.addEventListener('change', e => {
      const item = items.find(i => i.photoId === e.target.dataset.id);
      if (item) item.category = e.target.value.trim();
    });
  });

  // active 토글
  container.querySelectorAll('.active-toggle').forEach(chk => {
    chk.addEventListener('change', e => {
      const item = items.find(i => i.photoId === e.target.dataset.id);
      if (item) item.active = e.target.checked;
    });
  });

  // SS 소스 선택 (단일 선택, disabled 버튼 제외)
  container.querySelectorAll('.ss-src-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      if (btn.classList.contains('disabled')) return;
      const id  = e.target.dataset.id;
      const src = e.target.dataset.src;
      const item = items.find(i => i.photoId === id);
      if (!item) return;
      item.ssSource = src;

      // 해당 행 버튼 UI 업데이트
      const row = e.target.closest('.photo-item');
      row.querySelectorAll('.ss-src-btn').forEach(b => {
        b.classList.toggle('on', b.dataset.src === src);
      });
    });
  });

  // 삭제
  container.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', async e => {
      const id = e.currentTarget.dataset.id;
      const item = items.find(i => i.photoId === id);
      if (!confirm(`"${item?.displayName}" 을(를) 목록에서 삭제할까요?\n(Drive 파일은 삭제되지 않습니다)`)) return;
      setStatus('삭제 중...');
      try {
        const res = await gasPost({ action: 'delete', photoId: id });
        if (!res.ok) throw new Error(res.error);
        items = items.filter(i => i.photoId !== id);
        renderList();
        setStatus('삭제 완료', 'ok');
      } catch (e) {
        setStatus('삭제 실패: ' + e.message, 'err');
      }
    });
  });

  initDragDrop();
}

// ── 드래그앤드롭 ─────────────────────────────────────────────────────
function initDragDrop() {
  const container = document.getElementById('items-container');
  let dragSrc = null;

  container.querySelectorAll('.photo-item').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragSrc = el;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      container.querySelectorAll('.photo-item').forEach(i => i.classList.remove('drag-over'));
      const newOrder = [...container.querySelectorAll('.photo-item')]
        .map(el => items.find(i => i.photoId === el.dataset.id))
        .filter(Boolean);
      items = newOrder;
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (el !== dragSrc) {
        container.querySelectorAll('.photo-item').forEach(i => i.classList.remove('drag-over'));
        el.classList.add('drag-over');
      }
    });
    el.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrc && dragSrc !== el) {
        const allItems = [...container.querySelectorAll('.photo-item')];
        const srcIdx = allItems.indexOf(dragSrc);
        const tgtIdx = allItems.indexOf(el);
        if (srcIdx < tgtIdx) el.after(dragSrc);
        else el.before(dragSrc);
      }
    });
  });
}

// ── 업로드 모듈 ──────────────────────────────────────────────────────
const Upload = {
  file:            null,
  dataUrl:         null,
  originalImg:     null,
  wmImg:           null,
  letterImgCache:  {},
  overlayData:     null,

  async initPanel() {
    if (this.overlayData) return;
    setStatus('오버레이 파일 로딩 중...');
    try {
      const res = await gasGet('getOverlays');
      if (!res.ok) throw new Error(res.error);
      this.overlayData = res.data;

      if (this.overlayData.watermark) {
        this.wmImg = await this._fetchImg(this.overlayData.watermark.fileId);
      }

      const sel = document.getElementById('upload-letter-select');
      const letters = this.overlayData.letters || [];
      sel.innerHTML = '<option value="">-- 선택 없음 --</option>'
        + letters.map(l => `<option value="${l.fileId}">${l.name}</option>`).join('');

      setStatus('');
    } catch (e) {
      setStatus('오버레이 로드 실패: ' + e.message, 'err');
    }
  },

  async onFileChange(file) {
    this.file = file;
    document.getElementById('upload-filename').textContent =
      `${file.name}  (${(file.size / 1024 / 1024).toFixed(1)} MB)`;

    this.dataUrl     = await this._readDataUrl(file);
    this.originalImg = await this._imgFromSrc(this.dataUrl);

    await this._renderPreviews();
    document.getElementById('upload-previews').style.display = 'flex';
    document.getElementById('upload-btn').disabled = false;
  },

  async onLetterChange() {
    if (!this.originalImg) return;
    await this._renderPreviews();
  },

  async _renderPreviews() {
    const letterFileId = document.getElementById('upload-letter-select').value;
    let letterImg = null;
    if (letterFileId) {
      if (!this.letterImgCache[letterFileId]) {
        this.letterImgCache[letterFileId] = await this._fetchImg(letterFileId);
      }
      letterImg = this.letterImgCache[letterFileId];
    }
    this._drawPreview('preview-original',  this.originalImg, null);
    this._drawPreview('preview-watermark', this.originalImg, this.wmImg);
    this._drawPreview('preview-letter',    this.originalImg, letterImg);
  },

  _drawPreview(canvasId, baseImg, overlayImg) {
    const canvas = document.getElementById(canvasId);
    if (!canvas || !baseImg) return;
    const W = canvas.width, H = canvas.height;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);
    const scale = Math.min(W / baseImg.naturalWidth, H / baseImg.naturalHeight);
    const dw = baseImg.naturalWidth * scale;
    const dh = baseImg.naturalHeight * scale;
    const dx = (W - dw) / 2, dy = (H - dh) / 2;
    ctx.drawImage(baseImg, dx, dy, dw, dh);
    if (overlayImg) ctx.drawImage(overlayImg, dx, dy, dw, dh);
  },

  _composite(baseImg, overlayImg) {
    const c   = document.createElement('canvas');
    c.width   = baseImg.naturalWidth;
    c.height  = baseImg.naturalHeight;
    const ctx = c.getContext('2d');
    ctx.drawImage(baseImg, 0, 0);
    if (overlayImg) ctx.drawImage(overlayImg, 0, 0, c.width, c.height);
    return c.toDataURL('image/jpeg', 0.88).split(',')[1];
  },

  _setProgress(pct, msg) {
    const wrap = document.getElementById('upload-progress-wrap');
    wrap.style.display = 'block';
    document.getElementById('upload-progress-fill').style.width = pct + '%';
    document.getElementById('upload-progress-msg').textContent = msg;
  },

  async upload() {
    if (!this.file || !this.originalImg) return;
    const btn = document.getElementById('upload-btn');
    btn.disabled = true;

    try {
      // 1. 원본 업로드 (raw 파일 그대로 전송)
      this._setProgress(10, '원본 업로드 중...');
      const origBase64 = this.dataUrl.split(',')[1];
      const origMime   = this.dataUrl.split(';')[0].split(':')[1];
      const origRes = await gasPost({
        action: 'uploadOriginal',
        filename: this.file.name,
        base64:   origBase64,
        mimeType: origMime,
      });
      if (!origRes.ok) throw new Error('원본 업로드 실패: ' + origRes.error);
      const { photoId } = origRes.data;

      // 2. 워터마크 합성 & 업로드
      if (this.wmImg) {
        this._setProgress(40, '워터마크 합성 & 업로드 중...');
        const wmB64 = this._composite(this.originalImg, this.wmImg);
        const wmRes = await gasPost({
          action: 'uploadVariant',
          photoId,
          variantType: 'watermark',
          base64:   wmB64,
          mimeType: 'image/jpeg',
        });
        if (!wmRes.ok) throw new Error('워터마크 업로드 실패: ' + wmRes.error);
      }

      // 3. 레터링 합성 & 업로드
      const letterFileId = document.getElementById('upload-letter-select').value;
      const letterImg    = letterFileId ? this.letterImgCache[letterFileId] : null;
      if (letterImg) {
        this._setProgress(70, '레터링 합성 & 업로드 중...');
        const letterB64 = this._composite(this.originalImg, letterImg);
        const letterRes = await gasPost({
          action: 'uploadVariant',
          photoId,
          variantType: 'poster',
          base64:   letterB64,
          mimeType: 'image/jpeg',
        });
        if (!letterRes.ok) throw new Error('레터링 업로드 실패: ' + letterRes.error);
      }

      // 4. 완료
      this._setProgress(100, '완료!');
      setStatus(`업로드 완료 — ${origRes.data.displayName}`, 'ok');
      const list = await gasGet('admin');
      items = list.data;
      renderList();
      this._reset();

    } catch (e) {
      setStatus('업로드 오류: ' + e.message, 'err');
      btn.disabled = false;
    }
  },

  _reset() {
    this.file = null; this.dataUrl = null; this.originalImg = null;
    document.getElementById('upload-file-input').value = '';
    document.getElementById('upload-filename').textContent = '선택된 파일 없음';
    document.getElementById('upload-previews').style.display = 'none';
    document.getElementById('upload-progress-wrap').style.display = 'none';
    document.getElementById('upload-btn').disabled = true;
    ['original', 'watermark', 'letter'].forEach(t => {
      const c = document.getElementById(`preview-${t}`);
      if (!c) return;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, c.width, c.height);
    });
  },

  _readDataUrl(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = e => res(e.target.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  },

  _imgFromSrc(src) {
    return new Promise((res, rej) => {
      const img = new Image();
      img.onload  = () => res(img);
      img.onerror = rej;
      img.src = src;
    });
  },

  async _fetchImg(fileId) {
    const res = await gasGet('getFileBase64', { fileId });
    if (!res.ok) return null;
    return this._imgFromSrc(`data:${res.data.mimeType};base64,${res.data.base64}`);
  },
};

// 패널 토글
document.getElementById('upload-toggle-btn').addEventListener('click', () => {
  const body = document.getElementById('upload-body');
  const btn  = document.getElementById('upload-toggle-btn');
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  btn.textContent    = open ? '펼치기 ▼' : '접기 ▲';
  if (!open) Upload.initPanel();
});

// 파일 선택
document.getElementById('upload-file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) Upload.onFileChange(file);
});

// 레터링 선택 변경
document.getElementById('upload-letter-select').addEventListener('change', () => {
  Upload.onLetterChange();
});

// 업로드 실행
document.getElementById('upload-btn').addEventListener('click', () => Upload.upload());

// ── 폴더 일괄 업로드 ─────────────────────────────────────────────────
const FolderUpload = {
  files: [],

  onFolderChange(fileList) {
    const images = Array.from(fileList).filter(f =>
      /\.(jpe?g|png|webp)$/i.test(f.name)
    );
    this.files = images;
    document.getElementById('upload-folder-info').textContent =
      images.length > 0 ? `${images.length}개 이미지 파일 선택됨` : '이미지 파일 없음';
    document.getElementById('upload-folder-btn').disabled = images.length === 0;
  },

  async uploadAll() {
    if (!this.files.length) return;
    const btn = document.getElementById('upload-folder-btn');
    btn.disabled = true;
    const total = this.files.length;
    let success = 0, failed = 0;

    document.getElementById('folder-progress-wrap').style.display = 'block';

    await Upload.initPanel();

    for (let i = 0; i < this.files.length; i++) {
      const file = this.files[i];
      const pct = Math.round((i / total) * 100);
      document.getElementById('folder-progress-fill').style.width = pct + '%';
      document.getElementById('folder-progress-msg').textContent =
        `(${i + 1}/${total}) ${file.name} 업로드 중...`;
      setStatus(`폴더 업로드 중... ${i + 1}/${total}`);

      try {
        await this._uploadOne(file);
        success++;
      } catch (e) {
        failed++;
        console.error('업로드 실패:', file.name, e);
      }
    }

    document.getElementById('folder-progress-fill').style.width = '100%';
    document.getElementById('folder-progress-msg').textContent =
      `완료 — ${success}개 성공${failed > 0 ? `, ${failed}개 실패` : ''}`;
    setStatus(`폴더 업로드 완료 — ${success}/${total}개`, 'ok');

    const list = await gasGet('admin');
    items = list.data;
    renderList();

    btn.disabled = false;
    this.files = [];
    document.getElementById('upload-folder-input').value = '';
    document.getElementById('upload-folder-info').textContent = '선택된 폴더 없음';
  },

  async _uploadOne(file) {
    const dataUrl = await Upload._readDataUrl(file);
    const img = await Upload._imgFromSrc(dataUrl);

    const origBase64 = dataUrl.split(',')[1];
    const origMime   = dataUrl.split(';')[0].split(':')[1];
    const origRes = await gasPost({
      action: 'uploadOriginal',
      filename: file.name,
      base64:   origBase64,
      mimeType: origMime,
    });
    if (!origRes.ok) throw new Error(origRes.error);
    const { photoId } = origRes.data;

    if (Upload.wmImg) {
      const wmB64 = Upload._composite(img, Upload.wmImg);
      const wmRes = await gasPost({
        action: 'uploadVariant', photoId, variantType: 'watermark',
        base64: wmB64, mimeType: 'image/jpeg',
      });
      if (!wmRes.ok) throw new Error(wmRes.error);
    }

    const letterFileId = document.getElementById('upload-letter-select').value;
    if (letterFileId) {
      if (!Upload.letterImgCache[letterFileId]) {
        Upload.letterImgCache[letterFileId] = await Upload._fetchImg(letterFileId);
      }
      const letterImg = Upload.letterImgCache[letterFileId];
      if (letterImg) {
        const letterB64 = Upload._composite(img, letterImg);
        const lRes = await gasPost({
          action: 'uploadVariant', photoId, variantType: 'poster',
          base64: letterB64, mimeType: 'image/jpeg',
        });
        if (!lRes.ok) throw new Error(lRes.error);
      }
    }
  },
};

document.getElementById('upload-folder-input').addEventListener('change', e => {
  FolderUpload.onFolderChange(e.target.files);
});

document.getElementById('upload-folder-btn').addEventListener('click', () => {
  FolderUpload.uploadAll();
});
</script>

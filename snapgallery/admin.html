<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DK Gallery — 관리</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #ddd; font-family: 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; }

    /* ── Login ── */
    .login-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      padding: 40px 48px; width: 320px; text-align: center;
    }
    .login-box h2 { font-size: 1rem; letter-spacing: 0.3em; font-weight: 400; margin-bottom: 28px; color: #fff; text-transform: uppercase; }
    .login-box input {
      width: 100%; background: #111; border: 1px solid #2e2e2e; color: #ddd;
      padding: 10px 14px; font-size: 0.9rem; margin-bottom: 12px; outline: none;
    }
    .login-box input:focus { border-color: #555; }
    .login-box button {
      width: 100%; background: #fff; color: #111; border: none;
      padding: 11px; font-size: 0.85rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
    }
    .login-box button:hover { background: #ddd; }
    .login-err { color: #c44; font-size: 0.8rem; margin-top: 10px; }

    /* ── App Shell ── */
    #app { display: none; }

    .topbar {
      background: #1a1a1a; border-bottom: 1px solid #222;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; position: sticky; top: 0; z-index: 100;
    }
    .topbar-title { font-size: 0.95rem; letter-spacing: 0.25em; color: #fff; text-transform: uppercase; font-weight: 600; }
    .topbar-actions { display: flex; gap: 8px; }

    .btn {
      background: none; border: 1px solid #444; color: #bbb;
      padding: 7px 18px; font-size: 0.78rem; letter-spacing: 0.15em;
      text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    }
    .btn:hover { border-color: #aaa; color: #fff; }
    .btn.primary { background: #fff; color: #111; border-color: #fff; }
    .btn.primary:hover { background: #ddd; }
    .btn.danger { border-color: #633; color: #c66; }
    .btn.danger:hover { background: #c66; color: #fff; border-color: #c66; }

    /* ── Status bar ── */
    .statusbar {
      padding: 10px 24px; font-size: 0.78rem; letter-spacing: 0.1em;
      color: #aaa; border-bottom: 1px solid #1e1e1e; min-height: 36px;
    }
    .statusbar.ok  { color: #4a4; }
    .statusbar.err { color: #c44; }

    /* ── Settings bar ── */
    .settings-bar {
      padding: 12px 24px; background: #161616; border-bottom: 1px solid #222;
      display: flex; flex-wrap: wrap; align-items: center; gap: 16px;
    }
    .settings-label {
      font-size: 0.82rem; letter-spacing: 0.15em; color: #fff;
      text-transform: uppercase; white-space: nowrap; font-weight: 500;
    }

    /* ── Photo List ── */
    .photo-list { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }

    .photo-item {
      display: grid;
      grid-template-columns: 28px 80px 1fr 150px 70px 230px 70px 50px;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: #161616;
      border: 1px solid #1e1e1e;
      margin-bottom: 6px;
      cursor: grab;
      transition: background 0.15s;
    }
    .photo-item:hover { background: #1d1d1d; }
    .photo-item.dragging { opacity: 0.4; border-color: #555; }
    .photo-item.drag-over { border-color: #888; background: #222; }

    .drag-handle { color: #444; font-size: 1rem; cursor: grab; user-select: none; text-align: center; }
    .drag-handle:hover { color: #aaa; }

    /* 썸네일: 세로 비율 유지, 잘리지 않도록 */
    .thumb-wrap {
      width: 80px; height: 108px;
      overflow: hidden; background: #0a0a0a; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: contain; display: block;
    }
    .thumb-wrap .thumb-err {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; color: #444; text-align: center; padding: 4px;
    }

    .item-name { font-size: 0.78rem; color: #bbb; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .item-cat input {
      width: 100%; background: #111; border: 1px solid #2a2a2a; color: #ccc;
      padding: 6px 10px; font-size: 0.78rem; outline: none;
    }
    .item-cat input:focus { border-color: #555; }

    .item-versions { display: flex; flex-direction: column; gap: 3px; }
    .ver-badge {
      font-size: 0.62rem; padding: 3px 7px; border: 1px solid;
      letter-spacing: 0.05em; text-transform: uppercase; border-radius: 2px;
      text-align: center;
    }
    .ver-badge.on  { border-color: #4a8cff; color: #4a8cff; }
    .ver-badge.off { border-color: #2a2a2a; color: #333; }

    /* active toggle */
    .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; margin: 0 auto; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0; background: #2a2a2a;
      border-radius: 20px; transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: #4a8; }
    .toggle-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; background: #666; border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); background: #fff; }

    .delete-btn {
      background: none; border: none; color: #444; font-size: 1rem;
      cursor: pointer; padding: 4px 8px; transition: color 0.2s; text-align: center;
    }
    .delete-btn:hover { color: #c44; }

    /* ── SS source buttons — 3개, 가로로 넓게 ── */
    .ss-src-btns { display: flex; gap: 4px; }
    .ss-src-btn {
      flex: 1;
      font-size: 0.68rem; padding: 5px 8px;
      border: 1px solid #2a2a2a; background: none; color: #666;
      letter-spacing: 0.04em; cursor: pointer; transition: all 0.15s;
      border-radius: 3px; text-align: center; white-space: nowrap;
    }
    .ss-src-btn:hover { border-color: #666; color: #bbb; }
    .ss-src-btn.on { background: #4a8; border-color: #4a8; color: #fff; }
    .ss-src-btn.disabled { opacity: 0.25; cursor: default; }
    .ss-src-btn.disabled:hover { border-color: #2a2a2a; color: #666; }

    /* ── Empty ── */
    .empty { text-align: center; padding: 80px; color: #444; font-size: 0.85rem; letter-spacing: 0.2em; }

    /* ── List header ── */
    .list-header {
      display: grid;
      grid-template-columns: 28px 80px 1fr 150px 70px 230px 70px 50px;
      gap: 12px;
      padding: 8px 12px;
      font-size: 0.72rem; letter-spacing: 0.15em; color: #fff; text-transform: uppercase;
      border-bottom: 1px solid #2a2a2a; margin-bottom: 8px; font-weight: 600;
    }
  </style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <h2>Gallery Admin</h2>
    <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="current-password">
    <button id="pw-btn">로그인</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <span class="topbar-title">DK Gallery 관리</span>
    <div class="topbar-actions">
      <button class="btn" id="btn-scan">Drive 스캔</button>
      <button class="btn primary" id="btn-save">저장</button>
    </div>
  </div>
  <div class="statusbar" id="statusbar">항목을 로딩 중...</div>

  <!-- 슬라이드쇼 설정 -->
  <div class="settings-bar">
    <span class="settings-label">슬라이드쇼 전환 시간</span>
    <div style="display:flex;gap:6px;" id="ss-interval-btns">
      <button class="btn ss-iv-btn" data-val="3000">3초</button>
      <button class="btn ss-iv-btn" data-val="4000">4초</button>
      <button class="btn ss-iv-btn" data-val="5000">5초</button>
      <button class="btn ss-iv-btn" data-val="6000">6초</button>
    </div>
  </div>
  <div class="settings-bar">
    <span class="settings-label">슬라이드쇼 텍스트</span>
    <div style="display:flex;gap:8px;flex:1;min-width:280px;">
      <input id="ss-line1-input" type="text" placeholder="Line 1 (영문)"
        style="flex:1;background:#111;border:1px solid #2e2e2e;color:#ccc;padding:6px 10px;font-size:0.82rem;outline:none;">
      <input id="ss-line2-input" type="text" placeholder="Line 2 (영문)"
        style="flex:1;background:#111;border:1px solid #2e2e2e;color:#ccc;padding:6px 10px;font-size:0.82rem;outline:none;">
      <button class="btn primary" id="ss-text-save-btn">저장</button>
    </div>
  </div>

  <div class="photo-list" id="photo-list">
    <div class="list-header">
      <span></span>
      <span>썸네일</span>
      <span>파일명</span>
      <span>카테고리</span>
      <span>버전</span>
      <span>SS 소스</span>
      <span style="text-align:center">표시</span>
      <span style="text-align:center">삭제</span>
    </div>
    <div id="items-container"></div>
  </div>
</div>

<script>
// ── 설정 ─────────────────────────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz29KKvjvBOHK3QszCDE4s2GOCzSz4edwChl5HnW_cpj6FGBaSmh58gkbK6M1SwmrDwOQ/exec';
const ADMIN_PW = '8888';  // 클라이언트 비밀번호 (GAS gallery.gs와 동일하게 유지)

let pw = '';
let items = [];

// ── 인증 ─────────────────────────────────────────────────────────────
function thumbUrl(fileId) {
  return `https://drive.google.com/thumbnail?id=${fileId}&sz=w200`;
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('pw-btn').click();
});

document.getElementById('pw-btn').addEventListener('click', async () => {
  const entered = document.getElementById('pw-input').value.trim();
  if (!entered) return;

  const errEl = document.getElementById('login-err');
  errEl.textContent = '';

  // 클라이언트 사이드 비밀번호 체크 (GAS POST CORS 이슈 우회)
  if (entered !== ADMIN_PW) {
    errEl.textContent = '비밀번호가 올바르지 않습니다';
    return;
  }

  pw = entered;
  setStatus('목록 로딩 중...');
  try {
    const res = await gasGet('admin');
    if (!res.ok) throw new Error(res.error);
    items = res.data;
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderList();
    setStatus(`총 ${items.length}개 항목 로드됨`, 'ok');
  } catch (e) {
    pw = '';
    errEl.textContent = '데이터 로드 오류: ' + e.message;
    setStatus('');
  }
});

// ── API ──────────────────────────────────────────────────────────────
async function gasGet(action) {
  const res = await fetch(`${GAS_URL}?action=${action}`);
  return res.json();
}

// POST (인증 후 사용, no-cors fallback 포함)
async function gasPost(body) {
  body.password = pw;
  const init = {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body),
  };
  try {
    const res = await fetch(GAS_URL, { ...init, redirect: 'follow' });
    return res.json();
  } catch (e) {
    const res2 = await fetch(GAS_URL, { ...init, mode: 'no-cors', redirect: 'follow' });
    return { ok: true };
  }
}

// ── Drive 스캔 ───────────────────────────────────────────────────────
document.getElementById('btn-scan').addEventListener('click', async () => {
  setStatus('Drive 스캔 중...');
  try {
    const res = await gasPost({ action: 'scan' });
    if (!res.ok) throw new Error(res.error);
    const { added, total } = res.data;
    const list = await gasGet('admin');
    items = list.data;
    renderList();
    setStatus(`스캔 완료 — 전체 ${total}개, 신규 ${added}개 추가됨`, 'ok');
  } catch (e) {
    setStatus('스캔 실패: ' + e.message, 'err');
  }
});

// ── 저장 ─────────────────────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', async () => {
  setStatus('저장 중...');
  try {
    const saveRes = await gasPost({ action: 'save', items: items.map(i => ({
      photoId:  i.photoId,
      category: i.category,
      active:   i.active,
      ssSource: i.ssSource || 'original',
    }))});
    if (!saveRes.ok) throw new Error(saveRes.error);

    const orderRes = await gasPost({ action: 'reorder', orders: items.map((i, idx) => ({
      photoId: i.photoId,
      order:   idx + 1,
    }))});
    if (!orderRes.ok) throw new Error(orderRes.error);

    setStatus('저장 완료', 'ok');
  } catch (e) {
    setStatus('저장 실패: ' + e.message, 'err');
  }
});

// ── 렌더링 ───────────────────────────────────────────────────────────
function renderList() {
  const container = document.getElementById('items-container');
  if (!items.length) {
    container.innerHTML = '<div class="empty">항목이 없습니다. Drive 스캔을 실행하세요.</div>';
    return;
  }

  container.innerHTML = items.map((item, idx) => {
    // 썸네일: watermark → original → poster 순 우선
    const thumbId = item.fileId_watermark || item.fileId_original || item.fileId_poster;
    const thumb = thumbId
      ? `<img src="${thumbUrl(thumbId)}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex';">
         <div class="thumb-err" style="display:none;">이미지<br>없음</div>`
      : `<div class="thumb-err">파일<br>없음</div>`;

    const hasOri = !!item.fileId_original;
    const hasWm  = !!item.fileId_watermark;
    const hasPos = !!item.fileId_poster;
    const ss = item.ssSource || 'original';

    return `
    <div class="photo-item" draggable="true" data-idx="${idx}" data-id="${item.photoId}">
      <span class="drag-handle">⠇</span>
      <div class="thumb-wrap">${thumb}</div>
      <span class="item-name" title="${item.displayName}">${item.displayName}</span>
      <div class="item-cat">
        <input type="text" value="${item.category || ''}" placeholder="카테고리 입력"
          data-id="${item.photoId}" class="cat-input">
      </div>
      <div class="item-versions">
        <span class="ver-badge ${hasOri ? 'on':'off'}">Original</span>
        <span class="ver-badge ${hasWm  ? 'on':'off'}">WM</span>
        <span class="ver-badge ${hasPos ? 'on':'off'}">Design</span>
      </div>
      <div class="ss-src-btns">
        <button class="ss-src-btn ${ss==='original'?'on':''} ${!hasOri?'disabled':''}"
          data-id="${item.photoId}" data-src="original">Original</button>
        <button class="ss-src-btn ${ss==='watermark'?'on':''} ${!hasWm?'disabled':''}"
          data-id="${item.photoId}" data-src="watermark">WM</button>
        <button class="ss-src-btn ${ss==='poster'?'on':''} ${!hasPos?'disabled':''}"
          data-id="${item.photoId}" data-src="poster">Design</button>
      </div>
      <label class="toggle">
        <input type="checkbox" ${item.active === true || item.active === 'TRUE' ? 'checked' : ''}
          data-id="${item.photoId}" class="active-toggle">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
      <button class="delete-btn" data-id="${item.photoId}" title="삭제">✕</button>
    </div>`;
  }).join('');

  // 카테고리 입력
  container.querySelectorAll('.cat-input').forEach(input => {
    input.addEventListener('change', e => {
      const item = items.find(i => i.photoId === e.target.dataset.id);
      if (item) item.category = e.target.value.trim();
    });
  });

  // active 토글
  container.querySelectorAll('.active-toggle').forEach(chk => {
    chk.addEventListener('change', e => {
      const item = items.find(i => i.photoId === e.target.dataset.id);
      if (item) item.active = e.target.checked;
    });
  });

  // SS 소스 선택 (단일 선택, disabled 버튼 제외)
  container.querySelectorAll('.ss-src-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      if (btn.classList.contains('disabled')) return;
      const id  = e.target.dataset.id;
      const src = e.target.dataset.src;
      const item = items.find(i => i.photoId === id);
      if (!item) return;
      item.ssSource = src;

      // 해당 행 버튼 UI 업데이트
      const row = e.target.closest('.photo-item');
      row.querySelectorAll('.ss-src-btn').forEach(b => {
        b.classList.toggle('on', b.dataset.src === src);
      });
    });
  });

  // 삭제
  container.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', async e => {
      const id = e.currentTarget.dataset.id;
      const item = items.find(i => i.photoId === id);
      if (!confirm(`"${item?.displayName}" 을(를) 목록에서 삭제할까요?\n(Drive 파일은 삭제되지 않습니다)`)) return;
      setStatus('삭제 중...');
      try {
        const res = await gasPost({ action: 'delete', photoId: id });
        if (!res.ok) throw new Error(res.error);
        items = items.filter(i => i.photoId !== id);
        renderList();
        setStatus('삭제 완료', 'ok');
      } catch (e) {
        setStatus('삭제 실패: ' + e.message, 'err');
      }
    });
  });

  initDragDrop();
}

// ── 드래그앤드롭 ─────────────────────────────────────────────────────
function initDragDrop() {
  const container = document.getElementById('items-container');
  let dragSrc = null;

  container.querySelectorAll('.photo-item').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragSrc = el;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      container.querySelectorAll('.photo-item').forEach(i => i.classList.remove('drag-over'));
      const newOrder = [...container.querySelectorAll('.photo-item')]
        .map(el => items.find(i => i.photoId === el.dataset.id))
        .filter(Boolean);
      items = newOrder;
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (el !== dragSrc) {
        container.querySelectorAll('.photo-item').forEach(i => i.classList.remove('drag-over'));
        el.classList.add('drag-over');
      }
    });
    el.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrc && dragSrc !== el) {
        const allItems = [...container.querySelectorAll('.photo-item')];
        const srcIdx = allItems.indexOf(dragSrc);
        const tgtIdx = allItems.indexOf(el);
        if (srcIdx < tgtIdx) el.after(dragSrc);
        else el.before(dragSrc);
      }
    });
  });
}

// ── 슬라이드쇼 인터벌 ────────────────────────────────────────────────
function initIntervalBtns() {
  const current = localStorage.getItem('ss_interval') || '3000';
  document.querySelectorAll('.ss-iv-btn').forEach(btn => {
    btn.classList.toggle('primary', btn.dataset.val === current);
    btn.addEventListener('click', () => {
      localStorage.setItem('ss_interval', btn.dataset.val);
      document.querySelectorAll('.ss-iv-btn').forEach(b => b.classList.remove('primary'));
      btn.classList.add('primary');
    });
  });
}
initIntervalBtns();

// ── 슬라이드쇼 텍스트 ────────────────────────────────────────────────
function initTextInputs() {
  document.getElementById('ss-line1-input').value = localStorage.getItem('ss_line1') || '';
  document.getElementById('ss-line2-input').value = localStorage.getItem('ss_line2') || '';
  document.getElementById('ss-text-save-btn').addEventListener('click', () => {
    localStorage.setItem('ss_line1', document.getElementById('ss-line1-input').value.trim());
    localStorage.setItem('ss_line2', document.getElementById('ss-line2-input').value.trim());
    setStatus('텍스트 저장 완료', 'ok');
  });
}
initTextInputs();

// ── 상태 표시 ────────────────────────────────────────────────────────
function setStatus(msg, type = '') {
  const el = document.getElementById('statusbar');
  el.textContent = msg;
  el.className = 'statusbar' + (type ? ' ' + type : '');
}
</script>
</body>
</html>
